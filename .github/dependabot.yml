version: 2

updates:
  # NuGet test-side deps (MSTest, coverlet, etc.) — production deps are vendored
  # via submodules so dependabot has nothing to do there.
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - nuget

  # Rust deps for the in-repo workspace (bridge/neo-zkvm-{guest,host} +
  # sdk/rust). external/* submodules are path-deps and won't get a
  # dependabot PR.
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - rust

  # GitHub Actions — keep checkout / setup-dotnet / rust-toolchain on the
  # latest stable.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
      - github-actions
