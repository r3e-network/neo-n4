name: build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Nightly release-grade proof generation. Pull requests run the deterministic
    # host/guest suites; the scheduled lane additionally generates and verifies
    # the expensive real SP1 Groth16 proofs.
    - cron: "17 2 * * *"
  workflow_dispatch:
    inputs:
      run_real_sp1_proof:
        description: "Run ignored real SP1 proof tests"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  test:
    name: dotnet test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v6
        with:
          # r3e-network/neo and r3e-network/neo-devpack-dotnet are vendored as
          # submodules at external/neo and external/neo-devpack-dotnet (see
          # Directory.Build.props NeoCorePath / contracts/Directory.Build.props
          # NeoDevpackPath). Both are never released on NuGet for the versions
          # we track here, so the submodule init is required for the build.
          submodules: recursive

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Override nuget.config for the submodule
        # external/neo/nuget.config <clear/>s sources and adds MyGet-neo, which
        # times out on CI runners. Force MSBuild to use only nuget.org for this
        # submodule via a sibling override that takes precedence (NuGet picks the
        # closest config — drop one inside the submodule that does NOT have <clear/>).
        # The override only lives in the runner's working tree; it does not affect
        # the committed submodule state.
        run: |
          cat > external/neo/nuget.config <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="NuGet.org" value="https://api.nuget.org/v3/index.json" />
            </packageSources>
          </configuration>
          EOF

      - name: Build
        run: dotnet build Neo.L2.sln /p:NuGetAudit=false --nologo

      # dotnet format pass — verifies whitespace/style consistency across
      # first-party projects only. We must `--exclude external/` because
      # Neo.L2.sln directly references 5 vendored submodule projects under
      # `external/neo/` and `external/neo-devpack-dotnet/` (so contracts can
      # ProjectReference Neo.SmartContract.Framework). Those submodules
      # carry their own (sometimes divergent) format conventions that we
      # neither own nor want to rewrite from neo-n4. Excluding the path
      # keeps the gate honest for code we control without coupling our CI
      # to upstream formatting drift. (CRLF/whitespace failures on Windows
      # without this exclusion were the trigger for this scope narrowing.)
      - name: dotnet format --verify-no-changes
        run: dotnet format Neo.L2.sln --verify-no-changes --exclude external/

      - name: Test
        run: dotnet test Neo.L2.sln /p:NuGetAudit=false --nologo --no-build

      - name: Coverage gate
        shell: pwsh
        run: ./scripts/test-coverage.ps1 -Configuration Release -ResultsDirectory coverage/dotnet-ci -Threshold 90 -OverallThreshold 80

      # End-to-end smoke: run each of the 4 published sample chain configs
      # through the in-process devnet. Catches regressions where a config
      # template diverges from what the devnet runner can actually consume —
      # e.g. a new required field added to L2ChainConfig that the sample
      # forgot to set. The 3-batch run completes in <10s per config.
      - name: Sample chain configs (devnet smoke)
        run: |
          for cfg in samples/general-rollup.config.json \
                    samples/gaming-rollup.config.json \
                    samples/exchange-validium.config.json \
                    samples/privacy-sidechain.config.json; do
            echo "── $cfg ──"
            dotnet run --project tools/Neo.L2.Devnet --no-build -- 3 --config "$cfg" \
              | tee /tmp/devnet-out.log
            grep -q '^✅ devnet run complete\.' /tmp/devnet-out.log \
              || { echo "FAIL: $cfg did not complete cleanly"; exit 1; }
          done

  contracts:
    name: type-check contracts
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Override nuget.config for the submodule
        # See the test job for context — force only nuget.org so MyGet-neo doesn't
        # time out CI restores.
        run: |
          cat > external/neo/nuget.config <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="NuGet.org" value="https://api.nuget.org/v3/index.json" />
            </packageSources>
          </configuration>
          EOF

      - name: Install nccs (Neo C# Compiler)
        # Without nccs, contracts only type-check — nccs catches a separate class of
        # error (NeoVM-specific opcode constraints, manifest emission, ABI compile
        # errors) that the C# compiler never sees. The exact version is part of the
        # audited NEF build provenance and must not float between CI runs.
        run: dotnet tool install -g Neo.Compiler.CSharp --version 3.9.1

      - name: Type-check + compile deployable NeoHub + sample contracts
        # dotnet build type-checks the C# surface; nccs explicitly emits the
        # deployable .nef + .manifest.json artifacts into <project>/bin/sc/.
        # samples/contracts/Sample.* are app-developer examples: same compile
        # path, so a refactor that breaks the sample API surfaces here, not at
        # an operator's terminal.
        run: |
          for d in contracts/NeoHub.* samples/contracts/Sample.*; do
            name=$(basename "$d")
            project="$d/$name.csproj"
            dotnet build "$project" /p:NuGetAudit=false --nologo
            nccs "$project" --output "$d/bin/sc"
          done

      - name: Verify .nef + .manifest.json artifacts produced
        run: |
          missing=0
          for d in contracts/NeoHub.* samples/contracts/Sample.*; do
            name=$(basename "$d")
            for ext in nef manifest.json; do
              if [ ! -f "$d/bin/sc/$name.$ext" ]; then
                echo "MISSING: $d/bin/sc/$name.$ext"
                missing=$((missing+1))
              fi
            done
          done
          if [ $missing -gt 0 ]; then
            echo "$missing artifacts missing - nccs did not run for some contracts"
            exit 1
          fi
          # Count is logged dynamically so the message can't drift from reality
          # when a contract is added (matches the loop above + the verification loop).
          neo_count=$(ls -d contracts/NeoHub.* 2>/dev/null | wc -l)
          sample_count=$(ls -d samples/contracts/Sample.* 2>/dev/null | wc -l)
          total=$((neo_count + sample_count))
          echo "All $total deployable contracts ($neo_count NeoHub + $sample_count samples) produced .nef + .manifest.json artifacts"

      - name: Verify NeoHub manifest invariants against fresh nccs artifacts
        env:
          NEO_N4_REQUIRE_FRESH_MANIFESTS: "1"
        run: >
          dotnet test tests/Neo.Hub.Deploy.UnitTests/Neo.Hub.Deploy.UnitTests.csproj
          --filter
          "FullyQualifiedName~UT_ContractManifestInvariants|FullyQualifiedName~UT_OptimisticChallengeAllowlist"
          /p:NuGetAudit=false
          --nologo

      - name: Verify audited verifier artifacts against fresh nccs output
        env:
          NEO_N4_REQUIRE_FRESH_MANIFESTS: "1"
        run: >
          dotnet test tests/NeoHub.Sp1Groth16Verifier.UnitTests/NeoHub.Sp1Groth16Verifier.UnitTests.csproj
          --filter FullyQualifiedName~UT_FreshContractArtifacts
          /p:NuGetAudit=false
          --nologo

      - name: Verify N4 L2 native contracts in r3e Neo core
        run: |
          dotnet test external/neo/tests/Neo.UnitTests/Neo.UnitTests.csproj \
            --filter FullyQualifiedName~UT_L2NativeContracts \
            /p:NuGetAudit=false --nologo

  bridge:
    name: cargo check (Rust bridge)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Override nuget.config for the Neo submodule
        run: |
          cat > external/neo/nuget.config <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="NuGet.org" value="https://api.nuget.org/v3/index.json" />
            </packageSources>
          </configuration>
          EOF

      # neo-riscv-host: PolkaVM-backed Neo RISC-V execution engine vendored at
      # external/neo-riscv-vm. C# project Neo.L2.Executor.RiscV P/Invokes into
      # the produced libneo_riscv_host.so. cargo check (not build) keeps CI
      # fast - the actual cdylib is operator-built when deploying.
      - name: cargo check (neo-riscv-host)
        working-directory: external/neo-riscv-vm
        run: cargo check -p neo-riscv-host

      - name: Verify native RISC-V FFI state mapping
        run: |
          cargo build --release -p neo-riscv-host --manifest-path external/neo-riscv-vm/Cargo.toml
          dotnet build tests/Neo.L2.Executor.RiscV.UnitTests/Neo.L2.Executor.RiscV.UnitTests.csproj \
            /p:NuGetAudit=false --nologo
          cp external/neo-riscv-vm/target/release/libneo_riscv_host.so \
            tests/Neo.L2.Executor.RiscV.UnitTests/bin/Debug/net10.0/
          NEO_RISCV_NATIVE_TESTS=1 dotnet test \
            tests/Neo.L2.Executor.RiscV.UnitTests/Neo.L2.Executor.RiscV.UnitTests.csproj \
            /p:NuGetAudit=false --nologo --no-build \
            --filter FullyQualifiedName~RealNativeAbi_MapsHaltZeroAndFaultOne

      # neo-zkvm-guest: the Rust crate that compiles to RISC-V ELF inside SP1's
      # zkVM. Host-side compilation + tests pin the deterministic execution
      # contract (parse, Merkle root, hash256). The actual `cargo prove build`
      # that produces the RISC-V ELF requires the SP1 toolchain - operator-supplied
      # at deploy time per bridge/neo-zkvm-guest/README.md.
      - name: cargo build + test (neo-zkvm-guest, host mode)
        working-directory: bridge/neo-zkvm-guest
        run: |
          cargo build
          cargo test

      # Rust app-developer SDK - the typed-client mirror of src/Neo.L2.Sdk
      # for Rust dApps. Mockito-driven integration tests exercise every method
      # against canned JSON-RPC responses.
      - name: cargo build + test (sdk/rust)
        working-directory: sdk/rust
        run: |
          cargo build
          cargo test

      # External-bridge watcher — messaging + signing core for the entire EVM
      # family ↔ Neo external bridge. Default features test the cryptographic
      # core (encoders, parity vectors, chains-table validity); --features
      # live-rpc adds the production daemon code path (HTTP adapters, journal,
      # health server, Prometheus /metrics).
      - name: cargo build + test (neo-bridge-watcher-eth, default features)
        working-directory: watchers/neo-bridge-watcher-eth
        run: |
          cargo build --release
          cargo test --release

      - name: cargo build + test (neo-bridge-watcher-eth, --features live-rpc)
        working-directory: watchers/neo-bridge-watcher-eth
        run: |
          cargo build --release --features live-rpc
          cargo test --release --features live-rpc

      # Tron + Solana watchers re-export / extend the eth core. Build + test
      # both so a refactor that breaks the cross-curve abstraction surfaces
      # in CI immediately.
      - name: cargo build + test (neo-bridge-watcher-tron)
        working-directory: watchers/neo-bridge-watcher-tron
        run: |
          cargo build --release
          cargo test --release

      - name: cargo build + test (neo-bridge-watcher-sol)
        working-directory: watchers/neo-bridge-watcher-sol
        run: |
          cargo build --release
          cargo test --release

      # Clippy gate for the watcher crates. Runs across both feature
      # configurations of the eth crate (default cryptographic core +
      # live-rpc HTTP/journal/health adapters) plus tron + sol. -D warnings
      # promotes lints to errors so the gate is binary, not advisory.
      # The watcher daemon binary is the production runtime — drift from
      # idiomatic Rust here is high-cost (HSM/RPC code paths).
      - name: cargo clippy (neo-bridge-watcher-eth, default features)
        working-directory: watchers/neo-bridge-watcher-eth
        run: cargo clippy --release --all-targets -- -D warnings

      - name: cargo clippy (neo-bridge-watcher-eth, --features live-rpc)
        working-directory: watchers/neo-bridge-watcher-eth
        run: cargo clippy --release --features live-rpc --all-targets -- -D warnings

      - name: cargo clippy (neo-bridge-watcher-tron + neo-bridge-watcher-sol)
        run: cargo clippy --release --all-targets -p neo-bridge-watcher-tron -p neo-bridge-watcher-sol -- -D warnings

  # Real SP1 zkVM smoke test for bridge/neo-zkvm-host. Runs in its own job
  # because the SP1 toolchain install is heavy. Coverage: builds the guest
  # ELF via `cargo prove build`, then runs workspace formatting, clippy, and
  # release tests. The ignored real-proof tests are available through manual
  # workflow dispatch by enabling `run_real_sp1_proof`.
  sp1-host:
    name: cargo build + test (neo-zkvm-host, real SP1 zkVM)
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v6
        with:
          # bridge/neo-zkvm-guest has a path dep on
          # external/neo-zkvm/crates/neo-vm-guest. Without recursive
          # submodule fetch, `cargo prove build` fails on missing
          # Cargo.toml.
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install SP1 system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev protobuf-compiler cmake clang lld

      - name: Cache SP1 toolchain
        id: cache-sp1
        uses: actions/cache@v5
        with:
          # `~/.sp1/` holds the sp1up + cargo-prove binaries.
          # `~/.rustup/toolchains/succinct/` holds the custom rustup
          # toolchain sp1up installs (used by `cargo +succinct` /
          # `cargo prove build`). Caching only ~/.sp1/ left the
          # toolchain absent on cache hit, which produced
          # 'override toolchain succinct is not installed' from
          # cargo prove build.
          path: |
            ~/.sp1
            ~/.rustup/toolchains/succinct
            ~/.rustup/update-hashes/succinct
          key: sp1-toolchain-v6.2.1-${{ runner.os }}

      - name: Install SP1 toolchain (sp1up + cargo-prove)
        if: steps.cache-sp1.outputs.cache-hit != 'true'
        run: |
          curl -L https://sp1up.succinct.xyz | bash
          ~/.sp1/bin/sp1up

      - name: Add SP1 to PATH
        run: echo "$HOME/.sp1/bin" >> "$GITHUB_PATH"

      - name: cargo prove build (guest ELF)
        working-directory: bridge/neo-zkvm-guest
        run: cargo prove build

      - name: cargo fmt (Rust workspace)
        run: cargo fmt --all -- --check

      - name: cargo clippy (Rust workspace)
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: cargo test (Rust workspace, release)
        run: cargo test --workspace --release --locked

      - name: cargo test (neo-zkvm-host, real proof)
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_real_sp1_proof)
        working-directory: bridge/neo-zkvm-host
        run: cargo test --release --locked -- --ignored --nocapture

  rust-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: cargo audit
        run: cargo audit --json

  sdk-typescript:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      # @neo-n4/sdk — typed TS wrapper around all 10 RPC methods. vitest
      # tests use an in-process stub fetch matching the .NET StubHttpHandler
      # pattern. Catches drift between the wire format the .NET server emits
      # and what the TS client expects.
      - name: npm install + test
        working-directory: sdk/typescript
        run: |
          npm install -g npm@11.15.0
          npm ci --no-audit --no-fund
          npm test
          npm run build
          npm --fetch-retries=5 --fetch-retry-mintimeout=20000 --fetch-retry-maxtimeout=120000 audit --audit-level=moderate

  sdk-python:
    name: Python SDK
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install, test, and build distribution
        working-directory: sdk/python
        run: |
          python -m pip install --upgrade pip build
          python -m pip install --editable .
          python -m unittest discover --start-directory tests --verbose
          python -m build

  # Foundry test pass for the foreign EVM router at
  # external/foreign-contracts/eth — 32 single-chain + 7 multi-chain
  # tests (= 39 total) that pin the Solidity side of every EVM bridge
  # path. The contract deploys unchanged on the entire EVM family
  # (Ethereum, Tron, BSC, Polygon, Arbitrum, Optimism, Base, Avalanche,
  # Linea, zkSync Era, Scroll, Mantle, Fantom, Celo) — drift here
  # affects every operator running the foreign side of the bridge.
  foreign-evm:
    name: forge test (foreign EVM router)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      # lib/forge-std is gitignored in external/foreign-contracts/eth
      # (see its .gitignore: "forge-std is cloned at setup time; never
      # tracked"). Fetch it explicitly so tests can compile.
      - name: forge install (forge-std)
        working-directory: external/foreign-contracts/eth
        # --no-git: plain clone into lib/forge-std rather than registering
        # as a submodule of the parent neo4 repo (lib/ is gitignored).
        run: forge install --no-git foundry-rs/forge-std

      # forge fmt pass — verifies Solidity formatting consistency. The router
      # contract + its 39 Foundry tests must stay in the standard style so
      # auditors can review without style-noise distraction.
      - name: forge fmt --check
        working-directory: external/foreign-contracts/eth
        run: forge fmt --check

      - name: forge test (single-chain + multi-chain)
        working-directory: external/foreign-contracts/eth
        run: forge test -vv

  experience-hub:
    name: node --test (experience hub)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      # The Experience Hub (docs/experience-hub/) is a static, local-first
      # HTML/JS surface that renders the canonical phase-1 report schemas
      # (devnet, deployment plan, bridge drill, NeoFS DA, etc.). The Node
      # test suite under tests/experience-hub/ exercises:
      #   - hub-state.test.mjs (5 tests): workspace state machine + evidence
      #     summary + private-vs-public devnet partition
      #   - manifest-generator.test.mjs (2 tests): the tools/experience-hub
      #     generator that scaffolds the canonical neo-n4.manifest.json
      #   - report-schemas.test.mjs (3 tests): per-report-type envelope
      #     validation + redaction guard
      # Catches drift between the manifest generator + the report-schema
      # invariants the static UI assumes.
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: node --test (experience-hub suites)
        run: |
          for f in tests/experience-hub/*.test.mjs; do
            node --test "$f"
          done

  foreign-solana:
    name: cargo test (foreign Solana program)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: cargo test
        working-directory: external/foreign-contracts/sol
        run: cargo test

  docs-site:
    name: mdBook docs site
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      # mdBook renders the docs/ tree (linked from docs/SUMMARY.md) into a
      # searchable static site. The build step exercises the SUMMARY.md
      # navigation + every cross-link — a stale link or missing referenced
      # file fails the build.
      - name: Install mdBook
        run: |
          mkdir -p $HOME/.local/bin
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz | tar -xz -C $HOME/.local/bin
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: mdbook build
        run: mdbook build
