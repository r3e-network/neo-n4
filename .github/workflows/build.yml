name: build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: dotnet test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v6
        with:
          # neo-project/neo and neo-project/neo-devpack-dotnet are vendored as
          # submodules at external/neo and external/neo-devpack-dotnet (see
          # Directory.Build.props NeoCorePath / contracts/Directory.Build.props
          # NeoDevpackPath). Both are never released on NuGet for the versions
          # we track here, so the submodule init is required for the build.
          submodules: recursive

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Override nuget.config for the submodule
        # external/neo/nuget.config <clear/>s sources and adds MyGet-neo, which
        # times out on CI runners. Force MSBuild to use only nuget.org for this
        # submodule via a sibling override that takes precedence (NuGet picks the
        # closest config — drop one inside the submodule that does NOT have <clear/>).
        # The override only lives in the runner's working tree; it does not affect
        # the committed submodule state.
        run: |
          cat > external/neo/nuget.config <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="NuGet.org" value="https://api.nuget.org/v3/index.json" />
            </packageSources>
          </configuration>
          EOF

      - name: Build
        run: dotnet build Neo.L2.sln /p:NuGetAudit=false --nologo

      - name: Test
        run: dotnet test Neo.L2.sln /p:NuGetAudit=false --nologo --no-build

  contracts:
    name: type-check contracts
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Override nuget.config for the submodule
        # See the test job for context — force only nuget.org so MyGet-neo doesn't
        # time out CI restores.
        run: |
          cat > external/neo/nuget.config <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="NuGet.org" value="https://api.nuget.org/v3/index.json" />
            </packageSources>
          </configuration>
          EOF

      - name: Install nccs (Neo C# Compiler)
        # Without nccs, contracts only type-check — nccs catches a separate class of
        # error (NeoVM-specific opcode constraints, manifest emission, ABI compile
        # errors) that the C# compiler never sees. Installing it on the runner means
        # every commit gets the .nef + .manifest.json artifacts validated.
        run: dotnet tool install -g Neo.Compiler.CSharp

      - name: Type-check + compile NeoHub + L2Native + sample contracts
        # `nccs <project>` runs automatically via the BeforeBuild target in
        # contracts/Directory.Build.props once nccs is on PATH. The artifacts land
        # in <project>/bin/sc/. samples/contracts/Sample.* are app-developer
        # examples — same compile path, so a refactor that breaks the sample API
        # surfaces here, not at an operator's terminal.
        run: |
          for d in contracts/NeoHub.* contracts/L2Native.* samples/contracts/Sample.*; do
            dotnet build "$d" /p:NuGetAudit=false --nologo
          done

      - name: Verify .nef + .manifest.json artifacts produced
        run: |
          missing=0
          for d in contracts/NeoHub.* contracts/L2Native.* samples/contracts/Sample.*; do
            name=$(basename "$d")
            for ext in nef manifest.json; do
              if [ ! -f "$d/bin/sc/$name.$ext" ]; then
                echo "MISSING: $d/bin/sc/$name.$ext"
                missing=$((missing+1))
              fi
            done
          done
          if [ $missing -gt 0 ]; then
            echo "$missing artifacts missing — nccs did not run for some contracts"
            exit 1
          fi
          # Count is logged dynamically so the message can't drift from reality
          # when a contract is added (matches the loop above + the verification loop).
          neo_count=$(ls -d contracts/NeoHub.* 2>/dev/null | wc -l)
          native_count=$(ls -d contracts/L2Native.* 2>/dev/null | wc -l)
          sample_count=$(ls -d samples/contracts/Sample.* 2>/dev/null | wc -l)
          total=$((neo_count + native_count + sample_count))
          echo "All $total contracts ($neo_count NeoHub + $native_count L2Native + $sample_count samples) produced .nef + .manifest.json artifacts"

  bridge:
    name: cargo check (Rust bridge)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # Default features: real-prover is OFF, so the bridge is buildable without
      # actually wiring up neo-zkvm's prover crates. The `real-prover` feature
      # toggle is exercised by operators who supply the keys + RISC-V toolchain.
      - name: cargo check (default features, real-prover OFF)
        working-directory: bridge/neo-zkvm-bridge
        run: cargo check --no-default-features

      # real-prover ON: exercises the full sp1-sdk + neo-zkvm-prover dependency
      # graph so a future bump to either crate that breaks the bridge surfaces here,
      # not later when an operator first flips the feature on. SP1_FORCE_DUMMY=true
      # tells external/neo-zkvm/crates/neo-zkvm-prover/build.rs to use a dummy guest
      # ELF — the host-side prover code still gets type-checked + linked, but the
      # RISC-V guest compile (which would need the SP1 toolchain) is skipped.
      - name: cargo check (real-prover ON, SP1 dummy ELF)
        working-directory: bridge/neo-zkvm-bridge
        env:
          SP1_FORCE_DUMMY: "true"
        run: cargo check --features real-prover

      # neo-riscv-host: PolkaVM-backed Neo RISC-V execution engine vendored at
      # external/neo-riscv-vm. This is the Phase 4 NeoVM2 / RISC-V execution path
      # (companion to the SP1 proving path above). C# project Neo.L2.Executor.RiscV
      # P/Invokes into the produced libneo_riscv_host.so. cargo check (not build)
      # keeps CI fast — the actual cdylib is operator-built when deploying.
      - name: cargo check (neo-riscv-host)
        working-directory: external/neo-riscv-vm
        run: cargo check -p neo-riscv-host

      # neo-zkvm-guest: the Rust crate that compiles to RISC-V ELF inside SP1's
      # zkVM. Host-side compilation + tests pin the deterministic execution
      # contract (parse, Merkle root, hash256). The actual `cargo prove build`
      # that produces the RISC-V ELF requires the SP1 toolchain — operator-supplied
      # at deploy time per bridge/neo-zkvm-guest/README.md.
      - name: cargo build + test (neo-zkvm-guest, host mode)
        working-directory: bridge/neo-zkvm-guest
        run: |
          cargo build
          cargo test

      # Rust app-developer SDK — the typed-client mirror of src/Neo.L2.Sdk
      # for Rust dApps. Mockito-driven integration tests exercise every method
      # against canned JSON-RPC responses.
      - name: cargo build + test (sdk/rust)
        working-directory: sdk/rust
        run: |
          cargo build
          cargo test

  sdk-typescript:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # @neo-n4/sdk — typed TS wrapper around all 10 RPC methods. vitest
      # tests use an in-process stub fetch matching the .NET StubHttpHandler
      # pattern. Catches drift between the wire format the .NET server emits
      # and what the TS client expects.
      - name: npm install + test
        working-directory: sdk/typescript
        run: |
          npm install --no-audit --no-fund
          npm test

  docs-site:
    name: mdBook docs site
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      # mdBook renders the docs/ tree (linked from docs/SUMMARY.md) into a
      # searchable static site. The build step exercises the SUMMARY.md
      # navigation + every cross-link — a stale link or missing referenced
      # file fails the build.
      - name: Install mdBook
        run: |
          mkdir -p $HOME/.local/bin
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz | tar -xz -C $HOME/.local/bin
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: mdbook build
        run: mdbook build
