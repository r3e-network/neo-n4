name: build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: dotnet test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v6
        with:
          # neo-project/neo and neo-project/neo-devpack-dotnet are vendored as
          # submodules at external/neo and external/neo-devpack-dotnet (see
          # Directory.Build.props NeoCorePath / contracts/Directory.Build.props
          # NeoDevpackPath). Both are never released on NuGet for the versions
          # we track here, so the submodule init is required for the build.
          submodules: recursive

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Override nuget.config for the submodule
        # external/neo/nuget.config <clear/>s sources and adds MyGet-neo, which
        # times out on CI runners. Force MSBuild to use only nuget.org for this
        # submodule via a sibling override that takes precedence (NuGet picks the
        # closest config — drop one inside the submodule that does NOT have <clear/>).
        # The override only lives in the runner's working tree; it does not affect
        # the committed submodule state.
        run: |
          cat > external/neo/nuget.config <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="NuGet.org" value="https://api.nuget.org/v3/index.json" />
            </packageSources>
          </configuration>
          EOF

      - name: Build
        run: dotnet build Neo.L2.sln /p:NuGetAudit=false --nologo

      - name: Test
        run: dotnet test Neo.L2.sln /p:NuGetAudit=false --nologo --no-build

  contracts:
    name: type-check contracts
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Override nuget.config for the submodule
        # See the test job for context — force only nuget.org so MyGet-neo doesn't
        # time out CI restores.
        run: |
          cat > external/neo/nuget.config <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="NuGet.org" value="https://api.nuget.org/v3/index.json" />
            </packageSources>
          </configuration>
          EOF

      - name: Install nccs (Neo C# Compiler)
        # Without nccs, contracts only type-check — nccs catches a separate class of
        # error (NeoVM-specific opcode constraints, manifest emission, ABI compile
        # errors) that the C# compiler never sees. Installing it on the runner means
        # every commit gets the .nef + .manifest.json artifacts validated.
        run: dotnet tool install -g Neo.Compiler.CSharp

      - name: Type-check + compile NeoHub + L2Native contracts
        # `nccs <project>` runs automatically via the BeforeBuild target in
        # contracts/Directory.Build.props once nccs is on PATH. The artifacts land
        # in <project>/bin/sc/.
        run: |
          for d in contracts/NeoHub.* contracts/L2Native.*; do
            dotnet build "$d" /p:NuGetAudit=false --nologo
          done

      - name: Verify .nef + .manifest.json artifacts produced
        run: |
          missing=0
          for d in contracts/NeoHub.* contracts/L2Native.*; do
            name=$(basename "$d")
            for ext in nef manifest.json; do
              if [ ! -f "$d/bin/sc/$name.$ext" ]; then
                echo "MISSING: $d/bin/sc/$name.$ext"
                missing=$((missing+1))
              fi
            done
          done
          if [ $missing -gt 0 ]; then
            echo "$missing artifacts missing — nccs did not run for some contracts"
            exit 1
          fi
          echo "All 19 contracts produced .nef + .manifest.json artifacts"

  bridge:
    name: cargo check (Rust bridge)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # Default features: real-prover is OFF, so the bridge is buildable without
      # actually wiring up neo-zkvm's prover crates. The `real-prover` feature
      # toggle is exercised by operators who supply the keys + RISC-V toolchain.
      - name: cargo check (default features, real-prover OFF)
        working-directory: bridge/neo-zkvm-bridge
        run: cargo check --no-default-features

      # real-prover ON: exercises the full sp1-sdk + neo-zkvm-prover dependency
      # graph so a future bump to either crate that breaks the bridge surfaces here,
      # not later when an operator first flips the feature on. SP1_FORCE_DUMMY=true
      # tells external/neo-zkvm/crates/neo-zkvm-prover/build.rs to use a dummy guest
      # ELF — the host-side prover code still gets type-checked + linked, but the
      # RISC-V guest compile (which would need the SP1 toolchain) is skipped.
      - name: cargo check (real-prover ON, SP1 dummy ELF)
        working-directory: bridge/neo-zkvm-bridge
        env:
          SP1_FORCE_DUMMY: "true"
        run: cargo check --features real-prover
