[book]
title = "Neo Elastic Network"
authors = ["neo-n4 contributors"]
description = "Multi-L2 network on Neo 4 core. Shared bridge, proof aggregation, native cross-chain messaging."
src = "docs"
language = "en"

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/r3e-network/neo-n4"
edit-url-template = "https://github.com/r3e-network/neo-n4/edit/master/{path}"
additional-css = []
mathjax-support = false
no-section-label = false
fold = { enable = true, level = 1 }

[output.html.search]
enable = true
limit-results = 30
teaser-word-count = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3

[preprocessor.links]

[preprocessor.index]
