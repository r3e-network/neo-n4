[package]
name = "neo-zkvm-guest"
version = "0.1.0"
edition = "2021"
description = "SP1 ZK guest program: deterministic Neo L2 batch executor that the SP1 prover proves correct."

[lib]
name = "neo_zkvm_guest"
path = "src/lib.rs"

[[bin]]
name = "neo-zkvm-guest"
path = "src/main.rs"

[dependencies]
sha2 = { version = "0.10", default-features = false }
sp1-zkvm = "6.0"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = true
