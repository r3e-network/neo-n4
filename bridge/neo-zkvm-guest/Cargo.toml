[package]
name = "neo-zkvm-guest"
version = "0.1.0"
edition = "2021"
description = "SP1 ZK guest program: deterministic Neo L2 batch executor that the SP1 prover proves correct."

[lib]
name = "neo_zkvm_guest"
path = "src/lib.rs"

[[bin]]
name = "neo-zkvm-guest"
path = "src/main.rs"

[dependencies]
sha2 = { version = "0.11", default-features = false }
sp1-zkvm = "6.0"
# Real Neo N3 VM in Rust — vendored via the external/neo-zkvm submodule.
# Each tx in a batch becomes a ProofInput that gets executed by neo_vm_guest::execute,
# so this guest proves "I ran NeoVM" not "I hashed the bytes".
neo-vm-guest = { path = "../../external/neo-zkvm/crates/neo-vm-guest" }

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = true
