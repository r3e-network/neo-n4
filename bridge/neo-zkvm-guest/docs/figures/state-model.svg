<svg xmlns="http://www.w3.org/2000/svg" width="1760" height="870" viewBox="0 0 1760 870" role="img" aria-label="neo-zkvm-guest State Model">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#08111f"/><stop offset="100%" stop-color="#111827"/></linearGradient>
<filter id="shadow" x="-15%" y="-15%" width="130%" height="130%"><feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#020617" flood-opacity="0.42"/></filter>
</defs>
<rect width="1760" height="100%" fill="url(#bg)"/>
<rect x="34" y="34" width="1692" height="802" rx="10" fill="#0f172a" stroke="#334155" stroke-width="2"/>
<text x="72" y="92" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="34" font-weight="700">neo-zkvm-guest: State Model</text>
<text x="72" y="132" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="19">Neo N4 technical learning diagram - state ownership, transitions, and finality</text>
<rect x="92" y="178" width="500" height="168" rx="8" fill="#0b2451" stroke="#60a5fa" stroke-width="2" filter="url(#shadow)"/>
<rect x="110" y="196" width="42" height="32" rx="6" fill="#020617" stroke="#60a5fa" stroke-width="1"/>
<text x="131" y="219" text-anchor="middle" fill="#60a5fa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">1</text>
<text x="168" y="212" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">neo-zkvm-guest</text>
<text x="118" y="254" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">State model explains what is remembered, committed,</text>
<text x="118" y="276" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">verified, or discarded.</text>
<rect x="630" y="178" width="500" height="168" rx="8" fill="#0b2451" stroke="#60a5fa" stroke-width="2" filter="url(#shadow)"/>
<rect x="648" y="196" width="42" height="32" rx="6" fill="#020617" stroke="#60a5fa" stroke-width="1"/>
<text x="669" y="219" text-anchor="middle" fill="#60a5fa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">2</text>
<text x="706" y="212" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">Input state</text>
<text x="656" y="254" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">public batch input</text>
<text x="656" y="276" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">private witness</text>
<text x="656" y="298" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">shared execution core</text>
<rect x="1168" y="178" width="500" height="168" rx="8" fill="#0b2451" stroke="#60a5fa" stroke-width="2" filter="url(#shadow)"/>
<rect x="1186" y="196" width="42" height="32" rx="6" fill="#020617" stroke="#60a5fa" stroke-width="1"/>
<text x="1207" y="219" text-anchor="middle" fill="#60a5fa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">3</text>
<text x="1244" y="212" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">Working state</text>
<text x="1194" y="254" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">witness, guest frame, prover memory, public-value buffer</text>
<rect x="92" y="376" width="500" height="168" rx="8" fill="#0b2451" stroke="#60a5fa" stroke-width="2" filter="url(#shadow)"/>
<rect x="110" y="394" width="42" height="32" rx="6" fill="#020617" stroke="#60a5fa" stroke-width="1"/>
<text x="131" y="417" text-anchor="middle" fill="#60a5fa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">4</text>
<text x="168" y="410" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">Persistent state</text>
<text x="118" y="452" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">proof record, verification result, state-root commitment</text>
<rect x="630" y="376" width="500" height="168" rx="8" fill="#0b2451" stroke="#60a5fa" stroke-width="2" filter="url(#shadow)"/>
<rect x="648" y="394" width="42" height="32" rx="6" fill="#020617" stroke="#60a5fa" stroke-width="1"/>
<text x="669" y="417" text-anchor="middle" fill="#60a5fa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">5</text>
<text x="706" y="410" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">Transition</text>
<text x="656" y="452" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">guest execution is constrained by public values and</text>
<text x="656" y="474" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">verifier rules</text>
<rect x="1168" y="376" width="500" height="168" rx="8" fill="#0b2451" stroke="#60a5fa" stroke-width="2" filter="url(#shadow)"/>
<rect x="1186" y="394" width="42" height="32" rx="6" fill="#020617" stroke="#60a5fa" stroke-width="1"/>
<text x="1207" y="417" text-anchor="middle" fill="#60a5fa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">6</text>
<text x="1244" y="410" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">Commitment</text>
<text x="1194" y="452" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">state root, public values, verification key, and proof</text>
<text x="1194" y="474" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">digest</text>
<rect x="92" y="574" width="500" height="168" rx="8" fill="#0b2451" stroke="#60a5fa" stroke-width="2" filter="url(#shadow)"/>
<rect x="110" y="592" width="42" height="32" rx="6" fill="#020617" stroke="#60a5fa" stroke-width="1"/>
<text x="131" y="615" text-anchor="middle" fill="#60a5fa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">7</text>
<text x="168" y="608" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">Finality</text>
<text x="118" y="650" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">verifier accepts proof and public output matches target</text>
<text x="118" y="672" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">state</text>
<rect x="630" y="574" width="500" height="168" rx="8" fill="#0b2451" stroke="#60a5fa" stroke-width="2" filter="url(#shadow)"/>
<rect x="648" y="592" width="42" height="32" rx="6" fill="#020617" stroke="#60a5fa" stroke-width="1"/>
<text x="669" y="615" text-anchor="middle" fill="#60a5fa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">8</text>
<text x="706" y="608" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">Rollback or reject</text>
<text x="656" y="650" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">reject proof, public output, or mode; state root does not</text>
<text x="656" y="672" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">advance</text>
<text x="72" y="826" fill="#94a3b8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">Conceptual diagram generated from crate role metadata; not a source-code reading map.</text>
</svg>
