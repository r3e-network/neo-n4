[package]
name = "neo-zkvm-host"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Real SP1 host that loads neo-zkvm-guest's RISC-V ELF, runs it via SP1's prover, and produces a verifiable ZK proof of L2 batch execution."

[dependencies]
sp1-sdk = { version = "6.0", features = ["blocking"] }

[dev-dependencies]
# For test builds — not pulled in for the production lib.
serial_test = "3.0"
neo-zkvm-guest = { path = "../neo-zkvm-guest" }

[[bin]]
name = "prove-batch"
path = "src/bin/prove_batch.rs"

# Embed the guest ELF at compile time.  Set in build.rs to the path produced
# by `cargo prove build` against bridge/neo-zkvm-guest.
build = "build.rs"
