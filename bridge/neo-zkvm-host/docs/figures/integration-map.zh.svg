<rect class="bg" width="1920" height="1180"/>
<text x="56" y="66" class="title">neo-zkvm-host: 集成关系图</text>
<text x="56" y="98" class="subtitle">Neo N4 论文风格技术学习图 - 该单元如何接入更大的 N4 栈</text>
<rect x="56" y="118" width="1808" height="38" rx="6" fill="#ecfdf3" stroke="#047857" stroke-width="1.2"/>
<text x="76" y="143" class="small">读图方式： <tspan class="bodyStrong">技术原理图，不是实现图</tspan> · 边界: prover 无权推进状态；只消费 verifier 接受的输出 · 不负责: 不负责 L1 治理、DA 存储或资产托管</text>
<rect x="56" y="178" width="870" height="390" rx="10" class="panel"/>
<rect x="56" y="178" width="870" height="54" rx="10" fill="#ecfdf3" stroke="#cbd5e1" stroke-width="0"/>
<circle cx="86" cy="206" r="16" fill="#047857"/>
<text x="86" y="211" text-anchor="middle" class="label">a</text>
<text x="114" y="210" class="panelTitle">边界模型</text>
<text x="114" y="230" class="panelSub">谁可以输入、谁被信任、谁消费结果</text>
<rect x="966" y="178" width="898" height="390" rx="10" class="panel"/>
<rect x="966" y="178" width="898" height="54" rx="10" fill="#ecfdf3" stroke="#cbd5e1" stroke-width="0"/>
<circle cx="996" cy="206" r="16" fill="#047857"/>
<text x="996" y="211" text-anchor="middle" class="label">b</text>
<text x="1024" y="210" class="panelTitle">形式化技术模型</text>
<text x="1024" y="230" class="panelSub">把组件看成可验证状态转换</text>
<rect x="56" y="606" width="1240" height="494" rx="10" class="panel"/>
<rect x="56" y="606" width="1240" height="54" rx="10" fill="#ecfdf3" stroke="#cbd5e1" stroke-width="0"/>
<circle cx="86" cy="634" r="16" fill="#047857"/>
<text x="86" y="639" text-anchor="middle" class="label">c</text>
<text x="114" y="638" class="panelTitle">协议 / 数据 / 证明路径</text>
<text x="114" y="658" class="panelSub">关键对象如何穿过执行、提交、证明和消费边界</text>
<rect x="1334" y="606" width="530" height="494" rx="10" class="panel"/>
<rect x="1334" y="606" width="530" height="54" rx="10" fill="#ecfdf3" stroke="#cbd5e1" stroke-width="0"/>
<circle cx="1364" cy="634" r="16" fill="#047857"/>
<text x="1364" y="639" text-anchor="middle" class="label">d</text>
<text x="1392" y="638" class="panelTitle">正确性与运维检查表</text>
<text x="1392" y="658" class="panelSub">读者审计这张图时应检查的条件</text>
<rect x="92" y="276" width="220" height="190" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
<text x="106" y="302" class="bodyStrong">输入域</text>
<text x="106" y="324" class="small">neo-zkvm-host</text>
<text x="106" y="352" class="body">N4 零知识 host</text>
<line x1="354" y1="232" x2="354" y2="530" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="7 7"/>
<text x="354" y="252" class="small" text-anchor="middle" transform="rotate(-90 354 252)">信任边界</text>
<rect x="392" y="246" width="292" height="250" rx="8" fill="#ecfdf3" stroke="#047857" stroke-width="1.5"/>
<text x="406" y="272" class="bodyStrong">neo-zkvm-host</text>
<text x="406" y="294" class="small">L2 执行</text>
<text x="406" y="322" class="body">L2 负责交易执行、状态推进、VM </text>
<text x="406" y="341" class="body">profile 和批次边界。</text>
<line x1="728" y1="232" x2="728" y2="530" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="7 7"/>
<text x="728" y="252" class="small" text-anchor="middle" transform="rotate(-90 728 252)">承诺边界</text>
<rect x="764" y="276" width="132" height="190" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
<text x="778" y="302" class="bodyStrong">消费方</text>
<text x="778" y="324" class="small">Gateway/API</text>
<text x="778" y="352" class="body">Gateway 负责用户</text>
<text x="778" y="371" class="body">路由、查询、提交和</text>
<text x="778" y="390" class="body">健康状态聚合。</text>
