<path class="arrowAccent" d="M684 371 C706 371 730 371 764 371"/>
<text x="392" y="516" class="caption">中间区域只接受规范输入，并只输出可复核的承诺或证据。</text>
<rect x="1000" y="246" width="828" height="68" rx="8" fill="#ecfdf3" stroke="#047857" stroke-width="1.5"/>
<text x="1020" y="288" class="mono">δ(状态, 输入, 见证) → (新状态, 证据, 拒绝)</text>
<rect x="1012" y="340" width="610" height="52" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2"/>
<circle cx="1037" cy="366" r="15" fill="#047857"/>
<text x="1037" y="371" text-anchor="middle" class="label">1</text>
<text x="1062" y="362" class="bodyStrong">L1/原生验证</text>
<text x="1062" y="382" class="small">L1 只消费可检查的承诺、消息或证明结果。</text>
<path class="arrowAccent" d="M1318 392 L1318 410"/>
<rect x="1012" y="410" width="610" height="52" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2"/>
<circle cx="1037" cy="436" r="15" fill="#047857"/>
<text x="1037" y="441" text-anchor="middle" class="label">2</text>
<text x="1062" y="432" class="bodyStrong">L2 执行</text>
<text x="1062" y="452" class="small">L2 负责交易执行、状态推进、VM profile 和批次边界。</text>
<path class="arrowAccent" d="M1318 462 L1318 480"/>
<rect x="1012" y="480" width="610" height="52" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2"/>
<circle cx="1037" cy="506" r="15" fill="#047857"/>
<text x="1037" y="511" text-anchor="middle" class="label">3</text>
<text x="1062" y="502" class="bodyStrong">NeoFS DA</text>
<text x="1062" y="522" class="small">NeoFS 保存批次数据、见证或轨迹摘要以及可取回证据。</text>
<rect x="1660" y="340" width="150" height="190" rx="8" fill="#ffffff" stroke="#047857" stroke-width="1.5"/>
<text x="1674" y="366" class="bodyStrong">证据</text>
<text x="1674" y="388" class="small">证明系统</text>
<text x="1674" y="416" class="body">H(批次) || 新状</text>
<text x="1674" y="435" class="body">态根 || 证明(证</text>
<text x="1674" y="454" class="body">据)</text>
<path class="arrowDash" d="M1622 436 C1642 436 1648 436 1660 436"/>
<text x="1012" y="555" class="mono">接受 ⇔ 确定性 ∧ 已授权 ∧ 可验证</text>
<rect x="92" y="730" width="150" height="120" rx="8" fill="#ecfdf3" stroke="#047857" stroke-width="1.5"/>
<rect x="102" y="740" width="30" height="24" rx="5" fill="#047857"/>
<text x="117" y="757" text-anchor="middle" class="label">1</text>
<text x="140" y="758" class="bodyStrong">neo-zkvm-host</text>
<text x="104" y="788" class="small">N4 零知识 host</text>
<path class="arrowAccent" d="M242 790 L290 790"/>
<text x="266" y="778" class="small">步骤 1</text>
<rect x="290" y="730" width="150" height="120" rx="8" fill="#ecfdf3" stroke="#047857" stroke-width="1.5"/>
<rect x="300" y="740" width="30" height="24" rx="5" fill="#047857"/>
<text x="315" y="757" text-anchor="middle" class="label">2</text>
<text x="338" y="758" class="bodyStrong">L1/原生验证</text>
<text x="302" y="788" class="small">L1 只消费可检查的</text>
<text x="302" y="805" class="small">承诺、消息或证明结</text>
<text x="302" y="822" class="small">果。</text>
<path class="arrowAccent" d="M440 790 L488 790"/>
<text x="464" y="778" class="small">步骤 2</text>
<rect x="488" y="730" width="150" height="120" rx="8" fill="#ecfdf3" stroke="#047857" stroke-width="1.5"/>
<rect x="498" y="740" width="30" height="24" rx="5" fill="#047857"/>
<text x="513" y="757" text-anchor="middle" class="label">3</text>
<text x="536" y="758" class="bodyStrong">L2 执行</text>
<text x="500" y="788" class="small">L2 负责交易执行、</text>
<text x="500" y="805" class="small">状态推进、VM profi</text>
<text x="500" y="822" class="small">le 和批次边界。</text>
<path class="arrowAccent" d="M638 790 L686 790"/>
<text x="662" y="778" class="small">步骤 3</text>
<rect x="686" y="730" width="150" height="120" rx="8" fill="#ecfdf3" stroke="#047857" stroke-width="1.5"/>
<rect x="696" y="740" width="30" height="24" rx="5" fill="#047857"/>
<text x="711" y="757" text-anchor="middle" class="label">4</text>
<text x="734" y="758" class="bodyStrong">NeoFS DA</text>
<text x="698" y="788" class="small">NeoFS 保存批次数</text>
<text x="698" y="805" class="small">据、见证或轨迹摘要</text>
<text x="698" y="822" class="small">以及可取回证据。</text>
<path class="arrowAccent" d="M836 790 L884 790"/>
<text x="860" y="778" class="small">步骤 4</text>
<rect x="884" y="730" width="150" height="120" rx="8" fill="#ecfdf3" stroke="#047857" stroke-width="1.5"/>
<rect x="894" y="740" width="30" height="24" rx="5" fill="#047857"/>
<text x="909" y="757" text-anchor="middle" class="label">5</text>
<text x="932" y="758" class="bodyStrong">证明系统</text>
<text x="896" y="788" class="small">证明系统把 L2 执</text>
<text x="896" y="805" class="small">行声明压缩为可验</text>
<text x="896" y="822" class="small">证证据。</text>
<path class="arrowAccent" d="M1034 790 L1082 790"/>
<text x="1058" y="778" class="small">步骤 5</text>
<rect x="1082" y="730" width="150" height="120" rx="8" fill="#ecfdf3" stroke="#047857" stroke-width="1.5"/>
<rect x="1092" y="740" width="30" height="24" rx="5" fill="#047857"/>
<text x="1107" y="757" text-anchor="middle" class="label">6</text>
<text x="1130" y="758" class="bodyStrong">Gateway/API</text>
<text x="1094" y="788" class="small">Gateway 负责用户</text>
<text x="1094" y="805" class="small">路由、查询、提交和</text>
<text x="1094" y="822" class="small">健康状态聚合。</text>
<path class="arrowDash" d="M182 896 C372 964 832 964 1116 896"/>
<rect x="488" y="904" width="190" height="128" rx="8" fill="#fff1f2" stroke="#dc2626" stroke-width="1.5"/>
<rect x="498" y="914" width="30" height="24" rx="5" fill="#dc2626"/>
<text x="513" y="931" text-anchor="middle" class="label">R</text>
<text x="536" y="932" class="bodyStrong">桥与异构链</text>
<text x="500" y="962" class="small">桥规则统一 L1-L2、</text>
<text x="500" y="979" class="small">L2-L2 和异构链消</text>
<text x="500" y="996" class="small">息与资产。</text>
<path class="arrowFault" d="M560 850 L560 908"/>
<rect x="880" y="904" width="300" height="128" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
<text x="894" y="930" class="bodyStrong">扩展点</text>
<text x="894" y="952" class="small">开发者入口</text>
<text x="894" y="980" class="body">SDK、CLI、模板和示例把系统暴露成可使</text>
<text x="894" y="999" class="body">用的开发体验。</text>
<text x="92" y="1060" class="caption">虚线路径表示证明、见证、审计或可观测证据: 状态根、公开值、验证密钥和证明摘要</text>
<rect x="1368" y="708" width="462" height="310" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2"/>
<rect x="1378" y="718" width="442" height="48" rx="6" fill="#ecfdf3"/>
<text x="1390" y="738" class="bodyStrong">确定性</text>
<text x="1518" y="736" class="small">同一公开输入和见证必须得到同一公开输出与证</text>
<text x="1518" y="753" class="small">明</text>
<rect x="1378" y="776" width="442" height="48" rx="6" fill="#ffffff"/>
<text x="1390" y="796" class="bodyStrong">授权</text>
<text x="1518" y="794" class="small">prover 无权推进状态；只消费 verifier 接受的</text>
<text x="1518" y="811" class="small">输出</text>
<rect x="1378" y="834" width="442" height="48" rx="6" fill="#ecfdf3"/>
<text x="1390" y="854" class="bodyStrong">证据</text>
<text x="1518" y="852" class="small">状态根、公开值、验证密钥和证明摘要</text>
<rect x="1378" y="892" width="442" height="48" rx="6" fill="#ffffff"/>
<text x="1390" y="912" class="bodyStrong">拒绝路径</text>
<text x="1518" y="910" class="small">桥规则统一 L1-L2、L2-L2 和异构链消息与资产。</text>
<rect x="1378" y="950" width="442" height="48" rx="6" fill="#ecfdf3"/>
<text x="1390" y="970" class="bodyStrong">可观测性</text>
<text x="1518" y="968" class="small">proof id、公开输出、验证结果、耗时和失败原因</text>
<line x1="1504" y1="722" x2="1504" y2="998" stroke="#047857" stroke-width="1.2" stroke-dasharray="4 5"/>
<rect x="1368" y="1012" width="462" height="58" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2"/>
<line x1="1386" y1="1030" x2="1432" y2="1030" stroke="#047857" stroke-width="2.6" marker-end="url(#arrowAccent)"/>
<text x="1446" y="1034" class="small">实线：数据 / 状态转移</text>
<line x1="1386" y1="1052" x2="1432" y2="1052" stroke="#64748b" stroke-width="2" stroke-dasharray="7 6" marker-end="url(#arrow)"/>
<text x="1446" y="1056" class="small">虚线：证明 / 观测</text>
<line x1="1660" y1="1052" x2="1704" y2="1052" stroke="#dc2626" stroke-width="2.2" stroke-dasharray="5 5" marker-end="url(#arrowFault)"/>
<text x="1718" y="1056" class="small">红线：拒绝 / 故障</text>
<text x="56" y="1146" class="caption">图表风格：分面架构、形式化状态转换、协议路径、正确性检查表；不展示源码文件或 API 清单。</text>
