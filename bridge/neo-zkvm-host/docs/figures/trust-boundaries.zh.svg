<svg xmlns="http://www.w3.org/2000/svg" width="1760" height="870" viewBox="0 0 1760 870" role="img" aria-label="neo-zkvm-host 信任边界图">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#08111f"/><stop offset="100%" stop-color="#111827"/></linearGradient>
<filter id="shadow" x="-15%" y="-15%" width="130%" height="130%"><feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#020617" flood-opacity="0.42"/></filter>
</defs>
<rect width="1760" height="100%" fill="url(#bg)"/>
<rect x="34" y="34" width="1692" height="802" rx="10" fill="#0f172a" stroke="#334155" stroke-width="2"/>
<text x="72" y="92" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="34" font-weight="700">neo-zkvm-host: 信任边界图</text>
<text x="72" y="132" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="19">Neo N4 技术原理学习图 - 哪些内容被信任、检查、拒绝或观测</text>
<rect x="92" y="178" width="500" height="168" rx="8" fill="#4c0519" stroke="#fb7185" stroke-width="2" filter="url(#shadow)"/>
<rect x="110" y="196" width="42" height="32" rx="6" fill="#020617" stroke="#fb7185" stroke-width="1"/>
<text x="131" y="219" text-anchor="middle" fill="#fb7185" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">1</text>
<text x="168" y="212" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">neo-zkvm-host</text>
<text x="118" y="254" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">信任边界说明哪些假设必须被证明，而不是被相信。</text>
<rect x="630" y="178" width="500" height="168" rx="8" fill="#4c0519" stroke="#fb7185" stroke-width="2" filter="url(#shadow)"/>
<rect x="648" y="196" width="42" height="32" rx="6" fill="#020617" stroke="#fb7185" stroke-width="1"/>
<text x="669" y="219" text-anchor="middle" fill="#fb7185" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">2</text>
<text x="706" y="212" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">可信基</text>
<text x="656" y="254" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">验证密钥、guest 程序哈希、verifier 规则</text>
<rect x="1168" y="178" width="500" height="168" rx="8" fill="#4c0519" stroke="#fb7185" stroke-width="2" filter="url(#shadow)"/>
<rect x="1186" y="196" width="42" height="32" rx="6" fill="#020617" stroke="#fb7185" stroke-width="1"/>
<text x="1207" y="219" text-anchor="middle" fill="#fb7185" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">3</text>
<text x="1244" y="212" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">不可信输入</text>
<text x="1194" y="254" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">L2 批次 | guest ELF | prover 配置</text>
<rect x="92" y="376" width="500" height="168" rx="8" fill="#4c0519" stroke="#fb7185" stroke-width="2" filter="url(#shadow)"/>
<rect x="110" y="394" width="42" height="32" rx="6" fill="#020617" stroke="#fb7185" stroke-width="1"/>
<text x="131" y="417" text-anchor="middle" fill="#fb7185" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">4</text>
<text x="168" y="410" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">验证边界</text>
<text x="118" y="452" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">公开输入、proof envelope、验证密钥和公开输出必须一致</text>
<rect x="630" y="376" width="500" height="168" rx="8" fill="#4c0519" stroke="#fb7185" stroke-width="2" filter="url(#shadow)"/>
<rect x="648" y="394" width="42" height="32" rx="6" fill="#020617" stroke="#fb7185" stroke-width="1"/>
<text x="669" y="417" text-anchor="middle" fill="#fb7185" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">5</text>
<text x="706" y="410" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">重放与顺序</text>
<text x="656" y="452" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">proof 绑定批次范围和状态根，避免跨批次复用</text>
<rect x="1168" y="376" width="500" height="168" rx="8" fill="#4c0519" stroke="#fb7185" stroke-width="2" filter="url(#shadow)"/>
<rect x="1186" y="394" width="42" height="32" rx="6" fill="#020617" stroke="#fb7185" stroke-width="1"/>
<text x="1207" y="417" text-anchor="middle" fill="#fb7185" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">6</text>
<text x="1244" y="410" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">权限模型</text>
<text x="1194" y="452" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">prover 无权推进状态；只消费 verifier 接受的输出</text>
<rect x="92" y="574" width="500" height="168" rx="8" fill="#4c0519" stroke="#fb7185" stroke-width="2" filter="url(#shadow)"/>
<rect x="110" y="592" width="42" height="32" rx="6" fill="#020617" stroke="#fb7185" stroke-width="1"/>
<text x="131" y="615" text-anchor="middle" fill="#fb7185" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">7</text>
<text x="168" y="608" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">外部系统</text>
<text x="118" y="650" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">证明 backend、L1 verifier、NeoFS DA、报告消费者</text>
<rect x="630" y="574" width="500" height="168" rx="8" fill="#4c0519" stroke="#fb7185" stroke-width="2" filter="url(#shadow)"/>
<rect x="648" y="592" width="42" height="32" rx="6" fill="#020617" stroke="#fb7185" stroke-width="1"/>
<text x="669" y="615" text-anchor="middle" fill="#fb7185" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">8</text>
<text x="706" y="608" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">观测证据</text>
<text x="656" y="650" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">proof id、公开输出、验证结果、耗时和失败原因</text>
<text x="72" y="826" fill="#94a3b8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">本图根据 crate 技术角色元数据生成；不是源码阅读图，也不是实现全景图。</text>
</svg>
