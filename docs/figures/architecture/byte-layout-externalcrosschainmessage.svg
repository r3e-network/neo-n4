<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">ExternalCrossChainMessage byte layout (102 + N bytes)</title>
  <desc id="desc">Byte-by-byte canonical wire format for ExternalCrossChainMessage — 11 fields totaling 102 bytes fixed prefix plus N bytes variable payload. The wire format the off-chain watcher signs and the on-chain ExternalBridgeEscrow verifies. Foreign chain (Eth/EVM family / Tron / Solana) to Neo direction primarily; same shape works in reverse with direction flipped. Fields by offset: 0-3 externalChainId (must be 0xE0_xx_xx_xx foreign namespace), 4-7 neoChainId, 8-15 nonce (replay-protected per (externalChainId, nonce)), 16 direction, 17-36 sender (last 20B of source address), 37-56 recipient, 57-64 deadlineUnixSeconds, 65-96 sourceTxRef, 97 messageType, 98-101 payloadLen, 102 to 101+N payload (type-specific encoding).</desc>

  <defs>
    <filter id="card" x="-2%" y="-3%" width="104%" height="106%">
      <feDropShadow dx="0" dy="1" stdDeviation="0.9" flood-color="#000000" flood-opacity="0.07"/>
    </filter>
    <style>
      .header     { font-size: 14.5px; font-weight: 700; }
      .col-h      { font-size: 11.5px; font-weight: 700; fill: #525a64; letter-spacing: 0.4px; }
      .offset     { font-size: 11px; fill: #1e2a55; font-weight: 700; font-family: ui-monospace, 'SF Mono', monospace; }
      .size       { font-size: 11px; fill: #525a64; font-family: ui-monospace, 'SF Mono', monospace; }
      .field      { font-size: 11.5px; fill: #1e2a55; font-weight: 700; font-family: ui-monospace, 'SF Mono', monospace; }
      .desc       { font-size: 10.5px; fill: #2d3a48; }
      .grp        { font-size: 11px; font-weight: 600; letter-spacing: 0.3px; }
      .ftr        { font-size: 10.5px; fill: #525a64; font-style: italic; }
    </style>
  </defs>

  <rect width="960" height="720" fill="#ffffff"/>

  <text x="480" y="30" text-anchor="middle" class="header" fill="#1e2a55">ExternalCrossChainMessage byte layout — 102 + N bytes</text>
  <text x="480" y="50" text-anchor="middle" class="ftr">signed off-chain by watcher · verified on-chain by ExternalBridgeEscrow — Source: src/Neo.L2.Messaging/ExternalMessageHasher.cs</text>

  <text x="60" y="86" class="col-h">OFFSET</text>
  <text x="140" y="86" class="col-h">SIZE</text>
  <text x="200" y="86" class="col-h">FIELD</text>
  <text x="500" y="86" class="col-h">NOTES</text>
  <line x1="40" y1="92" x2="920" y2="92" stroke="#cfd5dd" stroke-width="1"/>

  <text x="20" y="116" class="grp" fill="#88312e">ROUTING</text>
  <rect x="40" y="100" width="880" height="28" rx="4" ry="4" fill="#fde8e8" stroke="#c4413e" stroke-width="0.8"/>
  <text x="80" y="118" class="offset">0</text>
  <text x="148" y="118" class="size">4 B</text>
  <text x="200" y="118" class="field">externalChainId</text>
  <text x="320" y="118" class="size">uint32 LE</text>
  <text x="500" y="118" class="desc">must be 0xE0_xx_xx_xx (foreign namespace)</text>

  <rect x="40" y="130" width="880" height="28" rx="4" ry="4" fill="#fde8e8" stroke="#c4413e" stroke-width="0.8"/>
  <text x="80" y="148" class="offset">4</text>
  <text x="148" y="148" class="size">4 B</text>
  <text x="200" y="148" class="field">neoChainId</text>
  <text x="320" y="148" class="size">uint32 LE</text>
  <text x="500" y="148" class="desc">Neo L2 chain receiving (or sending) the message</text>

  <rect x="40" y="160" width="880" height="28" rx="4" ry="4" fill="#fde8e8" stroke="#c4413e" stroke-width="0.8"/>
  <text x="80" y="178" class="offset">8</text>
  <text x="148" y="178" class="size">8 B</text>
  <text x="200" y="178" class="field">nonce</text>
  <text x="320" y="178" class="size">uint64 LE</text>
  <text x="500" y="178" class="desc">replay-protected per (externalChainId, nonce)</text>

  <rect x="40" y="190" width="880" height="28" rx="4" ry="4" fill="#fde8e8" stroke="#c4413e" stroke-width="0.8"/>
  <text x="80" y="208" class="offset">16</text>
  <text x="148" y="208" class="size">1 B</text>
  <text x="200" y="208" class="field">direction</text>
  <text x="320" y="208" class="size">byte</text>
  <text x="500" y="208" class="desc">1=NeoToForeign · 2=ForeignToNeo</text>

  <text x="20" y="244" class="grp" fill="#1e2a55">PARTICIPANTS</text>
  <rect x="40" y="228" width="880" height="28" rx="4" ry="4" fill="#eff3ff" stroke="#7587c1" stroke-width="0.8"/>
  <text x="80" y="246" class="offset">17</text>
  <text x="148" y="246" class="size">20 B</text>
  <text x="200" y="246" class="field">sender</text>
  <text x="320" y="246" class="size">20 bytes</text>
  <text x="500" y="246" class="desc">last 20B of source-side address</text>

  <rect x="40" y="258" width="880" height="28" rx="4" ry="4" fill="#eff3ff" stroke="#7587c1" stroke-width="0.8"/>
  <text x="80" y="276" class="offset">37</text>
  <text x="148" y="276" class="size">20 B</text>
  <text x="200" y="276" class="field">recipient</text>
  <text x="320" y="276" class="size">20 bytes</text>
  <text x="500" y="276" class="desc">last 20B of destination-side address</text>

  <text x="20" y="312" class="grp" fill="#7a4a14">EXECUTION CONTEXT</text>
  <rect x="40" y="296" width="880" height="28" rx="4" ry="4" fill="#fff2e3" stroke="#cd7c2e" stroke-width="0.8"/>
  <text x="80" y="314" class="offset">57</text>
  <text x="148" y="314" class="size">8 B</text>
  <text x="200" y="314" class="field">deadlineUnixSeconds</text>
  <text x="320" y="314" class="size">uint64 LE</text>
  <text x="500" y="314" class="desc">0 means no deadline</text>

  <rect x="40" y="326" width="880" height="28" rx="4" ry="4" fill="#fff2e3" stroke="#cd7c2e" stroke-width="0.8"/>
  <text x="80" y="344" class="offset">65</text>
  <text x="148" y="344" class="size">32 B</text>
  <text x="200" y="344" class="field">sourceTxRef</text>
  <text x="320" y="344" class="size">32 bytes</text>
  <text x="500" y="344" class="desc">source-side tx hash (or 0 if not yet on-chain)</text>

  <text x="20" y="380" class="grp" fill="#3e2865">PAYLOAD HEADER</text>
  <rect x="40" y="364" width="880" height="28" rx="4" ry="4" fill="#f1ecf8" stroke="#7d59b3" stroke-width="0.8"/>
  <text x="80" y="382" class="offset">97</text>
  <text x="148" y="382" class="size">1 B</text>
  <text x="200" y="382" class="field">messageType</text>
  <text x="320" y="382" class="size">byte</text>
  <text x="500" y="382" class="desc">0=AssetTransfer · 1=Call · 2=AssetAndCall</text>

  <rect x="40" y="394" width="880" height="28" rx="4" ry="4" fill="#f1ecf8" stroke="#7d59b3" stroke-width="0.8"/>
  <text x="80" y="412" class="offset">98</text>
  <text x="148" y="412" class="size">4 B</text>
  <text x="200" y="412" class="field">payloadLen</text>
  <text x="320" y="412" class="size">int32 LE</text>
  <text x="500" y="412" class="desc">length of payload bytes</text>

  <line x1="40" y1="438" x2="920" y2="438" stroke="#525a64" stroke-width="1.4" stroke-dasharray="6 3"/>
  <text x="480" y="454" text-anchor="middle" class="grp" fill="#525a64">────── end of fixed 102-byte prefix ──────</text>

  <rect x="40" y="464" width="880" height="56" rx="4" ry="4" fill="#f1ecf8" stroke="#7d59b3" stroke-width="1.4" stroke-dasharray="3 2"/>
  <text x="80" y="482" class="offset">102</text>
  <text x="148" y="482" class="size">N B</text>
  <text x="200" y="482" class="field">payload</text>
  <text x="320" y="482" class="size">N = payloadLen bytes</text>
  <text x="500" y="482" class="desc" font-style="italic">type-specific encoding:</text>
  <text x="500" y="498" class="desc">  · AssetTransfer (=0): 20B foreignAsset + 4B amountLen + N B amount LE</text>
  <text x="500" y="514" class="desc">  · Call (=1) / AssetAndCall (=2): reserved — v0 contract rejects</text>

  <line x1="40" y1="538" x2="920" y2="538" stroke="#525a64" stroke-width="1"/>
  <text x="148" y="556" class="size" font-weight="700" fill="#1e2a55">TOTAL</text>
  <text x="200" y="556" class="field" font-size="13">102 + N bytes</text>

  <line x1="40" y1="578" x2="920" y2="578" stroke="#cfd5dd" stroke-width="1"/>
  <text x="60" y="604" class="ftr" font-weight="600" fill="#1e2a55">Foreign-namespace prefix:</text>
  <text x="60" y="622" class="ftr">externalChainId MUST satisfy (externalChainId &amp; 0xFF000000) == 0xE0000000. Both on-chain verifier and</text>
  <text x="60" y="638" class="ftr">off-chain encoder enforce this. 16-slot family-bank allocation covers Eth / BSC / Polygon / Arbitrum /</text>
  <text x="60" y="654" class="ftr">Optimism / Base / Avalanche / Linea / zkSync / Scroll / Mantle / Fantom / Celo / Tron.</text>

  <text x="60" y="680" class="ftr" font-weight="600" fill="#1e2a55">Cryptographic boundary:</text>
  <text x="60" y="700" class="ftr">watcher signs sha256(canonical_bytes) with secp256k1+SHA256 (Eth/Tron/EVM family) or ed25519 (Solana).</text>
</svg>
