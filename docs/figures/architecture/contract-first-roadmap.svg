<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 700" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">Neo N4 contract-first technical roadmap</title>
  <desc id="desc">Contract-first Neo N4 roadmap: NeoHub is deployed as L1 contracts, ContractZkVerifier routes to deployable verifier contracts, NeoFS is the default DA layer, NeoVM2/RISC-V is the canonical L2 execution profile, optional VM profiles and heterogeneous bridges plug in around the core stack.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#47648f"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font-size: 24px; font-weight: 750; fill: #132238; }
      .subtitle { font-size: 13px; fill: #536174; }
      .lane { fill: #ffffff; stroke: #c9d4e4; stroke-width: 1.5; rx: 12; }
      .card { fill: #eef6ff; stroke: #5f8fc7; stroke-width: 1.5; rx: 10; }
      .card2 { fill: #eefbf3; stroke: #39a46a; stroke-width: 1.5; rx: 10; }
      .card3 { fill: #fff7e8; stroke: #d99421; stroke-width: 1.5; rx: 10; }
      .card4 { fill: #f5f0ff; stroke: #8b6bd6; stroke-width: 1.5; rx: 10; }
      .label { font-size: 15px; font-weight: 700; fill: #172336; }
      .small { font-size: 11.5px; fill: #44546a; }
      .chip { font-size: 11px; font-weight: 650; fill: #172336; }
      .line { stroke: #47648f; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 6 5; }
    </style>
  </defs>
  <rect width="1120" height="700" class="bg"/>
  <text x="560" y="42" text-anchor="middle" class="title">Neo N4 Contract-First Technical Roadmap</text>
  <text x="560" y="66" text-anchor="middle" class="subtitle">Minimal L1 core changes, deployable NeoHub contracts, NeoFS DA, NeoVM2/RISC-V default execution, pluggable VM and bridge profiles.</text>

  <rect x="40" y="100" width="1040" height="100" class="lane"/>
  <text x="64" y="128" class="label">L1 Anchor: NeoHub as deployed contracts</text>
  <rect x="64" y="146" width="190" height="34" class="card2"/>
  <text x="159" y="168" text-anchor="middle" class="chip">SharedBridge</text>
  <rect x="282" y="146" width="190" height="34" class="card2"/>
  <text x="377" y="168" text-anchor="middle" class="chip">SettlementManager</text>
  <rect x="500" y="146" width="190" height="34" class="card2"/>
  <text x="595" y="168" text-anchor="middle" class="chip">VerifierRegistry</text>
  <rect x="718" y="146" width="190" height="34" class="card2"/>
  <text x="813" y="168" text-anchor="middle" class="chip">Governance / Emergency</text>

  <rect x="40" y="245" width="1040" height="135" class="lane"/>
  <text x="64" y="273" class="label">ZK route: deployable router and verifier contracts</text>
  <rect x="64" y="300" width="220" height="52" class="card"/>
  <text x="174" y="322" text-anchor="middle" class="label">ContractZkVerifier</text>
  <text x="174" y="342" text-anchor="middle" class="small">Envelope + VK + dispatch</text>
  <rect x="382" y="300" width="220" height="52" class="card"/>
  <text x="492" y="322" text-anchor="middle" class="label">Proof Verifier Contract</text>
  <text x="492" y="342" text-anchor="middle" class="small">SP1 / Risc0 / Halo2 / Axiom ABI</text>
  <rect x="700" y="300" width="260" height="52" class="card4"/>
  <text x="830" y="322" text-anchor="middle" class="label">Optional Native Plugin Adapter</text>
  <text x="830" y="342" text-anchor="middle" class="small">Same ABI, not a required L1 dependency</text>
  <path d="M284 326 H374" class="line"/>
  <path d="M602 326 H692" class="line dashed"/>

  <rect x="40" y="425" width="500" height="190" class="lane"/>
  <text x="64" y="453" class="label">L2 execution profile roadmap</text>
  <rect x="64" y="480" width="205" height="50" class="card3"/>
  <text x="166" y="501" text-anchor="middle" class="label">NeoVM2 / RISC-V</text>
  <text x="166" y="520" text-anchor="middle" class="small">Canonical default via PolkaVM</text>
  <rect x="305" y="480" width="205" height="50" class="card4"/>
  <text x="408" y="501" text-anchor="middle" class="label">Optional VM Profiles</text>
  <text x="408" y="520" text-anchor="middle" class="small">EVM, WASM, Move, custom</text>
  <rect x="64" y="552" width="446" height="38" class="card2"/>
  <text x="287" y="576" text-anchor="middle" class="chip">Built-in L2 NEO/GAS + USDT/USDC/BTC asset catalog with decimals</text>

  <rect x="580" y="425" width="500" height="190" class="lane"/>
  <text x="604" y="453" class="label">Data availability and interoperability</text>
  <rect x="604" y="480" width="205" height="50" class="card2"/>
  <text x="706" y="501" text-anchor="middle" class="label">NeoFS DA</text>
  <text x="706" y="520" text-anchor="middle" class="small">Default DA, content addressed</text>
  <rect x="845" y="480" width="205" height="50" class="card"/>
  <text x="948" y="501" text-anchor="middle" class="label">Generic Bridge</text>
  <text x="948" y="520" text-anchor="middle" class="small">EVM family, Tron, Solana, Avalanche</text>
  <rect x="604" y="552" width="446" height="38" class="card3"/>
  <text x="827" y="576" text-anchor="middle" class="chip">Gateway aggregates proofs and global message roots when enabled</text>

  <path d="M595 180 V292" class="line"/>
  <path d="M174 352 C174 400 166 410 166 470" class="line"/>
  <path d="M492 352 C492 395 706 400 706 470" class="line"/>
</svg>
