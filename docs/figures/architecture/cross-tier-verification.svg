<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 1080" font-family="'Noto Sans CJK SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">Cross-tier verification chain — same bytes, hashed multiple times</title>
  <desc id="desc">Step-by-step verification chain a single bridge transaction crosses. Step 1: user signs L1 tx with Secp256r1 — user owns key. Neo L1 dBFT verifies and commits, SharedBridge locks asset, emits DepositReady. The CrossChainMessage canonical bytes are hashed by MessageHasher. Step 2-4: L2 batcher reads Blockchain events directly, NeoVM applies the deposit on L2, L2 receipt commits to it (trust = reads events directly). L2 batcher seals batch with txRoot, receiptRoot, postStateRoot, publicInputHash. The L2BatchCommitment canonical bytes (321+N) flow into Step 5-6: SP1 zkVM proves execute_batch and the proof's public-input matches the on-chain publicInputHash recomputed by SettlementManager (trust = math). Neo L1 SettlementManager accepts the batch as canonical and emits SettlementAccepted. Step 7-9: L2 user later makes a withdrawal at batch B, batch B's withdrawalRoot contains the user's withdrawal leaf, user submits Merkle proof on L1, SharedBridge.FinalizeWithdrawalWithProof keccak/sha256-chains the leaf to the withdrawalRoot (trust = hash collision-resistance), and the asset is released.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#525a64"/>
    </marker>
    <filter id="card" x="-2%" y="-3%" width="104%" height="106%">
      <feDropShadow dx="0" dy="1" stdDeviation="0.9" flood-color="#000000" flood-opacity="0.07"/>
    </filter>
    <style>
      .header     { font-size: 14.5px; font-weight: 700; }
      .step-num   { font-size: 11.5px; font-weight: 700; fill: #c4413e; }
      .step-t     { font-size: 11.5px; fill: #2d3a48; }
      .actor-t    { font-size: 12.5px; font-weight: 700; }
      .actor-s    { font-size: 11px; fill: #2d3a48; }
      .bytes-t    { font-size: 11.5px; font-weight: 700; fill: #1e2a55; font-family: 'Noto Sans Mono CJK SC', ui-monospace, 'SF Mono', monospace; }
      .bytes-s    { font-size: 10.5px; fill: #525a64; font-style: italic; }
      .trust-t    { font-size: 11px; font-weight: 700; }
      .trust-s    { font-size: 10.5px; fill: #525a64; font-style: italic; }
    </style>
  </defs>

  <rect width="960" height="1080" fill="#ffffff"/>

  <text x="480" y="32" text-anchor="middle" class="header" fill="#1e2a55">Cross-tier verification chain — same bytes, hashed at every step</text>

  <!-- Step 1: User signs L1 tx -->
  <g filter="url(#card)">
    <rect x="200" y="60" width="380" height="60" rx="8" ry="8" fill="#ffffff" stroke="#7587c1" stroke-width="1.2"/>
    <text x="220" y="84" class="step-num">1.</text>
    <text x="240" y="84" class="actor-t" fill="#1e2a55">User signs L1 tx</text>
    <text x="240" y="104" class="step-t">Secp256r1 signature over canonical L1 transaction bytes</text>
  </g>
  <g>
    <rect x="610" y="68" width="190" height="44" rx="6" ry="6" fill="#fde8e8" stroke="#c4413e" stroke-width="1"/>
    <text x="705" y="86" text-anchor="middle" class="trust-t" fill="#88312e">trust:</text>
    <text x="705" y="104" text-anchor="middle" class="trust-s">user owns key</text>
  </g>
  <line x1="390" y1="120" x2="390" y2="148" stroke="#525a64" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- Box: Neo L1 dBFT verifies + commits -->
  <g filter="url(#card)">
    <rect x="200" y="150" width="380" height="74" rx="8" ry="8" fill="#eff3ff" stroke="#7587c1" stroke-width="1.4"/>
    <text x="390" y="174" text-anchor="middle" class="actor-t" fill="#1e2a55">Neo L1 — dBFT verifies + commits</text>
    <text x="390" y="194" text-anchor="middle" class="actor-s">SharedBridge locks asset</text>
    <text x="390" y="210" text-anchor="middle" class="actor-s">emits DepositReady event</text>
  </g>
  <line x1="390" y1="224" x2="390" y2="252" stroke="#525a64" stroke-width="1.4"/>

  <!-- Bytes: CrossChainMessage -->
  <g filter="url(#card)">
    <rect x="280" y="252" width="220" height="56" rx="8" ry="8" fill="#fff2e3" stroke="#cd7c2e" stroke-width="1.3"/>
    <text x="390" y="274" text-anchor="middle" class="bytes-t">CrossChainMessage</text>
    <text x="390" y="292" text-anchor="middle" class="bytes-s">canonical bytes (MessageHasher)</text>
  </g>
  <text x="610" y="280" class="bytes-s" fill="#cd7c2e">hash = sha256(canonical_bytes)</text>
  <line x1="390" y1="308" x2="390" y2="336" stroke="#525a64" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- Step 2-4: L2 batcher reads + replays -->
  <g filter="url(#card)">
    <rect x="200" y="338" width="380" height="116" rx="8" ry="8" fill="#e7f4eb" stroke="#3a8454" stroke-width="1.3"/>
    <text x="220" y="362" class="step-num">2.</text>
    <text x="240" y="362" class="step-t" fill="#1d4d2c"><tspan font-weight="600">L2 batcher reads + replays</tspan></text>
    <text x="220" y="386" class="step-num">3.</text>
    <text x="240" y="386" class="step-t" fill="#1d4d2c"><tspan font-weight="600">NeoVM applies the deposit on L2</tspan></text>
    <text x="220" y="410" class="step-num">4.</text>
    <text x="240" y="410" class="step-t" fill="#1d4d2c"><tspan font-weight="600">L2 receipt commits to it</tspan></text>
    <text x="240" y="432" class="actor-s">(deposit minted into L2 user's wrapped balance)</text>
  </g>
  <g>
    <rect x="610" y="362" width="190" height="62" rx="6" ry="6" fill="#fde8e8" stroke="#c4413e" stroke-width="1"/>
    <text x="705" y="382" text-anchor="middle" class="trust-t" fill="#88312e">trust:</text>
    <text x="705" y="400" text-anchor="middle" class="trust-s">reads Blockchain</text>
    <text x="705" y="416" text-anchor="middle" class="trust-s">events directly</text>
  </g>
  <line x1="390" y1="454" x2="390" y2="482" stroke="#525a64" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- Box: L2 batcher seals batch -->
  <g filter="url(#card)">
    <rect x="200" y="484" width="380" height="100" rx="8" ry="8" fill="#e7f4eb" stroke="#3a8454" stroke-width="1.4"/>
    <text x="390" y="508" text-anchor="middle" class="actor-t" fill="#1d4d2c">L2 batcher seals batch</text>
    <text x="390" y="528" text-anchor="middle" class="actor-s">· txRoot      (Merkle of txs)</text>
    <text x="390" y="544" text-anchor="middle" class="actor-s">· receiptRoot (Merkle of recs)</text>
    <text x="390" y="560" text-anchor="middle" class="actor-s">· postStateRoot · publicInputHash</text>
  </g>
  <line x1="390" y1="584" x2="390" y2="612" stroke="#525a64" stroke-width="1.4"/>

  <!-- Bytes: L2BatchCommitment -->
  <g filter="url(#card)">
    <rect x="280" y="612" width="220" height="56" rx="8" ry="8" fill="#fff2e3" stroke="#cd7c2e" stroke-width="1.3"/>
    <text x="390" y="634" text-anchor="middle" class="bytes-t">L2BatchCommitment</text>
    <text x="390" y="652" text-anchor="middle" class="bytes-s">BatchSerializer · 321+N bytes</text>
  </g>
  <line x1="390" y1="668" x2="390" y2="696" stroke="#525a64" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- Step 5-6: SP1 zkVM proves -->
  <g filter="url(#card)">
    <rect x="200" y="698" width="380" height="92" rx="8" ry="8" fill="#f1ecf8" stroke="#7d59b3" stroke-width="1.3"/>
    <text x="220" y="722" class="step-num">5.</text>
    <text x="240" y="722" class="step-t" fill="#3e2865"><tspan font-weight="600">SP1 zkVM proves execute_batch(payload)</tspan></text>
    <text x="220" y="748" class="step-num">6.</text>
    <text x="240" y="748" class="step-t" fill="#3e2865"><tspan font-weight="600">Proof's public-input == on-chain publicInputHash</tspan></text>
    <text x="240" y="768" class="actor-s">(recomputed by SettlementManager from commitment fields)</text>
  </g>
  <g>
    <rect x="610" y="722" width="190" height="46" rx="6" ry="6" fill="#fde8e8" stroke="#c4413e" stroke-width="1"/>
    <text x="705" y="740" text-anchor="middle" class="trust-t" fill="#88312e">trust: math</text>
    <text x="705" y="758" text-anchor="middle" class="trust-s">(proof IS verification)</text>
  </g>
  <line x1="390" y1="790" x2="390" y2="818" stroke="#525a64" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- Box: SettlementManager accepts -->
  <g filter="url(#card)">
    <rect x="200" y="820" width="380" height="60" rx="8" ry="8" fill="#eff3ff" stroke="#7587c1" stroke-width="1.4"/>
    <text x="390" y="844" text-anchor="middle" class="actor-t" fill="#1e2a55">Neo L1 — SettlementManager accepts batch</text>
    <text x="390" y="864" text-anchor="middle" class="actor-s">emits SettlementAccepted (canonical state root)</text>
  </g>
  <line x1="390" y1="880" x2="390" y2="908" stroke="#525a64" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- Step 7-8 + 9: withdrawal -->
  <g filter="url(#card)">
    <rect x="200" y="910" width="380" height="92" rx="8" ry="8" fill="#e7f4eb" stroke="#3a8454" stroke-width="1.3"/>
    <text x="220" y="934" class="step-num">7.</text>
    <text x="240" y="934" class="step-t" fill="#1d4d2c"><tspan font-weight="600">L2 user withdraws at later batch B</tspan></text>
    <text x="240" y="952" class="actor-s">batch B's withdrawalRoot contains user's withdrawal leaf</text>
    <text x="220" y="970" class="step-num">8.</text>
    <text x="240" y="970" class="step-t" fill="#1d4d2c"><tspan font-weight="600">User submits Merkle proof on L1</tspan></text>
    <text x="220" y="988" class="step-num">9.</text>
    <text x="240" y="988" class="step-t" fill="#1d4d2c"><tspan font-weight="600">SharedBridge.FinalizeWithdrawalWithProof → asset released</tspan></text>
  </g>
  <g>
    <rect x="610" y="934" width="190" height="62" rx="6" ry="6" fill="#fde8e8" stroke="#c4413e" stroke-width="1"/>
    <text x="705" y="954" text-anchor="middle" class="trust-t" fill="#88312e">trust:</text>
    <text x="705" y="972" text-anchor="middle" class="trust-s">hash collision-</text>
    <text x="705" y="988" text-anchor="middle" class="trust-s">resistance</text>
  </g>

  <!-- Footer note -->
  <text x="480" y="1040" text-anchor="middle" class="bytes-s" fill="#525a64">Same canonical bytes get hashed by different actors in different places.</text>
  <text x="480" y="1060" text-anchor="middle" class="bytes-s" fill="#525a64">No party can "unsign" or "re-sign" — the bytes commit to themselves.</text>
</svg>
