<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">L2 deployment flow — 4 ordered steps</title>
  <desc id="desc">Four-step deployment of a new L2: Step 1 deploy NeoHub (one-time, per network) — neo-hub-deploy plan emits a 20-step bundle that operator wallet submits, leaving the full L1 contract suite live. Step 2 register a single L2 chain — neo-stack register-chain emits a ChainRegistry.RegisterChain plan; once submitted, the L2 has a chainId and configBytes on L1. Step 3 deploy the L2 bridge adapter — neo-stack deploy-bridge-adapter emits an L2NativeBridgeContract deploy plan. Step 4 wire the messaging adapter (optional) — operator deploys L2MessageContract and calls MessageRouter.RegisterAdapter to enable cross-L2 messaging.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#525a64"/>
    </marker>
    <filter id="card" x="-2%" y="-3%" width="104%" height="106%">
      <feDropShadow dx="0" dy="1" stdDeviation="0.9" flood-color="#000000" flood-opacity="0.07"/>
    </filter>
    <style>
      .header     { font-size: 14.5px; font-weight: 700; }
      .step-num   { font-size: 26px; font-weight: 800; }
      .step-t     { font-size: 14px; font-weight: 700; }
      .step-cad   { font-size: 11px; fill: #525a64; font-style: italic; }
      .body       { font-size: 11.5px; fill: #2d3a48; }
      .caption    { font-size: 11px; fill: #525a64; }
      .cli        { font-size: 10.5px; fill: #1e2a55; font-family: ui-monospace, 'SF Mono', monospace; }
    </style>
  </defs>

  <rect width="960" height="540" fill="#ffffff"/>

  <text x="480" y="36" text-anchor="middle" class="header" fill="#1e2a55">L2 deployment flow — 4 ordered steps</text>

  <!-- Step 1: Deploy NeoHub -->
  <g filter="url(#card)">
    <rect x="60" y="76" width="840" height="100" rx="10" ry="10" fill="#eff3ff" stroke="#7587c1" stroke-width="1.4"/>
    <text x="92" y="116" class="step-num" fill="#3f5193">1</text>
    <text x="138" y="106" class="step-t" fill="#1e2a55">Deploy NeoHub</text>
    <text x="138" y="124" class="step-cad">one-time, per network</text>
    <text x="138" y="148" class="cli">$ dotnet run --project tools/Neo.Hub.Deploy -- plan</text>
    <text x="138" y="164" class="body">→ 20-step ordered deploy bundle (SharedBridge · SettlementManager · ChainRegistry · MessageRouter · ...)</text>
  </g>
  <line x1="480" y1="176" x2="480" y2="216" stroke="#525a64" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- Step 2: Register chain -->
  <g filter="url(#card)">
    <rect x="60" y="218" width="840" height="100" rx="10" ry="10" fill="#fff2e3" stroke="#cd7c2e" stroke-width="1.4"/>
    <text x="92" y="258" class="step-num" fill="#a96027">2</text>
    <text x="138" y="248" class="step-t" fill="#7a4a14">Register one L2 chain</text>
    <text x="138" y="266" class="step-cad">per chain</text>
    <text x="138" y="290" class="cli">$ neo-stack register-chain --config chain.config.json</text>
    <text x="138" y="306" class="body">→ ChainRegistry.RegisterChain plan; once wallet submits, L2 has chainId + configBytes recorded on L1</text>
  </g>
  <line x1="480" y1="318" x2="480" y2="358" stroke="#525a64" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- Step 3: Deploy L2 bridge -->
  <g filter="url(#card)">
    <rect x="60" y="360" width="840" height="100" rx="10" ry="10" fill="#e7f4eb" stroke="#3a8454" stroke-width="1.4"/>
    <text x="92" y="400" class="step-num" fill="#2f5e3c">3</text>
    <text x="138" y="390" class="step-t" fill="#1d4d2c">Deploy L2 bridge adapter</text>
    <text x="138" y="408" class="step-cad">per chain</text>
    <text x="138" y="432" class="cli">$ neo-stack deploy-bridge-adapter --chain-id 1099</text>
    <text x="138" y="448" class="body">→ L2NativeBridgeContract deploy plan; once wallet submits, cross-tier (L1↔L2) transfers are enabled</text>
  </g>
  <line x1="480" y1="460" x2="480" y2="492" stroke="#525a64" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- Step 4 (optional): Messaging adapter -->
  <g filter="url(#card)">
    <rect x="60" y="494" width="840" height="38" rx="8" ry="8" fill="#f1ecf8" stroke="#7d59b3" stroke-width="1.2" stroke-dasharray="3 2"/>
    <text x="92" y="520" class="step-num" fill="#5d4084" font-size="20px">4</text>
    <text x="138" y="514" class="step-t" fill="#3e2865" font-size="13px">Wire messaging adapter <tspan font-style="italic" font-size="11px" fill="#525a64">(optional, per chain)</tspan></text>
    <text x="138" y="528" class="cli">deploy L2MessageContract; call MessageRouter.RegisterAdapter(chainId, l2MessageHash) → cross-L2 messaging enabled</text>
  </g>
</svg>
