<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 920" font-family="'Noto Sans CJK SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">What L1 does — the 6 concerns of NeoHub</title>
  <desc id="desc">The 23 NeoHub L1 contracts grouped into six concerns. Settlement (SettlementManager, VerifierRegistry — defines the trust boundary). Bridge (SharedBridge, TokenRegistry, ChainRegistry — assets are on L1). Messaging (MessageRouter, DARegistry, DAValidator, L1TxFilter — cross-L2 routing and data-availability arbiter). Security (SequencerRegistry, SequencerBond, ForcedInclusion, OptimisticChallenge — slashable bonds + anti-censorship). Governance and emergency (GovernanceController, EmergencyManager — staged upgrade + escape hatch). External bridge (MpcCommitteeVerifier, ExternalBridgeRegistry, ExternalBridgeEscrow, ExternalBridgeBond, MpcCommitteeFraudVerifier, ExternalBridgeStubVerifier). Plus two specialized fraud verifier slots: GovernanceFraudVerifier (structural v1/v2, governance-arbitrated) and RestrictedExecutionFraudVerifier (trustless v3, re-derives pre/post state roots from storage proofs).</desc>

  <defs>
    <filter id="card" x="-2%" y="-3%" width="104%" height="106%">
      <feDropShadow dx="0" dy="1" stdDeviation="0.9" flood-color="#000000" flood-opacity="0.07"/>
    </filter>
    <style>
      .header     { font-size: 14.5px; font-weight: 700; }
      .grp-t      { font-size: 13.5px; font-weight: 700; letter-spacing: 0.3px; }
      .grp-s      { font-size: 11px; fill: #525a64; font-style: italic; }
      .ctr-name   { font-size: 11px; font-weight: 600; fill: #1e2a55; font-family: 'Noto Sans Mono CJK SC', ui-monospace, 'SF Mono', monospace; }
      .ctr-desc   { font-size: 10.5px; fill: #2d3a48; }
      .why-t      { font-size: 10.5px; font-weight: 700; fill: #c4413e; }
      .why-s      { font-size: 10.5px; fill: #2d3a48; }
    </style>
  </defs>

  <rect width="960" height="920" fill="#ffffff"/>

  <text x="480" y="32" text-anchor="middle" class="header" fill="#1e2a55">What L1 does — the 6 concerns of NeoHub (23 contracts)</text>

  <!-- Row 1 left: Settlement -->
  <g filter="url(#card)">
    <rect x="40" y="58" width="440" height="170" rx="10" ry="10" fill="#eff3ff" stroke="#7587c1" stroke-width="1.5"/>
    <text x="60" y="82" class="grp-t" fill="#1e2a55">Settlement</text>
    <text x="160" y="82" class="grp-s">— the trust boundary</text>
    <line x1="56" y1="92" x2="464" y2="92" stroke="#7587c1" stroke-dasharray="3 2"/>
    <text x="60" y="116" class="ctr-name">SettlementManager</text>
    <text x="220" y="116" class="ctr-desc">→ accepts L2 batches; emits canonical state</text>
    <text x="60" y="138" class="ctr-name">VerifierRegistry</text>
    <text x="220" y="138" class="ctr-desc">→ dispatches by proofType; protocol-versioned</text>
    <line x1="56" y1="156" x2="464" y2="156" stroke="#cfd5dd"/>
    <text x="60" y="178" class="why-t">WHY L1:</text>
    <foreignObject x="120" y="164" width="350" height="60">
      <p xmlns="http://www.w3.org/1999/xhtml" style="font: 10.5px -apple-system, sans-serif; margin: 0; color: #2d3a48; line-height: 1.45;">
        defines what "L2 finalized" means. Cannot live on L2 — would
        be circular (L2 deciding L2's own validity).
      </p>
    </foreignObject>
  </g>

  <!-- Row 1 right: Bridge -->
  <g filter="url(#card)">
    <rect x="490" y="58" width="430" height="170" rx="10" ry="10" fill="#eff3ff" stroke="#7587c1" stroke-width="1.5"/>
    <text x="510" y="82" class="grp-t" fill="#1e2a55">Bridge</text>
    <text x="582" y="82" class="grp-s">— asset escrow</text>
    <line x1="506" y1="92" x2="904" y2="92" stroke="#7587c1" stroke-dasharray="3 2"/>
    <text x="510" y="116" class="ctr-name">SharedBridge</text>
    <text x="640" y="116" class="ctr-desc">→ escrows assets, releases on Merkle proof</text>
    <text x="510" y="138" class="ctr-name">TokenRegistry</text>
    <text x="640" y="138" class="ctr-desc">→ symbol / decimals / native chain</text>
    <text x="510" y="158" class="ctr-name">ChainRegistry</text>
    <text x="640" y="158" class="ctr-desc">→ stores per-chain 91-byte config</text>
    <line x1="506" y1="170" x2="904" y2="170" stroke="#cfd5dd"/>
    <text x="510" y="192" class="why-t">WHY L1:</text>
    <foreignObject x="570" y="178" width="340" height="60">
      <p xmlns="http://www.w3.org/1999/xhtml" style="font: 10.5px -apple-system, sans-serif; margin: 0; color: #2d3a48; line-height: 1.45;">
        assets ARE on L1; escrow has to be where the assets are.
        ChainRegistry must be on L1 — all L2s + all bridges read it.
      </p>
    </foreignObject>
  </g>

  <!-- Row 2 left: Messaging -->
  <g filter="url(#card)">
    <rect x="40" y="244" width="440" height="146" rx="10" ry="10" fill="#eff3ff" stroke="#7587c1" stroke-width="1.5"/>
    <text x="60" y="268" class="grp-t" fill="#1e2a55">Messaging</text>
    <text x="170" y="268" class="grp-s">— cross-L2 routing + DA policy</text>
    <line x1="56" y1="278" x2="464" y2="278" stroke="#7587c1" stroke-dasharray="3 2"/>
    <text x="60" y="302" class="ctr-name">MessageRouter</text>
    <text x="220" y="302" class="ctr-desc">→ routes msgs between L2s; canonical hashes</text>
    <text x="60" y="324" class="ctr-name">DARegistry</text>
    <text x="220" y="324" class="ctr-desc">→ records published daCommitment hashes</text>
    <text x="60" y="346" class="ctr-name">DAValidator / L1TxFilter</text>
    <text x="220" y="346" class="ctr-desc">→ validates DA + gates inbound txs</text>
    <line x1="56" y1="356" x2="464" y2="356" stroke="#cfd5dd"/>
    <text x="60" y="378" class="why-t">WHY L1:</text>
    <foreignObject x="120" y="364" width="350" height="24">
      <p xmlns="http://www.w3.org/1999/xhtml" style="font: 10.5px -apple-system, sans-serif; margin: 0; color: #2d3a48; line-height: 1.45;">
        L2-A → L2-B has no other trust anchor. Both endpoints share
        L1 as the routing arbiter.
      </p>
    </foreignObject>
  </g>

  <!-- Row 2 right: Security (highlighted red border) -->
  <g filter="url(#card)">
    <rect x="490" y="244" width="430" height="146" rx="10" ry="10" fill="#fde8e8" stroke="#c4413e" stroke-width="1.5"/>
    <text x="510" y="268" class="grp-t" fill="#88312e">Security</text>
    <text x="592" y="268" class="grp-s">— slashable bonds + anti-censorship</text>
    <line x1="506" y1="278" x2="904" y2="278" stroke="#c4413e" stroke-dasharray="3 2"/>
    <text x="510" y="298" class="ctr-name">SequencerRegistry</text>
    <text x="640" y="298" class="ctr-desc">+ SequencerBond (slashable)</text>
    <text x="510" y="318" class="ctr-name">ForcedInclusion</text>
    <text x="640" y="318" class="ctr-desc">+ OptimisticChallenge (bisection)</text>
    <line x1="506" y1="332" x2="904" y2="332" stroke="#cfd5dd"/>
    <text x="510" y="354" class="why-t">WHY L1:</text>
    <foreignObject x="570" y="340" width="340" height="50">
      <p xmlns="http://www.w3.org/1999/xhtml" style="font: 10.5px -apple-system, sans-serif; margin: 0; color: #2d3a48; line-height: 1.45;">
        bonds need L1's economic security to be meaningfully
        slashable. Forced inclusion has to be L1 — else a censoring
        sequencer would also control censorship-resistance.
      </p>
    </foreignObject>
  </g>

  <!-- Row 3 left: Governance + Emergency -->
  <g filter="url(#card)">
    <rect x="40" y="406" width="440" height="146" rx="10" ry="10" fill="#eff3ff" stroke="#7587c1" stroke-width="1.5"/>
    <text x="60" y="430" class="grp-t" fill="#1e2a55">Governance + Emergency</text>
    <line x1="56" y1="440" x2="464" y2="440" stroke="#7587c1" stroke-dasharray="3 2"/>
    <text x="60" y="464" class="ctr-name">GovernanceController</text>
    <text x="240" y="464" class="ctr-desc">→ multisig + timelock for upgrades</text>
    <text x="60" y="486" class="ctr-name">EmergencyManager</text>
    <text x="240" y="486" class="ctr-desc">→ operator-multisig pause</text>
    <line x1="56" y1="500" x2="464" y2="500" stroke="#cfd5dd"/>
    <text x="60" y="522" class="why-t">WHY L1:</text>
    <foreignObject x="120" y="508" width="350" height="40">
      <p xmlns="http://www.w3.org/1999/xhtml" style="font: 10.5px -apple-system, sans-serif; margin: 0; color: #2d3a48; line-height: 1.45;">
        upgrades need slow + multi-sig — L1 finality + visibility.
        Emergency pause must outlast any single L2's outage.
      </p>
    </foreignObject>
  </g>

  <!-- Row 3 right: External bridge -->
  <g filter="url(#card)">
    <rect x="490" y="406" width="430" height="146" rx="10" ry="10" fill="#fff2e3" stroke="#cd7c2e" stroke-width="1.5"/>
    <text x="510" y="430" class="grp-t" fill="#7a4a14">External-chain bridge</text>
    <text x="685" y="430" class="grp-s">— Phase B/C</text>
    <line x1="506" y1="440" x2="904" y2="440" stroke="#cd7c2e" stroke-dasharray="3 2"/>
    <text x="510" y="460" class="ctr-name">MpcCommitteeVerifier</text>
    <text x="690" y="460" class="ctr-desc">+ ExternalBridgeRegistry</text>
    <text x="510" y="480" class="ctr-name">ExternalBridgeEscrow</text>
    <text x="690" y="480" class="ctr-desc">+ ExternalBridgeBond (slashable)</text>
    <text x="510" y="500" class="ctr-name">MpcCommitteeFraudVerifier</text>
    <text x="690" y="500" class="ctr-desc">+ ExternalBridgeStubVerifier (test)</text>
    <line x1="506" y1="514" x2="904" y2="514" stroke="#cfd5dd"/>
    <text x="510" y="536" class="why-t">WHY L1:</text>
    <foreignObject x="570" y="522" width="340" height="30">
      <p xmlns="http://www.w3.org/1999/xhtml" style="font: 10.5px -apple-system, sans-serif; margin: 0; color: #2d3a48; line-height: 1.45;">
        same trust + economic-security argument as L1↔L2 bridge;
        committee bonds need L1 slashing.
      </p>
    </foreignObject>
  </g>

  <!-- Bottom: specialized verifier sidebar (2 slots, side-by-side) -->
  <g filter="url(#card)">
    <rect x="40" y="572" width="880" height="100" rx="10" ry="10" fill="#f4ece1" stroke="#cd9c5e" stroke-width="1.3"/>
    <text x="60" y="596" class="grp-t" fill="#7a5a14">Plus 2 specialized fraud-verifier reference slots</text>
    <line x1="56" y1="606" x2="904" y2="606" stroke="#cd9c5e" stroke-dasharray="3 2"/>
    <line x1="480" y1="612" x2="480" y2="666" stroke="#cd9c5e" stroke-dasharray="2 2"/>
    <text x="60" y="628" class="ctr-name">GovernanceFraudVerifier</text>
    <text x="60" y="646" class="ctr-desc">→ v1/v2 structural: governance-arbitrated</text>
    <text x="60" y="662" class="grp-s">Accepts via GovernanceController vote.</text>
    <text x="500" y="628" class="ctr-name">RestrictedExecutionFraudVerifier</text>
    <text x="500" y="646" class="ctr-desc">→ v3 trustless: on-chain Merkle re-derivation</text>
    <text x="500" y="662" class="grp-s">Accepts well-formed claims without arbitration.</text>
  </g>

  <!-- Footer note -->
  <text x="480" y="708" text-anchor="middle" class="grp-s" fill="#525a64" font-style="normal" font-weight="600">Key observation:</text>
  <foreignObject x="120" y="716" width="720" height="180">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font: 11.5px -apple-system, sans-serif; margin: 0; color: #2d3a48; line-height: 1.55; text-align: center;">
      L1 contracts hold <em>commitments and permissions</em>, not bulk state. NeoHub's storage is intentionally
      sparse — registry entries, balances, slashable-bond ledgers, and proof-acceptance records.
    </p>
    <p xmlns="http://www.w3.org/1999/xhtml" style="font: 11px -apple-system, sans-serif; margin: 14px 0 0 0; color: #525a64; line-height: 1.55; text-align: center; font-style: italic;">
      The cost of L1 storage forces this; the trust model requires it.
    </p>
  </foreignObject>
</svg>
