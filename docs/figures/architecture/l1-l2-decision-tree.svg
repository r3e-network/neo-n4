<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">L1 vs L2 placement decision tree</title>
  <desc id="desc">Five-question decision tree for deciding whether a new component lives on L1 or L2. Q1 does any other L2 need to read this state — yes goes to L1. Q2 is this state slashable or backs economic security — yes goes to L1. Q3 does this define what is valid on L1 (the trust boundary) — yes goes to L1. Q4 does throughput exceed L1 capacity — yes must be L2. Q5 is this app-specific logic for one chain — yes goes to L2; otherwise default to L2 to keep L1 lean.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#525a64"/>
    </marker>
    <filter id="card" x="-2%" y="-3%" width="104%" height="106%">
      <feDropShadow dx="0" dy="1" stdDeviation="0.9" flood-color="#000000" flood-opacity="0.07"/>
    </filter>
    <style>
      .header     { font-size: 14.5px; font-weight: 700; }
      .qt         { font-size: 12.5px; font-weight: 700; fill: #1e2a55; }
      .qb         { font-size: 11px; fill: #2d3a48; }
      .yes        { font-size: 11.5px; font-weight: 700; fill: #1d4d2c; }
      .no         { font-size: 11.5px; font-weight: 700; fill: #88312e; }
      .out        { font-size: 13px; font-weight: 700; }
      .out-s      { font-size: 11px; fill: #525a64; font-style: italic; }
    </style>
  </defs>

  <rect width="960" height="620" fill="#ffffff"/>

  <text x="480" y="32" text-anchor="middle" class="header" fill="#1e2a55">Where does a new component live? — 5-question decision tree</text>

  <!-- Q1 -->
  <g filter="url(#card)">
    <rect x="320" y="60" width="320" height="56" rx="8" ry="8" fill="#fff2e3" stroke="#cd7c2e" stroke-width="1.4"/>
    <text x="480" y="84" text-anchor="middle" class="qt">Q1. Does any other L2 need to read this state?</text>
    <text x="480" y="102" text-anchor="middle" class="qb">e.g. ChainRegistry, TokenRegistry, MessageRouter</text>
  </g>
  <text x="690" y="92" class="yes">YES → L1</text>
  <line x1="640" y1="88" x2="700" y2="88" stroke="#1d4d2c" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="480" y1="116" x2="480" y2="148" stroke="#525a64" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="486" y="138" class="no">no</text>

  <!-- Q2 -->
  <g filter="url(#card)">
    <rect x="320" y="150" width="320" height="56" rx="8" ry="8" fill="#fff2e3" stroke="#cd7c2e" stroke-width="1.4"/>
    <text x="480" y="174" text-anchor="middle" class="qt">Q2. Is this slashable / backs economic security?</text>
    <text x="480" y="192" text-anchor="middle" class="qb">e.g. SequencerBond, ExternalBridgeBond</text>
  </g>
  <text x="690" y="182" class="yes">YES → L1</text>
  <line x1="640" y1="178" x2="700" y2="178" stroke="#1d4d2c" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="480" y1="206" x2="480" y2="238" stroke="#525a64" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="486" y="228" class="no">no</text>

  <!-- Q3 -->
  <g filter="url(#card)">
    <rect x="320" y="240" width="320" height="56" rx="8" ry="8" fill="#fff2e3" stroke="#cd7c2e" stroke-width="1.4"/>
    <text x="480" y="264" text-anchor="middle" class="qt">Q3. Does it define what is valid on L1?</text>
    <text x="480" y="282" text-anchor="middle" class="qb">e.g. SettlementManager, VerifierRegistry — the trust boundary</text>
  </g>
  <text x="690" y="272" class="yes">YES → L1</text>
  <line x1="640" y1="268" x2="700" y2="268" stroke="#1d4d2c" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="480" y1="296" x2="480" y2="328" stroke="#525a64" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="486" y="318" class="no">no</text>

  <!-- Q4 -->
  <g filter="url(#card)">
    <rect x="320" y="330" width="320" height="56" rx="8" ry="8" fill="#fff2e3" stroke="#cd7c2e" stroke-width="1.4"/>
    <text x="480" y="354" text-anchor="middle" class="qt">Q4. Does throughput exceed L1 capacity?</text>
    <text x="480" y="372" text-anchor="middle" class="qb">e.g. user transfers, DEX matching</text>
  </g>
  <text x="690" y="362" class="yes">YES → must be L2</text>
  <line x1="640" y1="358" x2="700" y2="358" stroke="#3a8454" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="480" y1="386" x2="480" y2="418" stroke="#525a64" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="486" y="408" class="no">no</text>

  <!-- Q5 -->
  <g filter="url(#card)">
    <rect x="320" y="420" width="320" height="56" rx="8" ry="8" fill="#fff2e3" stroke="#cd7c2e" stroke-width="1.4"/>
    <text x="480" y="444" text-anchor="middle" class="qt">Q5. App-specific logic for one chain?</text>
    <text x="480" y="462" text-anchor="middle" class="qb">e.g. RWA KYC checks, custom executor</text>
  </g>
  <text x="690" y="452" class="yes">YES → L2</text>
  <line x1="640" y1="448" x2="700" y2="448" stroke="#3a8454" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="480" y1="476" x2="480" y2="510" stroke="#525a64" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="486" y="498" class="no">no</text>

  <!-- Default -->
  <g filter="url(#card)">
    <rect x="280" y="514" width="400" height="60" rx="10" ry="10" fill="#e7f4eb" stroke="#3a8454" stroke-width="1.4"/>
    <text x="480" y="538" text-anchor="middle" class="out" fill="#1d4d2c">Default → L2</text>
    <text x="480" y="558" text-anchor="middle" class="out-s">If you can answer no to Q1+Q2+Q3 with bounded throughput,<br/>L1 is probably premature centralization.</text>
  </g>

  <!-- L1 result box (right side) -->
  <g filter="url(#card)">
    <rect x="760" y="60" width="160" height="246" rx="10" ry="10" fill="#eff3ff" stroke="#7587c1" stroke-width="1.4"/>
    <text x="840" y="84" text-anchor="middle" class="out" fill="#1e2a55">L1</text>
    <text x="840" y="105" text-anchor="middle" class="out-s">canonical agreement</text>
    <text x="840" y="120" text-anchor="middle" class="out-s">+ economic security</text>
    <line x1="780" y1="135" x2="900" y2="135" stroke="#7587c1" stroke-dasharray="3 2"/>
    <text x="840" y="155" text-anchor="middle" class="qb" font-size="10">slow · expensive ·</text>
    <text x="840" y="170" text-anchor="middle" class="qb" font-size="10">globally consistent</text>
  </g>

  <!-- L2 result box (right side, lower) -->
  <g filter="url(#card)">
    <rect x="760" y="330" width="160" height="246" rx="10" ry="10" fill="#e7f4eb" stroke="#3a8454" stroke-width="1.4"/>
    <text x="840" y="354" text-anchor="middle" class="out" fill="#1d4d2c">L2</text>
    <text x="840" y="375" text-anchor="middle" class="out-s">execution + state</text>
    <text x="840" y="390" text-anchor="middle" class="out-s">+ throughput</text>
    <line x1="780" y1="405" x2="900" y2="405" stroke="#3a8454" stroke-dasharray="3 2"/>
    <text x="840" y="425" text-anchor="middle" class="qb" font-size="10">fast · cheap · locally</text>
    <text x="840" y="440" text-anchor="middle" class="qb" font-size="10">consistent — anchored</text>
    <text x="840" y="455" text-anchor="middle" class="qb" font-size="10">to L1</text>
  </g>
</svg>
