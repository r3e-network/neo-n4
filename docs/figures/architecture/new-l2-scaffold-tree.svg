<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" font-family="'Noto Sans CJK SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">new-l2 composite scaffold output</title>
  <desc id="desc">Files generated by neo-stack new-l2 --name MyChain --chain-id 1099 --template &lt;template&gt;. Top-level MyChain/ contains chain.config.json (91-byte-encodable canonical config), MyChainExecutor/ subdirectory with csproj + src files (MyChainExecutor.cs, MyChainStateSeam.cs, MyChainTxBuilder.cs) plus README.md, MyChainExecutor.UnitTests/ subdirectory (added with --with-tests flag, contains csproj plus 3 starter Tests.cs), and three node working dirs (data/, logs/, Plugins/).</desc>

  <defs>
    <filter id="card" x="-2%" y="-3%" width="104%" height="106%">
      <feDropShadow dx="0" dy="1" stdDeviation="0.9" flood-color="#000000" flood-opacity="0.07"/>
    </filter>
    <style>
      .header     { font-size: 14.5px; font-weight: 700; }
      .root       { font-size: 14px; font-weight: 700; fill: #1e2a55; font-family: 'Noto Sans Mono CJK SC', ui-monospace, 'SF Mono', monospace; }
      .dir        { font-size: 12.5px; font-weight: 700; fill: #1e2a55; font-family: 'Noto Sans Mono CJK SC', ui-monospace, 'SF Mono', monospace; }
      .file       { font-size: 12px; fill: #2d3a48; font-family: 'Noto Sans Mono CJK SC', ui-monospace, 'SF Mono', monospace; }
      .annot      { font-size: 11px; fill: #525a64; font-style: italic; }
      .opt        { font-size: 11px; fill: #c4413e; font-weight: 700; font-style: italic; }
      .branch     { stroke: #cfd5dd; stroke-width: 1.2; }
      .ftr        { font-size: 11px; fill: #525a64; font-style: italic; }
    </style>
  </defs>

  <rect width="960" height="460" fill="#ffffff"/>

  <text x="480" y="30" text-anchor="middle" class="header" fill="#1e2a55">new-l2 composite — what gets scaffolded</text>
  <text x="480" y="50" text-anchor="middle" class="ftr">$ neo-stack new-l2 --name MyChain --chain-id 1099 --template &lt;rollup|zk-rollup|validium|sidechain&gt;</text>

  <!-- Root -->
  <text x="60" y="92" class="root">./MyChain/</text>

  <!-- chain.config.json -->
  <line class="branch" x1="76" y1="100" x2="76" y2="116"/>
  <line class="branch" x1="76" y1="116" x2="98" y2="116"/>
  <text x="100" y="120" class="file">├── chain.config.json</text>
  <text x="380" y="120" class="annot">← 91-byte-encodable canonical config</text>

  <!-- MyChainExecutor/ -->
  <line class="branch" x1="76" y1="120" x2="76" y2="148"/>
  <line class="branch" x1="76" y1="148" x2="98" y2="148"/>
  <g filter="url(#card)">
    <rect x="100" y="134" width="700" height="150" rx="6" ry="6" fill="#fff2e3" stroke="#cd7c2e" stroke-width="1.3"/>
    <text x="116" y="156" class="dir">├── MyChainExecutor/</text>
    <text x="490" y="156" class="annot">← custom executor scaffold (csproj + sources)</text>

    <text x="140" y="178" class="file">│   ├── MyChainExecutor.csproj</text>

    <text x="140" y="200" class="file">│   ├── src/</text>
    <text x="160" y="220" class="file">│   │   ├── MyChainExecutor.cs</text>
    <text x="490" y="220" class="annot">← ITransactionExecutor stub</text>
    <text x="160" y="240" class="file">│   │   ├── MyChainStateSeam.cs</text>
    <text x="490" y="240" class="annot">← state-store binding</text>
    <text x="160" y="260" class="file">│   │   └── MyChainTxBuilder.cs</text>
    <text x="490" y="260" class="annot">← deposit / message tx helpers</text>

    <text x="140" y="278" class="file">│   └── README.md</text>
  </g>

  <!-- MyChainExecutor.UnitTests/ (optional) -->
  <line class="branch" x1="76" y1="284" x2="76" y2="300"/>
  <line class="branch" x1="76" y1="300" x2="98" y2="300"/>
  <g filter="url(#card)">
    <rect x="100" y="290" width="700" height="78" rx="6" ry="6" fill="#f1ecf8" stroke="#7d59b3" stroke-width="1.3" stroke-dasharray="3 2"/>
    <text x="116" y="312" class="dir">├── MyChainExecutor.UnitTests/</text>
    <text x="380" y="312" class="opt">★ added by --with-tests</text>
    <text x="140" y="334" class="file">│   ├── MyChainExecutor.UnitTests.csproj</text>
    <text x="140" y="356" class="file">│   └── *.Tests.cs</text>
    <text x="380" y="356" class="annot">← 3 starter tests (NoOp success + 2 edge cases)</text>
  </g>

  <!-- Node working dirs -->
  <line class="branch" x1="76" y1="368" x2="76" y2="394"/>
  <line class="branch" x1="76" y1="394" x2="98" y2="394"/>
  <g filter="url(#card)">
    <rect x="100" y="382" width="700" height="36" rx="6" ry="6" fill="#e7f4eb" stroke="#3a8454" stroke-width="1.3"/>
    <text x="116" y="404" class="dir">└── data/  logs/  Plugins/</text>
    <text x="380" y="404" class="annot">← node working directories</text>
  </g>

  <!-- Footer note -->
  <text x="480" y="442" text-anchor="middle" class="ftr" fill="#525a64">MyChainExecutor scaffold compiles + tests pass as-is. Edit MyChainExecutor.cs to replace NoOp with real opcodes.</text>
</svg>
