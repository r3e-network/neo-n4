<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" font-family="'Noto Sans CJK SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-labelledby="t4 d4">
  <title id="t4">Anti-censorship via forced inclusion (Walk #2)</title>
  <desc id="d4">Sequence diagram: user posts a forced transaction to L1 with a 2-hour deadline. The L2 batcher polls and drains pending entries. If the sequencer censors the tx past its deadline, CensorshipDetector observes the overdue state, the operator submits ReportCensorship to L1, and SequencerBond slashes the responsible sequencer's bond and pays the reporter.</desc>

  <defs>
    <marker id="ah4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#525a64"/>
    </marker>
    <filter id="card4" x="-2%" y="-3%" width="104%" height="106%">
      <feDropShadow dx="0" dy="1" stdDeviation="0.9" flood-color="#000" flood-opacity="0.07"/>
    </filter>
    <style>
      .actor-name  { font-size: 12.5px; font-weight: 700; letter-spacing: 0.6px; }
      .actor-sub   { font-size: 10.5px; }
      .msg-lbl     { font-size: 11px; font-weight: 500; }
      .msg-sub     { font-size: 10px; font-style: italic; fill: #525a64; }
      .step-num    { font-size: 10.5px; font-weight: 700; fill: #57606a; }
      .note-text   { font-size: 10.5px; }
      .caption     { font-size: 11.5px; fill: #57606a; }
    </style>
  </defs>

  <rect width="960" height="620" fill="#ffffff"/>

  <!-- ============================================================== -->
  <!--   Actor headers                                                 -->
  <!-- ============================================================== -->
  <!-- USER -->
  <g filter="url(#card4)">
    <rect x="40" y="32" width="148" height="48" rx="6" fill="#fff" stroke="#6a737d"/>
    <text x="114" y="54" text-anchor="middle" class="actor-name" fill="#1f2328">USER</text>
    <text x="114" y="70" text-anchor="middle" class="actor-sub" fill="#57606a">L2 chain participant</text>
  </g>

  <!-- L1 NeoHub -->
  <g filter="url(#card4)">
    <rect x="240" y="32" width="200" height="48" rx="6" fill="#eff3ff" stroke="#7587c1"/>
    <text x="340" y="54" text-anchor="middle" class="actor-name" fill="#1e2a55">L1 · NEOHUB</text>
    <text x="340" y="70" text-anchor="middle" class="actor-sub" fill="#3a4a82">ForcedInclusion · SequencerBond</text>
  </g>

  <!-- L2 Sequencer -->
  <g filter="url(#card4)">
    <rect x="500" y="32" width="200" height="48" rx="6" fill="#ecf5ee" stroke="#6fa37b"/>
    <text x="600" y="54" text-anchor="middle" class="actor-name" fill="#1c3d27">L2 · SEQUENCER + BATCHER</text>
    <text x="600" y="70" text-anchor="middle" class="actor-sub" fill="#2f5e3c">DrainAsync · MarkConsumed</text>
  </g>

  <!-- Detector + Operator -->
  <g filter="url(#card4)">
    <rect x="760" y="32" width="160" height="48" rx="6" fill="#fff7ed" stroke="#d97706"/>
    <text x="840" y="54" text-anchor="middle" class="actor-name" fill="#92400e">DETECTOR + OPERATOR</text>
    <text x="840" y="70" text-anchor="middle" class="actor-sub" fill="#a16207">CensorshipDetector</text>
  </g>

  <!-- ============================================================== -->
  <!--   Lifelines (dashed vertical)                                   -->
  <!-- ============================================================== -->
  <line x1="114" y1="80" x2="114" y2="560" stroke="#9aa6b2" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="340" y1="80" x2="340" y2="560" stroke="#9aa6b2" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="600" y1="80" x2="600" y2="560" stroke="#9aa6b2" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="840" y1="80" x2="840" y2="560" stroke="#9aa6b2" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- ============================================================== -->
  <!--   Step 1: User → L1 EnqueueForcedTransaction                    -->
  <!-- ============================================================== -->
  <text x="56" y="118" class="step-num">①</text>
  <line x1="118" y1="118" x2="336" y2="118" stroke="#525a64" stroke-width="1.4" marker-end="url(#ah4)"/>
  <text x="227" y="112" text-anchor="middle" class="msg-lbl" fill="#1f2328">EnqueueForcedTransaction(chainId, encodedTx, txHash)</text>
  <text x="227" y="132" text-anchor="middle" class="msg-sub">deadline = now + 2 h · returns nonce</text>

  <!-- ============================================================== -->
  <!--   Step 2: L1 stores entry (self-loop annotation)                -->
  <!-- ============================================================== -->
  <text x="56" y="172" class="step-num">②</text>
  <rect x="278" y="158" width="124" height="28" rx="4" fill="#eff3ff" stroke="#7587c1" stroke-width="1"/>
  <text x="340" y="176" text-anchor="middle" class="note-text" fill="#1e2a55">stores (sender, txHash, deadline)</text>

  <!-- ============================================================== -->
  <!--   Step 3: L2 → L1 DrainAsync (poll)                             -->
  <!-- ============================================================== -->
  <text x="56" y="218" class="step-num">③</text>
  <line x1="596" y1="218" x2="346" y2="218" stroke="#525a64" stroke-width="1.4" marker-end="url(#ah4)"/>
  <text x="471" y="212" text-anchor="middle" class="msg-lbl" fill="#1f2328">DrainAsync(max)</text>
  <text x="471" y="232" text-anchor="middle" class="msg-sub">L2 batcher polls L1 for forced txs</text>

  <!-- ============================================================== -->
  <!--   Step 4: L1 → L2 pending entries                                -->
  <!-- ============================================================== -->
  <text x="56" y="266" class="step-num">④</text>
  <line x1="344" y1="266" x2="594" y2="266" stroke="#525a64" stroke-width="1.4" stroke-dasharray="5 3" marker-end="url(#ah4)"/>
  <text x="469" y="260" text-anchor="middle" class="msg-lbl" fill="#1f2328">pending forced-tx entries</text>

  <!-- ============================================================== -->
  <!--   Step 5: censorship event (annotation on L2 lifeline)          -->
  <!-- ============================================================== -->
  <text x="56" y="318" class="step-num">⑤</text>
  <rect x="510" y="304" width="180" height="36" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1.2"/>
  <text x="600" y="320" text-anchor="middle" class="note-text" fill="#991b1b">SEQUENCER CENSORS</text>
  <text x="600" y="334" text-anchor="middle" class="msg-sub" fill="#991b1b">deadline passes · tx not included</text>

  <!-- ============================================================== -->
  <!--   Step 6: Detector polls L1 (HasOverdueEntryAsync)              -->
  <!-- ============================================================== -->
  <text x="56" y="374" class="step-num">⑥</text>
  <line x1="836" y1="374" x2="346" y2="374" stroke="#525a64" stroke-width="1.4" marker-end="url(#ah4)"/>
  <text x="591" y="368" text-anchor="middle" class="msg-lbl" fill="#1f2328">HasOverdueEntryAsync(now)</text>
  <text x="591" y="388" text-anchor="middle" class="msg-sub">CensorshipDetector polls source</text>

  <!-- ============================================================== -->
  <!--   Step 7: L1 → Detector: yes, overdue                           -->
  <!-- ============================================================== -->
  <text x="56" y="420" class="step-num">⑦</text>
  <line x1="344" y1="420" x2="834" y2="420" stroke="#525a64" stroke-width="1.4" stroke-dasharray="5 3" marker-end="url(#ah4)"/>
  <text x="589" y="414" text-anchor="middle" class="msg-lbl" fill="#1f2328">overdue entries · nonce + responsible sequencer</text>

  <!-- ============================================================== -->
  <!--   Step 8: Operator → L1 ReportCensorship                        -->
  <!-- ============================================================== -->
  <text x="56" y="468" class="step-num">⑧</text>
  <line x1="836" y1="468" x2="346" y2="468" stroke="#dc2626" stroke-width="1.6" marker-end="url(#ah4)"/>
  <text x="591" y="462" text-anchor="middle" class="msg-lbl" fill="#991b1b">ReportCensorship(chainId, nonce, sequencerAddr)</text>

  <!-- ============================================================== -->
  <!--   Step 9: L1 slashes (self-loop note)                           -->
  <!-- ============================================================== -->
  <text x="56" y="514" class="step-num">⑨</text>
  <rect x="244" y="500" width="192" height="42" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1.2"/>
  <text x="340" y="516" text-anchor="middle" class="note-text" fill="#991b1b">SequencerBond.Slash(sequencer)</text>
  <text x="340" y="532" text-anchor="middle" class="msg-sub" fill="#991b1b">bond debited · reporter paid</text>

  <!-- caption -->
  <text x="480" y="600" text-anchor="middle" class="caption">Forced inclusion + censorship slashing — 9-step sequence from user submission through operator-driven slashing.</text>
</svg>
