<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" width="1200" height="660" font-family="'Noto Sans CJK SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">Production Deployment Pipeline</title>
  <desc id="desc">From C# contract projects to NEF/manifest artifacts and a wallet-signable NeoHub deploy bundle.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#526173"/>
    </marker>
    <filter id="card" x="-2%" y="-3%" width="104%" height="106%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.0" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <style>
      .bg { fill: #fbfcfe; }
      .page-title { font-size: 22px; font-weight: 750; fill: #1e2a55; }
      .page-subtitle { font-size: 12.5px; fill: #526173; }
      .box-title { font-size: 14px; font-weight: 750; fill: #1e2a55; }
      .small-title { font-size: 12px; font-weight: 700; fill: #1e2a55; }
      .lane-title { font-size: 13px; font-weight: 750; fill: #1e2a55; }
      .body { font-size: 11.5px; fill: #2d3a48; }
      .body-strong { font-size: 11.5px; font-weight: 700; fill: #1e2a55; }
      .caption { font-size: 11px; fill: #526173; font-style: italic; }
      .arrow { stroke: #526173; stroke-width: 1.7; }
      .dashed { stroke-dasharray: 6 5; }
      .arrow-label { font-size: 10.5px; fill: #526173; font-weight: 650; }
      .lifeline { stroke: #c7d0dc; stroke-width: 1.1; stroke-dasharray: 4 4; }
      .zone-title { font-size: 13px; font-weight: 750; fill: #526173; letter-spacing: .2px; }
      .mono { font-family: 'Noto Sans Mono CJK SC', ui-monospace, SFMono-Regular, Consolas, monospace; font-size: 10.5px; fill: #1e2a55; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="660"/>
  <text x="36" y="40" class="page-title">Production Deployment Pipeline</text>
  <text x="36" y="63" class="page-subtitle">From C# contract projects to NEF/manifest artifacts and a wallet-signable NeoHub deploy bundle.</text>
<g>
  <rect x="55" y="125" width="220" height="115" rx="8" fill="#eaf2ff" stroke="#d8dee8" filter="url(#card)"/>
  <text x="71" y="152" class="box-title">Contract projects</text>
  <text x="71" y="177" class="body" text-anchor="start"><tspan x="71" dy="0">contracts/**/*.csproj</tspan><tspan x="71" dy="18">Neo.SmartContract.Framework</tspan><tspan x="71" dy="18">warn-as-error build</tspan></text>
</g>
<g>
  <rect x="330" y="125" width="190" height="115" rx="8" fill="#fff5e6" stroke="#d8dee8" filter="url(#card)"/>
  <text x="346" y="152" class="box-title">nccs</text>
  <text x="346" y="177" class="body" text-anchor="start"><tspan x="346" dy="0">Neo.Compiler.CSharp</tspan><tspan x="346" dy="18">project direct build</tspan><tspan x="346" dy="18">CI artifact loop</tspan></text>
</g>
<g>
  <rect x="575" y="125" width="225" height="115" rx="8" fill="#eaf7f0" stroke="#d8dee8" filter="url(#card)"/>
  <text x="591" y="152" class="box-title">bin/sc artifacts</text>
  <text x="591" y="177" class="body" text-anchor="start"><tspan x="591" dy="0">*.nef</tspan><tspan x="591" dy="18">*.manifest.json</tspan><tspan x="591" dy="18">actual deploy inputs</tspan></text>
</g>
<g>
  <rect x="855" y="125" width="230" height="115" rx="8" fill="#e7f8fb" stroke="#d8dee8" filter="url(#card)"/>
  <text x="871" y="152" class="box-title">neo-hub-deploy</text>
  <text x="871" y="177" class="body" text-anchor="start"><tspan x="871" dy="0">scaffold plan</tspan><tspan x="871" dy="18">topological sort</tspan><tspan x="871" dy="18">resolve step hashes</tspan></text>
</g>
<g>
  <rect x="205" y="395" width="230" height="115" rx="8" fill="#f4f6f8" stroke="#d8dee8" filter="url(#card)"/>
  <text x="221" y="422" class="box-title">deploy-plan.json</text>
  <text x="221" y="447" class="body" text-anchor="start"><tspan x="221" dy="0">editable placeholders</tspan><tspan x="221" dy="18">OWNER_REPLACE_ME</tspan><tspan x="221" dy="18">BOND_ASSET_REPLACE_ME</tspan></text>
</g>
<g>
  <rect x="505" y="395" width="230" height="115" rx="8" fill="#fff9d9" stroke="#d8dee8" filter="url(#card)"/>
  <text x="521" y="422" class="box-title">deploy-bundle.json</text>
  <text x="521" y="447" class="body" text-anchor="start"><tspan x="521" dy="0">22 production invocations</tspan><tspan x="521" dy="18">nefPath / manifestPath</tspan><tspan x="521" dy="18">resolved deploy data</tspan></text>
</g>
<g>
  <rect x="805" y="395" width="235" height="115" rx="8" fill="#eaf7f0" stroke="#d8dee8" filter="url(#card)"/>
  <text x="821" y="422" class="box-title">Wallet + L1 deploy</text>
  <text x="821" y="447" class="body" text-anchor="start"><tspan x="821" dy="0">sign each invocation</tspan><tspan x="821" dy="18">ContractManagement.Deploy</tspan><tspan x="821" dy="18">post-deploy wiring</tspan></text>
</g>
<line x1="275" y1="183" x2="330" y2="183" class="arrow" marker-end="url(#arrow)"/><text x="302" y="175" text-anchor="middle" class="arrow-label">compile</text>
<line x1="520" y1="183" x2="575" y2="183" class="arrow" marker-end="url(#arrow)"/><text x="548" y="175" text-anchor="middle" class="arrow-label">emit</text>
<line x1="800" y1="183" x2="855" y2="183" class="arrow" marker-end="url(#arrow)"/><text x="828" y="175" text-anchor="middle" class="arrow-label">read</text>
<line x1="970" y1="240" x2="320" y2="395" class="arrow dashed" marker-end="url(#arrow)"/><text x="645" y="310" text-anchor="middle" class="arrow-label">scaffold</text>
<line x1="435" y1="452" x2="505" y2="452" class="arrow" marker-end="url(#arrow)"/><text x="470" y="444" text-anchor="middle" class="arrow-label">plan</text>
<line x1="735" y1="452" x2="805" y2="452" class="arrow" marker-end="url(#arrow)"/><text x="770" y="444" text-anchor="middle" class="arrow-label">sign</text>
<text x="56" y="600" class="caption">Key consistency rule: the default deploy bundle must reference bin/sc, not bin/Release.</text>
</svg>
