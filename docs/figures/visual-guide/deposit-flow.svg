<text x="1518" y="893" class="small">policy</text>
<rect x="1378" y="924" width="442" height="58" rx="6" fill="#ffffff"/>
<text x="1390" y="947" class="strong">Evidence</text>
<text x="1518" y="944" class="small">proof or committee evidence binds the</text>
<text x="1518" y="961" class="small">event</text>
