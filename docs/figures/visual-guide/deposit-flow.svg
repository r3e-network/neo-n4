<rect x="300" y="324" width="180" height="208" rx="8" fill="#ecfdf5" stroke="#0f766e" stroke-width="1.4"/>
<text x="314" y="352" class="strong">Normalization</text>
<text x="314" y="382" class="body">watchers or contracts</text>
<text x="314" y="400" class="body">encode the event into</text>
<text x="314" y="418" class="body">canonical message</text>
<text x="314" y="436" class="body">bytes.</text>
<path class="accentArrow" d="M480 428 C492 428 490 374 508 374"/>
<rect x="508" y="270" width="180" height="208" rx="8" fill="#ecfdf5" stroke="#0f766e" stroke-width="1.4"/>
