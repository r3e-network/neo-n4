<text x="522" y="328" class="body">NeoHub checks</text>
<text x="522" y="346" class="body">registry, nonce,</text>
<text x="522" y="364" class="body">proof, and asset</text>
<text x="522" y="382" class="body">policy before</text>
<text x="522" y="400" class="body">consumption.</text>
<path class="accentArrow" d="M688 374 C700 374 698 428 716 428"/>
<rect x="716" y="324" width="180" height="208" rx="8" fill="#ecfdf5" stroke="#0f766e" stroke-width="1.4"/>
