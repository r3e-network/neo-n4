<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" font-family="'Noto Sans CJK SC', 'Source Han Sans SC', 'WenQuanYi Zen Hei', 'Microsoft YaHei', sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">Neo Elastic Network —— 架构</title>
  <desc id="desc">三层架构:Neo N3 / Neo 4 L1 锚(NeoHub:13 个合约,按 Settlement、Bridge、Messaging、Security、Governance 5 个关注点分组)、可选的 Phase 5 Neo Gateway 聚合器,以及 N 条弹性 L2 执行链。数据经批次 + 证明提交向上流;结算经 L1 上的 JSON-RPC submitBatch / verify 完成。</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#525a64"/>
    </marker>
    <filter id="card" x="-2%" y="-3%" width="104%" height="106%">
      <feDropShadow dx="0" dy="1" stdDeviation="0.9" flood-color="#000000" flood-opacity="0.07"/>
    </filter>
    <style>
      .band-title { font-size: 12.5px; font-weight: 700; letter-spacing: 0.6px; }
      .band-sub   { font-size: 11px; }
      .card-title { font-size: 13px; font-weight: 600; }
      .card-sub   { font-size: 10.5px; }
      .edge-lbl   { font-size: 11px; font-style: italic; fill: #525a64; }
      .caption    { font-size: 11.5px; fill: #57606a; }
    </style>
  </defs>

  <rect width="960" height="620" fill="#ffffff"/>

  <rect x="40" y="32" width="880" height="170" rx="10" ry="10" fill="#eff3ff" stroke="#7587c1" stroke-width="1.2"/>
  <text x="58" y="56" class="band-title" fill="#1e2a55">L1 · NEO N3 / NEO 4 上的 NEOHUB</text>
  <text x="58" y="74" class="band-sub" fill="#3f5193">规范锚 —— 资产 · 结算 · 消息路由 · 治理</text>

  <g filter="url(#card)">
    <rect x="62" y="92" width="166" height="98" rx="6" ry="6" fill="#ffffff" stroke="#7587c1"/>
    <text x="145" y="114" text-anchor="middle" class="card-title" fill="#1e2a55">结算</text>
    <text x="145" y="138" text-anchor="middle" class="card-sub" fill="#3a4a82">SettlementManager</text>
    <text x="145" y="156" text-anchor="middle" class="card-sub" fill="#3a4a82">VerifierRegistry</text>

    <rect x="240" y="92" width="166" height="98" rx="6" ry="6" fill="#ffffff" stroke="#7587c1"/>
    <text x="323" y="114" text-anchor="middle" class="card-title" fill="#1e2a55">桥</text>
    <text x="323" y="138" text-anchor="middle" class="card-sub" fill="#3a4a82">SharedBridge</text>
    <text x="323" y="156" text-anchor="middle" class="card-sub" fill="#3a4a82">TokenRegistry</text>
    <text x="323" y="174" text-anchor="middle" class="card-sub" fill="#3a4a82">ChainRegistry</text>

    <rect x="418" y="92" width="166" height="98" rx="6" ry="6" fill="#ffffff" stroke="#7587c1"/>
    <text x="501" y="114" text-anchor="middle" class="card-title" fill="#1e2a55">消息</text>
    <text x="501" y="138" text-anchor="middle" class="card-sub" fill="#3a4a82">MessageRouter</text>
    <text x="501" y="156" text-anchor="middle" class="card-sub" fill="#3a4a82">DARegistry</text>

    <rect x="596" y="92" width="178" height="98" rx="6" ry="6" fill="#ffffff" stroke="#7587c1"/>
    <text x="685" y="114" text-anchor="middle" class="card-title" fill="#1e2a55">安全</text>
    <text x="685" y="138" text-anchor="middle" class="card-sub" fill="#3a4a82">SequencerRegistry · Bond</text>
    <text x="685" y="156" text-anchor="middle" class="card-sub" fill="#3a4a82">ForcedInclusion</text>
    <text x="685" y="174" text-anchor="middle" class="card-sub" fill="#3a4a82">OptimisticChallenge</text>

    <rect x="786" y="92" width="116" height="98" rx="6" ry="6" fill="#ffffff" stroke="#7587c1"/>
    <text x="844" y="114" text-anchor="middle" class="card-title" fill="#1e2a55">治理</text>
    <text x="844" y="138" text-anchor="middle" class="card-sub" fill="#3a4a82">Controller</text>
    <text x="844" y="156" text-anchor="middle" class="card-sub" fill="#3a4a82">Emergency</text>
  </g>

  <line x1="480" y1="262" x2="480" y2="207" stroke="#525a64" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="490" y="237" class="edge-lbl">JSON-RPC · submitBatch · verify</text>

  <rect x="220" y="270" width="520" height="98" rx="10" ry="10" fill="#f5edff" stroke="#9072c6" stroke-width="1.2"/>
  <text x="240" y="294" class="band-title" fill="#321d62">NEO GATEWAY · PHASE 5 · 可选</text>
  <text x="240" y="312" class="band-sub" fill="#5a3f93">把多条 L2 的证明聚合为一笔 L1 结算提交</text>

  <g filter="url(#card)">
    <rect x="240" y="324" width="220" height="34" rx="6" ry="6" fill="#ffffff" stroke="#9072c6"/>
    <text x="350" y="346" text-anchor="middle" class="card-title" fill="#321d62">BinaryTreeAggregator</text>
    <text x="455" y="346" text-anchor="end" class="card-sub" fill="#5a3f93"></text>

    <rect x="476" y="324" width="244" height="34" rx="6" ry="6" fill="#ffffff" stroke="#9072c6"/>
    <text x="598" y="346" text-anchor="middle" class="card-title" fill="#321d62">IRoundProver</text>
  </g>
  <text x="350" y="375" text-anchor="middle" class="card-sub" fill="#5a3f93">log-N 轮</text>
  <text x="598" y="375" text-anchor="middle" class="card-sub" fill="#5a3f93">SP1 · Halo2 · Risc0(默认 pass-through)</text>

  <line x1="480" y1="404" x2="480" y2="430" stroke="#525a64" stroke-width="1.6"/>
  <line x1="160" y1="430" x2="800" y2="430" stroke="#525a64" stroke-width="1.6"/>
  <line x1="160" y1="468" x2="160" y2="430" stroke="#525a64" stroke-width="1.6" marker-start="url(#arrow)"/>
  <line x1="480" y1="468" x2="480" y2="430" stroke="#525a64" stroke-width="1.6" marker-start="url(#arrow)"/>
  <line x1="800" y1="468" x2="800" y2="430" stroke="#525a64" stroke-width="1.6" marker-start="url(#arrow)"/>
  <text x="490" y="423" class="edge-lbl">批次 + 证明</text>

  <rect x="40" y="476" width="880" height="120" rx="10" ry="10" fill="#ecf5ee" stroke="#6fa37b" stroke-width="1.2"/>
  <text x="58" y="500" class="band-title" fill="#1c3d27">L2 · 弹性执行链</text>
  <text x="58" y="518" class="band-sub" fill="#2f5e3c">Neo 4 core · 8 个插件 · 6 个原生合约 —— 独立状态,共享 L1 锚</text>

  <g filter="url(#card)">
    <rect x="80" y="528" width="200" height="56" rx="6" ry="6" fill="#ffffff" stroke="#6fa37b"/>
    <text x="180" y="550" text-anchor="middle" class="card-title" fill="#1c3d27">Neo L2 #1</text>
    <text x="180" y="570" text-anchor="middle" class="card-sub" fill="#2f5e3c">Neo 4 · 8 个插件 · 6 个合约</text>

    <rect x="380" y="528" width="200" height="56" rx="6" ry="6" fill="#ffffff" stroke="#6fa37b"/>
    <text x="480" y="550" text-anchor="middle" class="card-title" fill="#1c3d27">Neo L2 #2</text>
    <text x="480" y="570" text-anchor="middle" class="card-sub" fill="#2f5e3c">Neo 4 · 8 个插件 · 6 个合约</text>

    <rect x="680" y="528" width="200" height="56" rx="6" ry="6" fill="#ffffff" stroke="#6fa37b" stroke-dasharray="4 3"/>
    <text x="780" y="550" text-anchor="middle" class="card-title" fill="#1c3d27">Neo L2 #N</text>
    <text x="780" y="570" text-anchor="middle" class="card-sub" fill="#2f5e3c">N 条弹性链</text>
  </g>

  <text x="480" y="612" text-anchor="middle" class="caption">Neo Elastic Network —— 三层架构(L1 锚 · 可选 Gateway · N 条 L2 链)。</text>
</svg>
