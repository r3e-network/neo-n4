<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" font-family="'Noto Sans CJK SC', 'Source Han Sans SC', 'WenQuanYi Zen Hei', 'Microsoft YaHei', sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">DepositPayload 字节布局(44 + amountLen 字节)</title>
  <desc id="desc">DepositPayload 的字节级规范线协议格式 —— 4 字段共 44 字节定长前缀 + N 字节变长 amount。嵌入到从 NeoHub.SharedBridge 跑向 L2NativeBridgeContract 的 CrossChainMessage 的 payload 字段里。按偏移的字段:0-19 l1Asset(UInt160 —— SharedBridge 锁定的 L1 资产哈希)、20-39 l2Recipient(UInt160 —— 拿到包装资产的 L2 地址)、40-43 amountLen(int32 LE —— amount 字节长度)、44 至 43+N amount(BigInteger LE,isUnsigned: true)。</desc>

  <defs>
    <filter id="card" x="-2%" y="-3%" width="104%" height="106%">
      <feDropShadow dx="0" dy="1" stdDeviation="0.9" flood-color="#000000" flood-opacity="0.07"/>
    </filter>
    <style>
      .header     { font-size: 14.5px; font-weight: 700; }
      .col-h      { font-size: 11.5px; font-weight: 700; fill: #525a64; letter-spacing: 0.4px; }
      .offset     { font-size: 11px; fill: #1e2a55; font-weight: 700; font-family: 'Noto Sans Mono CJK SC', ui-monospace, 'SF Mono',monospace; }
      .size       { font-size: 11px; fill: #525a64; font-family: 'Noto Sans Mono CJK SC', ui-monospace, 'SF Mono',monospace; }
      .field      { font-size: 11.5px; fill: #1e2a55; font-weight: 700; font-family: 'Noto Sans Mono CJK SC', ui-monospace, 'SF Mono',monospace; }
      .desc       { font-size: 10.5px; fill: #2d3a48; }
      .grp        { font-size: 11px; font-weight: 600; letter-spacing: 0.3px; }
      .ftr        { font-size: 10.5px; fill: #525a64; font-style: italic; }
    </style>
  </defs>

  <rect width="960" height="460" fill="#ffffff"/>

  <text x="480" y="30" text-anchor="middle" class="header" fill="#1e2a55">DepositPayload 字节布局 —— 44 + amountLen 字节</text>
  <text x="480" y="50" text-anchor="middle" class="ftr">嵌入到从 NeoHub.SharedBridge → L2NativeBridgeContract 的 CrossChainMessage 的 payload 字段</text>

  <text x="60" y="86" class="col-h">偏移</text>
  <text x="140" y="86" class="col-h">大小</text>
  <text x="200" y="86" class="col-h">字段</text>
  <text x="500" y="86" class="col-h">备注</text>
  <line x1="40" y1="92" x2="920" y2="92" stroke="#cfd5dd" stroke-width="1"/>

  <text x="20" y="116" class="grp" fill="#1e2a55">参与方</text>
  <rect x="40" y="100" width="880" height="32" rx="4" ry="4" fill="#eff3ff" stroke="#7587c1" stroke-width="0.8"/>
  <text x="80" y="120" class="offset">0</text>
  <text x="148" y="120" class="size">20 B</text>
  <text x="200" y="120" class="field">l1Asset</text>
  <text x="320" y="120" class="size">UInt160</text>
  <text x="500" y="120" class="desc">SharedBridge 锁定的 L1 资产哈希</text>

  <rect x="40" y="134" width="880" height="32" rx="4" ry="4" fill="#eff3ff" stroke="#7587c1" stroke-width="0.8"/>
  <text x="80" y="154" class="offset">20</text>
  <text x="148" y="154" class="size">20 B</text>
  <text x="200" y="154" class="field">l2Recipient</text>
  <text x="320" y="154" class="size">UInt160</text>
  <text x="500" y="154" class="desc">拿到包装资产的 L2 地址</text>

  <text x="20" y="190" class="grp" fill="#7a4a14">金额</text>
  <rect x="40" y="174" width="880" height="32" rx="4" ry="4" fill="#fff2e3" stroke="#cd7c2e" stroke-width="0.8"/>
  <text x="80" y="194" class="offset">40</text>
  <text x="148" y="194" class="size">4 B</text>
  <text x="200" y="194" class="field">amountLen</text>
  <text x="320" y="194" class="size">int32 LE</text>
  <text x="500" y="194" class="desc">amount 字节长度(≤ 64 B 上限)</text>

  <line x1="40" y1="218" x2="920" y2="218" stroke="#525a64" stroke-width="1.4" stroke-dasharray="6 3"/>
  <text x="480" y="234" text-anchor="middle" class="grp" fill="#525a64">────── 44 字节定长前缀结束 ──────</text>

  <rect x="40" y="244" width="880" height="44" rx="4" ry="4" fill="#fff2e3" stroke="#cd7c2e" stroke-width="1.4" stroke-dasharray="3 2"/>
  <text x="80" y="264" class="offset">44</text>
  <text x="148" y="264" class="size">N B</text>
  <text x="200" y="264" class="field">amount</text>
  <text x="320" y="264" class="size">N = amountLen 字节</text>
  <text x="500" y="264" class="desc">BigInteger LE,isUnsigned: true</text>
  <text x="500" y="280" class="desc" font-style="italic">上限:amountLen ≤ 64 字节(~10^154 最小单位)</text>

  <line x1="40" y1="306" x2="920" y2="306" stroke="#525a64" stroke-width="1"/>
  <text x="148" y="324" class="size" font-weight="700" fill="#1e2a55">合计</text>
  <text x="200" y="324" class="field" font-size="13">44 + N 字节</text>

  <line x1="40" y1="346" x2="920" y2="346" stroke="#cfd5dd" stroke-width="1"/>
  <text x="60" y="372" class="ftr" font-weight="600" fill="#1e2a55">为什么 amount 是变长字节?</text>
  <text x="60" y="392" class="ftr">Token 金额范围相差悬殊 —— 稳定币的 micro-cents、某些治理 token 的数十亿。把 amount 编码为变长 BigInteger</text>
  <text x="60" y="408" class="ftr">(LE、unsigned)避免了固定上限带来的(a)小金额浪费存储或(b)鲸鱼下溢。上限是 amountLen ≤ 64 字节</text>
  <text x="60" y="424" class="ftr">(支持最多 ~10^154 最小单位的代币;远超任何现实的供应量)。</text>
</svg>
