<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="'Noto Sans CJK SC', 'Source Han Sans SC', 'WenQuanYi Zen Hei', 'Microsoft YaHei', sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">架构章节关系图</title>
  <desc id="desc">5 个架构章节之间的关系。Atlas(本索引页)向外链接 walkthrough(按 tx 的叙事导览,311 行)、l2-lifecycle(系统拓扑、创建、部署、运行时 —— 741 行)、wire-formats(字节级规范布局 —— 361 行)。l2-lifecycle 和 wire-formats 都为 trust-boundaries(谁签 / 谁验 / 每条边界防御什么 —— 399 行)提供输入。加上术语表,这些章节合计约 2,050 行。</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#525a64"/>
    </marker>
    <filter id="card" x="-2%" y="-3%" width="104%" height="106%">
      <feDropShadow dx="0" dy="1" stdDeviation="0.9" flood-color="#000000" flood-opacity="0.07"/>
    </filter>
    <style>
      .header     { font-size: 14.5px; font-weight: 700; }
      .ch-t       { font-size: 13px; font-weight: 700; }
      .ch-s       { font-size: 11px; fill: #2d3a48; }
      .ch-l       { font-size: 10.5px; fill: #525a64; font-style: italic; }
      .ed-lbl     { font-size: 10.5px; fill: #525a64; font-style: italic; }
    </style>
  </defs>

  <rect width="960" height="480" fill="#ffffff"/>

  <text x="480" y="30" text-anchor="middle" class="header" fill="#1e2a55">5 个架构章节 —— 它们如何关联</text>

  <g filter="url(#card)">
    <rect x="370" y="56" width="220" height="80" rx="10" ry="10" fill="#fff2e3" stroke="#cd7c2e" stroke-width="1.5"/>
    <text x="480" y="82" text-anchor="middle" class="ch-t" fill="#7a4a14">architecture-atlas</text>
    <text x="480" y="100" text-anchor="middle" class="ch-s">(本页)</text>
    <text x="480" y="118" text-anchor="middle" class="ch-l">阅读顺序 · 章节索引</text>
  </g>

  <line x1="430" y1="136" x2="180" y2="186" stroke="#525a64" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="480" y1="136" x2="480" y2="186" stroke="#525a64" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="530" y1="136" x2="780" y2="186" stroke="#525a64" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="480" y="160" text-anchor="middle" class="ed-lbl">链接到:</text>

  <g filter="url(#card)">
    <rect x="60" y="190" width="240" height="120" rx="10" ry="10" fill="#eff3ff" stroke="#7587c1" stroke-width="1.4"/>
    <text x="180" y="214" text-anchor="middle" class="ch-t" fill="#1e2a55">walkthrough</text>
    <line x1="80" y1="222" x2="280" y2="222" stroke="#7587c1" stroke-dasharray="2 2"/>
    <text x="180" y="244" text-anchor="middle" class="ch-s">代码库的</text>
    <text x="180" y="262" text-anchor="middle" class="ch-s">按 tx 叙事导览</text>
    <text x="180" y="288" text-anchor="middle" class="ch-l">311 行</text>
  </g>

  <g filter="url(#card)">
    <rect x="370" y="190" width="220" height="120" rx="10" ry="10" fill="#e7f4eb" stroke="#3a8454" stroke-width="1.5"/>
    <text x="480" y="214" text-anchor="middle" class="ch-t" fill="#1d4d2c">l2-lifecycle</text>
    <line x1="390" y1="222" x2="570" y2="222" stroke="#3a8454" stroke-dasharray="2 2"/>
    <text x="480" y="244" text-anchor="middle" class="ch-s">系统拓扑</text>
    <text x="480" y="260" text-anchor="middle" class="ch-s">+ 创建流</text>
    <text x="480" y="276" text-anchor="middle" class="ch-s">+ 部署 + 运行时</text>
    <text x="480" y="298" text-anchor="middle" class="ch-l">741 行</text>
  </g>

  <g filter="url(#card)">
    <rect x="660" y="190" width="240" height="120" rx="10" ry="10" fill="#f1ecf8" stroke="#7d59b3" stroke-width="1.4"/>
    <text x="780" y="214" text-anchor="middle" class="ch-t" fill="#3e2865">wire-formats</text>
    <line x1="680" y1="222" x2="880" y2="222" stroke="#7d59b3" stroke-dasharray="2 2"/>
    <text x="780" y="244" text-anchor="middle" class="ch-s">每一种跨层线协议的</text>
    <text x="780" y="262" text-anchor="middle" class="ch-s">字节级规范布局</text>
    <text x="780" y="298" text-anchor="middle" class="ch-l">361 行</text>
  </g>

  <line x1="480" y1="310" x2="480" y2="346" stroke="#525a64" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="780" y1="310" x2="540" y2="346" stroke="#525a64" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="630" y="334" class="ed-lbl">为之输入</text>

  <g filter="url(#card)">
    <rect x="220" y="350" width="520" height="106" rx="10" ry="10" fill="#fde8e8" stroke="#c4413e" stroke-width="1.5"/>
    <text x="480" y="376" text-anchor="middle" class="ch-t" fill="#88312e">trust-boundaries</text>
    <line x1="240" y1="384" x2="720" y2="384" stroke="#c4413e" stroke-dasharray="2 2"/>
    <text x="480" y="406" text-anchor="middle" class="ch-s">谁签 · 谁验 · 每条边界防御什么</text>
    <text x="480" y="424" text-anchor="middle" class="ch-l">5 边界系统图 · 按流动的纵深防御 · 信任最小化梯度</text>
    <text x="480" y="446" text-anchor="middle" class="ch-l">399 行</text>
  </g>

  <text x="480" y="476" text-anchor="middle" class="ed-lbl" fill="#525a64">+ 术语表(233 行)—— 架构文档合计约 2,050 行。</text>
</svg>
