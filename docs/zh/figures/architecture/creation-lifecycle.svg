<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 1080" font-family="'Noto Sans CJK SC', 'Source Han Sans SC', 'WenQuanYi Zen Hei', 'Microsoft YaHei', sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">L2 链创建生命周期 —— 从 git clone 到首批次落到 L1</title>
  <desc id="desc">跨 6 个角色(运维者、neo-stack CLI、文件系统、L1 钱包、L1 上的 NeoHub.ChainRegistry、L2 排序器)的编号 swimlane 序列。阶段 1(步骤 1-5):运维者跑 new-l2,neo-stack 脚手架文件,validate 做 JSON 健全性检查。阶段 2(步骤 6-12):运维者跑 register-chain,neo-stack 返回 91 字节 configBytes hex + RegisterChain 计划;运维者把参数粘进钱包,钱包向 L1 上的 ChainRegistry 提交 RegisterChain;tx 被接受。运维者跑 deploy-bridge-adapter,neo-stack 返回 L2NativeBridge 部署计划,钱包部署。阶段 3(步骤 13-20):运维者跑 start-sequencer,neo-stack 打印 preflight + compose 说明;运维者启动 neo-cli + L2 插件;dBFT 2.0 起跑;运维者跑 start-batcher;L2 上的 BatchInfoContract 镜像 L1 游标;排序器提交 SubmitBatch;SettlementManager 接受结算。</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#525a64"/>
    </marker>
    <filter id="card" x="-2%" y="-3%" width="104%" height="106%">
      <feDropShadow dx="0" dy="1" stdDeviation="0.9" flood-color="#000000" flood-opacity="0.07"/>
    </filter>
    <style>
      .header     { font-size: 14.5px; font-weight: 700; }
      .actor-t    { font-size: 11px; font-weight: 700; }
      .actor-s    { font-size: 9.5px; fill: #525a64; font-style: italic; }
      .lifeline   { stroke: #cfd5dd; stroke-width: 1; stroke-dasharray: 3 3; }
      .step       { font-size: 11.5px; fill: #1e2a55; font-weight: 600; }
      .step-n     { font-size: 11px; font-weight: 700; fill: #c4413e; }
      .note       { font-size: 10.5px; fill: #525a64; font-style: italic; }
      .phase-t    { font-size: 12px; font-weight: 700; letter-spacing: 0.4px; }
      .phase-s    { font-size: 10.5px; fill: #2d3a48; font-style: italic; }
    </style>
  </defs>

  <rect width="960" height="1080" fill="#ffffff"/>

  <text x="480" y="30" text-anchor="middle" class="header" fill="#1e2a55">L2 链创建生命周期 —— 从 git clone 到首批次落到 L1</text>

  <g filter="url(#card)">
    <rect x="20" y="50" width="120" height="50" rx="6" ry="6" fill="#ffffff" stroke="#7d59b3" stroke-width="1.2"/>
    <text x="80" y="72" text-anchor="middle" class="actor-t" fill="#3e2865">运维者</text>
    <text x="80" y="88" text-anchor="middle" class="actor-s">human</text>
  </g>
  <g filter="url(#card)">
    <rect x="160" y="50" width="120" height="50" rx="6" ry="6" fill="#fff2e3" stroke="#cd7c2e" stroke-width="1.4"/>
    <text x="220" y="72" text-anchor="middle" class="actor-t" fill="#7a4a14">neo-stack CLI</text>
    <text x="220" y="88" text-anchor="middle" class="actor-s">计划打印器</text>
  </g>
  <g filter="url(#card)">
    <rect x="300" y="50" width="120" height="50" rx="6" ry="6" fill="#ffffff" stroke="#525a64" stroke-width="1.2"/>
    <text x="360" y="72" text-anchor="middle" class="actor-t" fill="#525a64">文件系统</text>
    <text x="360" y="88" text-anchor="middle" class="actor-s">本地</text>
  </g>
  <g filter="url(#card)">
    <rect x="440" y="50" width="140" height="50" rx="6" ry="6" fill="#ffffff" stroke="#7587c1" stroke-width="1.2"/>
    <text x="510" y="72" text-anchor="middle" class="actor-t" fill="#1e2a55">L1 钱包</text>
    <text x="510" y="88" text-anchor="middle" class="actor-s">NeoLine / Neon / KMS</text>
  </g>
  <g filter="url(#card)">
    <rect x="600" y="50" width="160" height="50" rx="6" ry="6" fill="#eff3ff" stroke="#7587c1" stroke-width="1.4"/>
    <text x="680" y="68" text-anchor="middle" class="actor-t" fill="#1e2a55">NeoHub.</text>
    <text x="680" y="80" text-anchor="middle" class="actor-t" fill="#1e2a55">ChainRegistry</text>
    <text x="680" y="94" text-anchor="middle" class="actor-s">L1</text>
  </g>
  <g filter="url(#card)">
    <rect x="800" y="50" width="140" height="50" rx="6" ry="6" fill="#e7f4eb" stroke="#3a8454" stroke-width="1.4"/>
    <text x="870" y="72" text-anchor="middle" class="actor-t" fill="#1d4d2c">L2 排序器</text>
    <text x="870" y="88" text-anchor="middle" class="actor-s">dBFT 2.0</text>
  </g>

  <line class="lifeline" x1="80" y1="100" x2="80" y2="1020"/>
  <line class="lifeline" x1="220" y1="100" x2="220" y2="1020"/>
  <line class="lifeline" x1="360" y1="100" x2="360" y2="1020"/>
  <line class="lifeline" x1="510" y1="100" x2="510" y2="1020"/>
  <line class="lifeline" x1="680" y1="100" x2="680" y2="1020"/>
  <line class="lifeline" x1="870" y1="100" x2="870" y2="1020"/>

  <rect x="0" y="115" width="960" height="28" fill="#fde8e8" stroke="#c4413e" stroke-dasharray="3 2"/>
  <text x="20" y="134" class="phase-t" fill="#88312e">阶段 1 · 仅脚手架</text>
  <text x="200" y="134" class="phase-s">链有身份但无链上存在</text>

  <line x1="80" y1="166" x2="220" y2="166" stroke="#525a64" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="32" y="160" class="step-n">1.</text>
  <text x="50" y="160" class="step">new-l2</text>

  <line x1="220" y1="194" x2="360" y2="194" stroke="#525a64" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="160" y="188" class="step-n">2.</text>
  <text x="178" y="188" class="step">scaffold</text>
  <text x="290" y="188" text-anchor="middle" class="note">(chain.config.json + 执行器脚手架)</text>

  <line x1="80" y1="226" x2="220" y2="226" stroke="#525a64" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="32" y="220" class="step-n">3.</text>
  <text x="50" y="220" class="step">validate</text>

  <line x1="220" y1="252" x2="360" y2="252" stroke="#525a64" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="160" y="246" class="step-n">4.</text>
  <text x="178" y="246" class="step">JSON 健全性检查</text>

  <line x1="220" y1="280" x2="80" y2="280" stroke="#525a64" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="160" y="274" class="step-n">5.</text>
  <text x="178" y="274" class="step">OK / 错误</text>

  <rect x="0" y="298" width="960" height="28" fill="#fff2e3" stroke="#cd7c2e" stroke-dasharray="3 2"/>
  <text x="20" y="317" class="phase-t" fill="#7a4a14">阶段 2 · L1 上桥 + 消息传递解锁</text>

  <line x1="80" y1="350" x2="220" y2="350" stroke="#525a64" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="32" y="344" class="step-n">6.</text>
  <text x="50" y="344" class="step">register-chain</text>

  <line x1="220" y1="378" x2="80" y2="378" stroke="#525a64" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="32" y="372" class="step-n">7.</text>
  <text x="56" y="372" class="step">91 字节 configBytes hex + RegisterChain 计划</text>
  <text x="60" y="392" class="note">(计划打印器;永不持有密钥)</text>

  <line x1="80" y1="412" x2="510" y2="412" stroke="#525a64" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="32" y="406" class="step-n">8.</text>
  <text x="50" y="406" class="step">把参数粘进钱包</text>

  <line x1="510" y1="442" x2="680" y2="442" stroke="#c4413e" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="465" y="436" class="step-n">9.</text>
  <text x="486" y="436" class="step" fill="#88312e">RegisterChain(chainId, configBytes, ...)</text>

  <line x1="680" y1="468" x2="510" y2="468" stroke="#3a8454" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="465" y="462" class="step-n">10.</text>
  <text x="490" y="462" class="step" fill="#1d4d2c">tx 接受</text>

  <line x1="80" y1="500" x2="220" y2="500" stroke="#525a64" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="20" y="494" class="step-n">11.</text>
  <text x="46" y="494" class="step">deploy-bridge-adapter</text>

  <line x1="220" y1="528" x2="80" y2="528" stroke="#525a64" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="20" y="522" class="step-n">12.</text>
  <text x="46" y="522" class="step">L2NativeBridge 部署计划 → 钱包执行</text>

  <rect x="0" y="546" width="960" height="28" fill="#e7f4eb" stroke="#3a8454" stroke-dasharray="3 2"/>
  <text x="20" y="565" class="phase-t" fill="#1d4d2c">阶段 3 · L2 批次落到 L1;端到端工作</text>

  <line x1="80" y1="598" x2="220" y2="598" stroke="#525a64" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="20" y="592" class="step-n">13.</text>
  <text x="46" y="592" class="step">start-sequencer</text>

  <line x1="220" y1="626" x2="80" y2="626" stroke="#525a64" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="20" y="620" class="step-n">14.</text>
  <text x="46" y="620" class="step">preflight + "用 neo-cli 组合" 说明</text>

  <line x1="80" y1="658" x2="870" y2="658" stroke="#525a64" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="20" y="652" class="step-n">15.</text>
  <text x="46" y="652" class="step">启动 neo-cli + L2 插件</text>

  <g>
    <rect x="800" y="678" width="140" height="32" rx="4" ry="4" fill="#e7f4eb" stroke="#3a8454" stroke-dasharray="2 2"/>
    <text x="20" y="694" class="step-n">16.</text>
    <text x="870" y="699" text-anchor="middle" class="note">dBFT 2.0 启动</text>
  </g>
  <text x="46" y="694" class="step">L2 排序器自启动(dBFT)</text>

  <line x1="80" y1="734" x2="220" y2="734" stroke="#525a64" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="20" y="728" class="step-n">17.</text>
  <text x="46" y="728" class="step">start-batcher</text>

  <line x1="870" y1="762" x2="680" y2="762" stroke="#525a64" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="20" y="756" class="step-n">18.</text>
  <text x="46" y="756" class="step">L2 BatchInfoContract 镜像 L1 游标</text>

  <line x1="870" y1="794" x2="510" y2="794" stroke="#c4413e" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="20" y="788" class="step-n">19.</text>
  <text x="46" y="788" class="step" fill="#88312e">SettlementManager.SubmitBatch(承诺 + 证明)</text>

  <line x1="680" y1="826" x2="870" y2="826" stroke="#3a8454" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="20" y="820" class="step-n">20.</text>
  <text x="46" y="820" class="step" fill="#1d4d2c">BatchSubmitted → 端到端贯通</text>

  <line x1="0" y1="900" x2="960" y2="900" stroke="#cfd5dd" stroke-width="1"/>
  <text x="480" y="930" text-anchor="middle" class="phase-t" fill="#1e2a55">3 个阶段:</text>
  <text x="480" y="958" text-anchor="middle" class="note" fill="#525a64">P1:本地文件存在;链有身份但无链上存在。</text>
  <text x="480" y="980" text-anchor="middle" class="note" fill="#525a64">P2:NeoHub 知道该链;排序器在产出 L2 块。</text>
  <text x="480" y="1002" text-anchor="middle" class="note" fill="#525a64">P3:L2 批次落到 L1;桥 + 消息传递端到端工作。</text>
</svg>
