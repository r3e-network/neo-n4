<text x="106" y="298" class="strong">源域</text>
<text x="106" y="328" class="body">L1、L2 或异构链事件产生桥意图。</text>
<path class="accentArrow" d="M272 374 C284 374 282 428 300 428"/>
<rect x="300" y="324" width="180" height="208" rx="8" fill="#ecfdf5" stroke="#0f766e" stroke-width="1.4"/>
<text x="314" y="352" class="strong">规范化</text>
<text x="314" y="382" class="body">watcher</text>
<text x="314" y="400" class="body">或合约把事件编码成规范消息字节。</text>
<path class="accentArrow" d="M480 428 C492 428 490 374 508 374"/>
<rect x="508" y="270" width="180" height="208" rx="8" fill="#ecfdf5" stroke="#0f766e" stroke-width="1.4"/>
