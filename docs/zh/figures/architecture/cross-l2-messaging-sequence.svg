<text x="522" y="328" class="body">NeoHub</text>
<text x="522" y="346" class="body">在消费前检查注册表、nonce、证明和资产策略。</text>
<path class="accentArrow" d="M688 374 C700 374 698 428 716 428"/>
<rect x="716" y="324" width="180" height="208" rx="8" fill="#ecfdf5" stroke="#0f766e" stroke-width="1.4"/>
