<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 580" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', Helvetica, Arial, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">跨 L2 消息传递序列 —— 通道 3</title>
  <desc id="desc">跨 L2 消息传递序列图。L2-A 上的用户调 L2-A.L2MessageContract.SendMessage(targetChainId, payload);L2MessageContract 发出 OutboundMessage 事件;L2-A 批处理器把消息纳入下一封装批次;经 L1 上的批次结算,L2-A.L2MessageContract 调 NeoHub.MessageRouter.RouteMessage(srcChainId、dstChainId、payload、hash);L2-B 批处理器从 MessageRouter poll 入站,转发 InboundMessage 到 L2-B.L2MessageContract;L2-B.L2MessageContract 经规范 encoder 校验消息哈希,把 payload 投递给 L2-B 上的接收方。端到端消息跨 3 条信任边界(L2-A 共识 → L1 结算 → L2-B 共识),每条边界独立校验哈希。</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#525a64"/>
    </marker>
    <filter id="card" x="-2%" y="-3%" width="104%" height="106%">
      <feDropShadow dx="0" dy="1" stdDeviation="0.9" flood-color="#000000" flood-opacity="0.07"/>
    </filter>
    <style>
      .header     { font-size: 14.5px; font-weight: 700; }
      .actor-t    { font-size: 11px; font-weight: 700; }
      .actor-s    { font-size: 9.5px; fill: #525a64; font-style: italic; }
      .lifeline   { stroke: #cfd5dd; stroke-width: 1; stroke-dasharray: 3 3; }
      .msg-t      { font-size: 11px; fill: #1e2a55; font-weight: 600; }
      .msg-s      { font-size: 10.5px; fill: #525a64; font-style: italic; }
      .note       { font-size: 10px; fill: #2d3a48; }
    </style>
  </defs>

  <rect width="960" height="580" fill="#ffffff"/>

  <text x="480" y="30" text-anchor="middle" class="header" fill="#1e2a55">跨 L2 消息传递 —— 通道 3(跨 3 条信任边界)</text>

  <g filter="url(#card)">
    <rect x="36" y="50" width="128" height="50" rx="6" ry="6" fill="#ffffff" stroke="#3a8454" stroke-width="1.2"/>
    <text x="100" y="72" text-anchor="middle" class="actor-t" fill="#1d4d2c">L2-A 上的用户</text>
    <text x="100" y="88" text-anchor="middle" class="actor-s">钱包</text>
  </g>
  <g filter="url(#card)">
    <rect x="226" y="50" width="128" height="50" rx="6" ry="6" fill="#e7f4eb" stroke="#3a8454" stroke-width="1.4"/>
    <text x="290" y="68" text-anchor="middle" class="actor-t" fill="#1d4d2c">L2-A.</text>
    <text x="290" y="80" text-anchor="middle" class="actor-t" fill="#1d4d2c">L2MessageContract</text>
    <text x="290" y="94" text-anchor="middle" class="actor-s">L2-A 原生</text>
  </g>
  <g filter="url(#card)">
    <rect x="416" y="50" width="128" height="50" rx="6" ry="6" fill="#eff3ff" stroke="#7587c1" stroke-width="1.4"/>
    <text x="480" y="68" text-anchor="middle" class="actor-t" fill="#1e2a55">NeoHub.</text>
    <text x="480" y="80" text-anchor="middle" class="actor-t" fill="#1e2a55">MessageRouter</text>
    <text x="480" y="94" text-anchor="middle" class="actor-s">L1 NeoHub</text>
  </g>
  <g filter="url(#card)">
    <rect x="606" y="50" width="128" height="50" rx="6" ry="6" fill="#e7f4eb" stroke="#3a8454" stroke-width="1.4"/>
    <text x="670" y="68" text-anchor="middle" class="actor-t" fill="#1d4d2c">L2-B.</text>
    <text x="670" y="80" text-anchor="middle" class="actor-t" fill="#1d4d2c">L2MessageContract</text>
    <text x="670" y="94" text-anchor="middle" class="actor-s">L2-B 原生</text>
  </g>
  <g filter="url(#card)">
    <rect x="796" y="50" width="128" height="50" rx="6" ry="6" fill="#ffffff" stroke="#3a8454" stroke-width="1.2"/>
    <text x="860" y="72" text-anchor="middle" class="actor-t" fill="#1d4d2c">L2-B 上的接收方</text>
    <text x="860" y="88" text-anchor="middle" class="actor-s">钱包</text>
  </g>

  <line class="lifeline" x1="100" y1="100" x2="100" y2="520"/>
  <line class="lifeline" x1="290" y1="100" x2="290" y2="520"/>
  <line class="lifeline" x1="480" y1="100" x2="480" y2="520"/>
  <line class="lifeline" x1="670" y1="100" x2="670" y2="520"/>
  <line class="lifeline" x1="860" y1="100" x2="860" y2="520"/>

  <rect x="20" y="115" width="270" height="22" rx="4" ry="4" fill="#e7f4eb" stroke="#3a8454" stroke-dasharray="2 2"/>
  <text x="155" y="130" text-anchor="middle" class="msg-s" fill="#1d4d2c" font-weight="600">信任边界 1:L2-A 共识</text>

  <line x1="100" y1="160" x2="290" y2="160" stroke="#525a64" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="195" y="154" text-anchor="middle" class="msg-t">SendMessage(targetChainId, payload)</text>

  <g>
    <rect x="240" y="178" width="100" height="36" rx="4" ry="4" fill="#e7f4eb" stroke="#3a8454" stroke-dasharray="2 2"/>
    <text x="290" y="194" text-anchor="middle" class="msg-s">发出 OutboundMessage</text>
    <text x="290" y="208" text-anchor="middle" class="msg-s">事件</text>
  </g>

  <g>
    <rect x="170" y="226" width="240" height="22" rx="4" ry="4" fill="#fff8ee" stroke="#cd7c2e" stroke-dasharray="2 2"/>
    <text x="290" y="241" text-anchor="middle" class="msg-s">(L2-A 批处理器把消息纳入下一批次)</text>
  </g>

  <rect x="295" y="262" width="370" height="22" rx="4" ry="4" fill="#eff3ff" stroke="#7587c1" stroke-dasharray="2 2"/>
  <text x="480" y="277" text-anchor="middle" class="msg-s" fill="#1e2a55" font-weight="600">信任边界 2:L1 结算</text>

  <line x1="290" y1="306" x2="480" y2="306" stroke="#c4413e" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="385" y="300" text-anchor="middle" class="msg-t" fill="#88312e">RouteMessage(srcChainId, dstChainId, payload, hash)</text>
  <text x="385" y="324" text-anchor="middle" class="msg-s">(经批次结算 —— 同一规范字节被两端哈希)</text>

  <g>
    <rect x="370" y="346" width="240" height="22" rx="4" ry="4" fill="#fff8ee" stroke="#cd7c2e" stroke-dasharray="2 2"/>
    <text x="490" y="361" text-anchor="middle" class="msg-s">(L2-B 批处理器从 MessageRouter poll 入站)</text>
  </g>

  <rect x="670" y="380" width="270" height="22" rx="4" ry="4" fill="#e7f4eb" stroke="#3a8454" stroke-dasharray="2 2"/>
  <text x="805" y="395" text-anchor="middle" class="msg-s" fill="#1d4d2c" font-weight="600">信任边界 3:L2-B 共识</text>

  <line x1="480" y1="426" x2="670" y2="426" stroke="#525a64" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="575" y="420" text-anchor="middle" class="msg-t">InboundMessage</text>

  <g>
    <rect x="618" y="444" width="104" height="36" rx="4" ry="4" fill="#e7f4eb" stroke="#3a8454" stroke-dasharray="2 2"/>
    <text x="670" y="460" text-anchor="middle" class="msg-s">VerifyMessageHash</text>
    <text x="670" y="474" text-anchor="middle" class="msg-s">(规范 encoder)</text>
  </g>

  <line x1="670" y1="506" x2="860" y2="506" stroke="#3a8454" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="765" y="500" text-anchor="middle" class="msg-t" fill="#1d4d2c">投递 payload</text>

  <text x="480" y="560" text-anchor="middle" class="msg-s" fill="#525a64">线协议格式:MessageHasher(Neo.L2.Messaging/)—— 两端都重算哈希;合约从不信任线外哈希。</text>
</svg>
