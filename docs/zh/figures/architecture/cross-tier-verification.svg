<circle cx="1038" cy="369" r="15" fill="#c2410c"/>
<text x="1038" y="374" text-anchor="middle" class="label">1</text>
<text x="1066" y="365" class="strong">语句</text>
<text x="1066" y="385" class="small">批次范围、前根、后根、DA 根、证明模式和验证密钥被绑定</text>
<path class="accentArrow" d="M1328 396 L1328 414"/>
<rect x="1012" y="414" width="630" height="54" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2"/>
<circle cx="1038" cy="441" r="15" fill="#c2410c"/>
<text x="1038" y="446" text-anchor="middle" class="label">2</text>
<text x="1066" y="437" class="strong">接受</text>
<text x="1066" y="457" class="small">只有证明通过且公开输入匹配时根才推进</text>
<path class="accentArrow" d="M1328 468 L1328 486"/>
<rect x="1012" y="486" width="630" height="54" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2"/>
<circle cx="1038" cy="513" r="15" fill="#c2410c"/>
<text x="1038" y="518" text-anchor="middle" class="label">3</text>
<text x="1066" y="509" class="strong">失败</text>
<text x="1066" y="529" class="small">坏证明、缺失 DA 或根不匹配不会改变规范状态</text>
<rect x="1672" y="358" width="146" height="174" rx="8" fill="#ffffff" stroke="#c2410c" stroke-width="1.4"/>
<text x="1686" y="386" class="strong">接受</text>
<text x="1686" y="416" class="body">证明通过且公开输入匹配已提交根</text>
<path class="dashArrow" d="M1642 460 L1672 460"/>
<text x="1014" y="562" class="mono">证明通过且公开输入匹配已提交根</text>
<rect x="92" y="730" width="150" height="120" rx="8" fill="#fff3e7" stroke="#c2410c" stroke-width="1.5"/>
<rect x="102" y="740" width="30" height="24" rx="5" fill="#c2410c"/>
