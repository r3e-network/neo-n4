<text x="140" y="758" class="strong">封装</text>
<text x="104" y="788" class="small">计算批次承诺</text>
<path class="accentArrow" d="M242 790 L290 790"/>
<rect x="290" y="730" width="150" height="120" rx="8" fill="#fff3e7" stroke="#c2410c" stroke-width="1.5"/>
<rect x="300" y="740" width="30" height="24" rx="5" fill="#c2410c"/>
<text x="315" y="757" text-anchor="middle" class="label">2</text>
<text x="338" y="758" class="strong">发布 DA</text>
<text x="302" y="788" class="small">payload 和见证写入 DA</text>
<path class="accentArrow" d="M440 790 L488 790"/>
<rect x="488" y="730" width="150" height="120" rx="8" fill="#fff3e7" stroke="#c2410c" stroke-width="1.5"/>
<rect x="498" y="740" width="30" height="24" rx="5" fill="#c2410c"/>
<text x="513" y="757" text-anchor="middle" class="label">3</text>
<text x="536" y="758" class="strong">证明</text>
<text x="500" y="788" class="small">生成 proof envelope</text>
<path class="accentArrow" d="M638 790 L686 790"/>
<rect x="686" y="730" width="150" height="120" rx="8" fill="#fff3e7" stroke="#c2410c" stroke-width="1.5"/>
<rect x="696" y="740" width="30" height="24" rx="5" fill="#c2410c"/>
<text x="711" y="757" text-anchor="middle" class="label">4</text>
<text x="734" y="758" class="strong">验证</text>
<text x="698" y="788" class="small">运行本地和 L1 检查</text>
<path class="accentArrow" d="M836 790 L884 790"/>
<rect x="884" y="730" width="150" height="120" rx="8" fill="#fff3e7" stroke="#c2410c" stroke-width="1.5"/>
<rect x="894" y="740" width="30" height="24" rx="5" fill="#c2410c"/>
<text x="909" y="757" text-anchor="middle" class="label">5</text>
<text x="932" y="758" class="strong">接受</text>
<text x="896" y="788" class="small">状态根推进</text>
<path class="accentArrow" d="M1034 790 L1082 790"/>
<rect x="1082" y="730" width="150" height="120" rx="8" fill="#fff3e7" stroke="#c2410c" stroke-width="1.5"/>
<rect x="1092" y="740" width="30" height="24" rx="5" fill="#c2410c"/>
<text x="1107" y="757" text-anchor="middle" class="label">6</text>
<text x="1130" y="758" class="strong">报告</text>
