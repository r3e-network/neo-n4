<text x="730" y="382" class="body">NeoHub 路由验证，只接受匹配的根。</text>
<line x1="296" y1="528" x2="752" y2="528" stroke="#c2410c" stroke-width="1.4" stroke-dasharray="6 6"/>
<text x="522" y="552" class="caption" text-anchor="middle">canonical boundary: hashes, roots, events, proofs, DA references</text>
<rect x="1000" y="252" width="828" height="62" rx="8" fill="#fff3e7" stroke="#c2410c" stroke-width="1.5"/>
<text x="1020" y="290" class="mono">accept_root ⇔ verify(proof, public_inputs) &amp;&amp; DA_available</text>
