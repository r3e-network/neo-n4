<text x="1392" y="658" class="panelSub">读者应验证的条件</text>
<rect x="92" y="270" width="180" height="208" rx="8" fill="#fff3e7" stroke="#c2410c" stroke-width="1.4"/>
<text x="106" y="298" class="strong">L2 执行</text>
<text x="106" y="328" class="body">有序交易产生前后状态根、回执和公开输入。</text>
<path class="accentArrow" d="M272 374 C284 374 282 428 300 428"/>
<rect x="300" y="324" width="180" height="208" rx="8" fill="#fff3e7" stroke="#c2410c" stroke-width="1.4"/>
<text x="314" y="352" class="strong">DA 发布</text>
<text x="314" y="382" class="body">批次 payload 和见证材料写入</text>
<text x="314" y="400" class="body">NeoFS，并由 CID 引用。</text>
<path class="accentArrow" d="M480 428 C492 428 490 374 508 374"/>
<rect x="508" y="270" width="180" height="208" rx="8" fill="#fff3e7" stroke="#c2410c" stroke-width="1.4"/>
<text x="522" y="298" class="strong">证明系统</text>
<text x="522" y="328" class="body">prover</text>
<text x="522" y="346" class="body">生成配置的有效性证明或证据封装。</text>
<path class="accentArrow" d="M688 374 C700 374 698 428 716 428"/>
<rect x="716" y="324" width="180" height="208" rx="8" fill="#fff3e7" stroke="#c2410c" stroke-width="1.4"/>
