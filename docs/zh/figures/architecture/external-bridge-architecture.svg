<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', Helvetica, Arial, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">外链桥架构(Phase B/C)</title>
  <desc id="desc">跨外链桥的架构。外链(例如 BSC 主网)上的 NeoExternalBridgeRouter.sol —— 同一份合约字节码原样部署到 14 条 EVM 家族链与 Tron。链下 watcher 守护进程(neo-bridge-watcher-eth)观察 Locked 事件,用 secp256k1(或 Solana 的 ed25519)对规范 ExternalCrossChainMessage 签名,提交到 NeoHub L1。L1 上,ExternalBridgeEscrow 经 ExternalBridgeRegistry 查曲线 tag 的 verifier;MpcCommitteeVerifier 校验 M-of-N 委员会签名;MpcCommitteeFraudVerifier 通过 ExternalBridgeBond 罚没等价签名委员会成员。L2 链的 L2NativeExternalBridgeContract 接收已铸/销资产。</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#525a64"/>
    </marker>
    <filter id="card" x="-2%" y="-3%" width="104%" height="106%">
      <feDropShadow dx="0" dy="1" stdDeviation="0.9" flood-color="#000000" flood-opacity="0.07"/>
    </filter>
    <style>
      .header     { font-size: 14.5px; font-weight: 700; }
      .tier-t     { font-size: 13px; font-weight: 700; letter-spacing: 0.4px; }
      .comp-t     { font-size: 11.5px; font-weight: 600; fill: #2d3a48; }
      .comp-s     { font-size: 10.5px; fill: #525a64; }
      .ed-lbl     { font-size: 10.5px; fill: #525a64; font-style: italic; }
    </style>
  </defs>

  <rect width="960" height="600" fill="#ffffff"/>

  <text x="480" y="32" text-anchor="middle" class="header" fill="#1e2a55">外链桥架构(Phase B/C)</text>

  <rect x="40" y="60" width="290" height="200" rx="10" ry="10" fill="#fde8e8" stroke="#c4413e" stroke-width="1.4"/>
  <text x="60" y="84" class="tier-t" fill="#88312e">外链</text>
  <text x="60" y="100" class="comp-s">例如 BSC 主网(14 条 EVM 家族链之一)</text>

  <g filter="url(#card)">
    <rect x="60" y="118" width="250" height="124" rx="8" ry="8" fill="#ffffff" stroke="#c4413e" stroke-width="1.2"/>
    <text x="185" y="140" text-anchor="middle" class="comp-t">NeoExternalBridgeRouter.sol</text>
    <text x="185" y="158" text-anchor="middle" class="comp-s">在任何 EVM 链上原样部署</text>
    <text x="185" y="176" text-anchor="middle" class="comp-s">(构造参数:externalChainId)</text>
    <line x1="76" y1="190" x2="294" y2="190" stroke="#c4413e" stroke-dasharray="2 2"/>
    <text x="185" y="210" text-anchor="middle" class="comp-s" font-style="italic">入站时发出 Locked 事件</text>
    <text x="185" y="226" text-anchor="middle" class="comp-s" font-style="italic">出站时接受提款封装</text>
  </g>

  <rect x="630" y="60" width="290" height="200" rx="10" ry="10" fill="#f1ecf8" stroke="#7d59b3" stroke-width="1.4"/>
  <text x="650" y="84" class="tier-t" fill="#3e2865">链下 watcher</text>
  <text x="650" y="100" class="comp-s">长跑 Rust 守护进程,k8s/systemd 管理</text>

  <g filter="url(#card)">
    <rect x="650" y="118" width="250" height="124" rx="8" ry="8" fill="#ffffff" stroke="#7d59b3" stroke-width="1.2"/>
    <text x="775" y="140" text-anchor="middle" class="comp-t">neo-bridge-watcher-eth</text>
    <text x="775" y="158" text-anchor="middle" class="comp-s">secp256k1 签名(Eth/EVM/Tron)</text>
    <text x="775" y="174" text-anchor="middle" class="comp-s">ed25519 签名(Solana)</text>
    <line x1="666" y1="186" x2="884" y2="186" stroke="#7d59b3" stroke-dasharray="2 2"/>
    <text x="775" y="204" text-anchor="middle" class="comp-s">/healthz · /metrics · flock</text>
    <text x="775" y="220" text-anchor="middle" class="comp-s">min_confirmations 缓冲</text>
    <text x="775" y="236" text-anchor="middle" class="comp-s">--preflight 校验</text>
  </g>

  <line x1="330" y1="180" x2="630" y2="180" stroke="#525a64" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="480" y="172" text-anchor="middle" class="ed-lbl">poll Locked 事件</text>

  <path d="M 630 220 Q 480 280 330 220" fill="none" stroke="#525a64" stroke-width="1.4" stroke-dasharray="3 2" marker-end="url(#arrow)"/>
  <text x="480" y="280" text-anchor="middle" class="ed-lbl">提款封装(委员会联签)</text>

  <line x1="775" y1="260" x2="775" y2="300" stroke="#525a64" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="785" y="284" class="ed-lbl">ExternalCrossChainMessage</text>
  <text x="785" y="297" class="ed-lbl">(102B 前缀 + payload)</text>

  <rect x="180" y="310" width="600" height="180" rx="10" ry="10" fill="#eff3ff" stroke="#7587c1" stroke-width="1.4"/>
  <text x="200" y="334" class="tier-t" fill="#1e2a55">NeoHub L1</text>

  <g filter="url(#card)">
    <rect x="200" y="346" width="180" height="60" rx="6" ry="6" fill="#ffffff" stroke="#7587c1" stroke-width="1.5"/>
    <text x="290" y="368" text-anchor="middle" class="comp-t">ExternalBridgeEscrow</text>
    <text x="290" y="386" text-anchor="middle" class="comp-s">铸/销包装资产</text>
    <text x="290" y="400" text-anchor="middle" class="comp-s">带重放保护</text>
  </g>
  <g filter="url(#card)">
    <rect x="400" y="346" width="180" height="60" rx="6" ry="6" fill="#ffffff" stroke="#7587c1"/>
    <text x="490" y="368" text-anchor="middle" class="comp-t">MpcCommitteeVerifier</text>
    <text x="490" y="386" text-anchor="middle" class="comp-s">M-of-N 委员会签名校验</text>
    <text x="490" y="400" text-anchor="middle" class="comp-s">曲线无关(k1 / ed25519)</text>
  </g>
  <g filter="url(#card)">
    <rect x="600" y="346" width="160" height="60" rx="6" ry="6" fill="#ffffff" stroke="#7587c1"/>
    <text x="680" y="368" text-anchor="middle" class="comp-t">ExternalBridgeRegistry</text>
    <text x="680" y="386" text-anchor="middle" class="comp-s">曲线 tag verifier</text>
    <text x="680" y="400" text-anchor="middle" class="comp-s">按 chainId 查找</text>
  </g>

  <g filter="url(#card)">
    <rect x="200" y="416" width="280" height="60" rx="6" ry="6" fill="#fde8e8" stroke="#c4413e" stroke-width="1.3"/>
    <text x="340" y="438" text-anchor="middle" class="comp-t" fill="#88312e">MpcCommitteeFraudVerifier</text>
    <text x="340" y="456" text-anchor="middle" class="comp-s">从密码学上证明等价签名</text>
    <text x="340" y="470" text-anchor="middle" class="comp-s">→ 无许可罚没</text>
  </g>
  <g filter="url(#card)">
    <rect x="500" y="416" width="260" height="60" rx="6" ry="6" fill="#ffffff" stroke="#7587c1"/>
    <text x="630" y="438" text-anchor="middle" class="comp-t">ExternalBridgeBond</text>
    <text x="630" y="456" text-anchor="middle" class="comp-s">委员会可罚没保证金</text>
    <text x="630" y="470" text-anchor="middle" class="comp-s">(reporter 拿保证金当奖励)</text>
  </g>

  <line x1="290" y1="490" x2="290" y2="528" stroke="#525a64" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="300" y="514" class="ed-lbl">铸/销触发</text>

  <g filter="url(#card)">
    <rect x="180" y="530" width="600" height="60" rx="10" ry="10" fill="#e7f4eb" stroke="#3a8454" stroke-width="1.4"/>
    <text x="480" y="554" text-anchor="middle" class="tier-t" fill="#1d4d2c">L2 链</text>
    <text x="480" y="574" text-anchor="middle" class="comp-t">L2NativeExternalBridgeContract  —  按 L2 的外链包装资产状态</text>
  </g>
</svg>
