<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 920" font-family="'Noto Sans CJK SC', 'Source Han Sans SC', 'WenQuanYi Zen Hei', 'Microsoft YaHei', sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">L1 做什么 —— NeoHub 的 6 个关注点</title>
  <desc id="desc">21 个 NeoHub L1 合约按 6 个关注点分组。Settlement(SettlementManager、VerifierRegistry —— 定义信任边界)。Bridge(SharedBridge、TokenRegistry、ChainRegistry —— 资产在 L1)。Messaging(MessageRouter、DARegistry —— 跨 L2 路由仲裁)。Security(SequencerRegistry、SequencerBond、ForcedInclusion、OptimisticChallenge —— 可罚没保证金 + 抗审查)。Governance + Emergency(GovernanceController、EmergencyManager —— 慢升级 + 逃生通道)。External bridge(6 个外链合约)。再加 1 个专用 fraud verifier 槽位(RestrictedExecutionFraudVerifier —— 从 storage 证明重新派生 pre/post 状态根)。</desc>

  <defs>
    <filter id="card" x="-2%" y="-3%" width="104%" height="106%">
      <feDropShadow dx="0" dy="1" stdDeviation="0.9" flood-color="#000000" flood-opacity="0.07"/>
    </filter>
    <style>
      .header     { font-size: 14.5px; font-weight: 700; }
      .grp-t      { font-size: 13.5px; font-weight: 700; letter-spacing: 0.3px; }
      .grp-s      { font-size: 11px; fill: #525a64; font-style: italic; }
      .ctr-name   { font-size: 11px; font-weight: 600; fill: #1e2a55; font-family: 'Noto Sans Mono CJK SC', ui-monospace, 'SF Mono',monospace; }
      .ctr-desc   { font-size: 10.5px; fill: #2d3a48; }
      .why-t      { font-size: 10.5px; font-weight: 700; fill: #c4413e; }
      .why-s      { font-size: 10.5px; fill: #2d3a48; }
    </style>
  </defs>

  <rect width="960" height="920" fill="#ffffff"/>

  <text x="480" y="32" text-anchor="middle" class="header" fill="#1e2a55">L1 做什么 —— NeoHub 的 6 个关注点(21 个合约)</text>

  <g filter="url(#card)">
    <rect x="40" y="58" width="440" height="170" rx="10" ry="10" fill="#eff3ff" stroke="#7587c1" stroke-width="1.5"/>
    <text x="60" y="82" class="grp-t" fill="#1e2a55">Settlement</text>
    <text x="160" y="82" class="grp-s">—— 信任边界</text>
    <line x1="56" y1="92" x2="464" y2="92" stroke="#7587c1" stroke-dasharray="3 2"/>
    <text x="60" y="116" class="ctr-name">SettlementManager</text>
    <text x="220" y="116" class="ctr-desc">→ 接收 L2 批次;发出规范状态</text>
    <text x="60" y="138" class="ctr-name">VerifierRegistry</text>
    <text x="220" y="138" class="ctr-desc">→ 按 proofType 派发;按协议版本</text>
    <line x1="56" y1="156" x2="464" y2="156" stroke="#cfd5dd"/>
    <text x="60" y="178" class="why-t">为什么 L1:</text>
    <foreignObject x="140" y="164" width="330" height="60">
      <p xmlns="http://www.w3.org/1999/xhtml" style="font: 10.5px -apple-system, sans-serif; margin: 0; color: #2d3a48; line-height: 1.45;">
        定义 "L2 已最终化" 是什么。不能住 L2 —— 会循环
        (L2 自己决定 L2 的合法性)。
      </p>
    </foreignObject>
  </g>

  <g filter="url(#card)">
    <rect x="490" y="58" width="430" height="170" rx="10" ry="10" fill="#eff3ff" stroke="#7587c1" stroke-width="1.5"/>
    <text x="510" y="82" class="grp-t" fill="#1e2a55">Bridge</text>
    <text x="582" y="82" class="grp-s">—— 资产托管</text>
    <line x1="506" y1="92" x2="904" y2="92" stroke="#7587c1" stroke-dasharray="3 2"/>
    <text x="510" y="116" class="ctr-name">SharedBridge</text>
    <text x="640" y="116" class="ctr-desc">→ 托管资产,凭 Merkle 证明释放</text>
    <text x="510" y="138" class="ctr-name">TokenRegistry</text>
    <text x="640" y="138" class="ctr-desc">→ symbol / decimals / 原生链</text>
    <text x="510" y="158" class="ctr-name">ChainRegistry</text>
    <text x="640" y="158" class="ctr-desc">→ 存按链的 91 字节 config</text>
    <line x1="506" y1="170" x2="904" y2="170" stroke="#cfd5dd"/>
    <text x="510" y="192" class="why-t">为什么 L1:</text>
    <foreignObject x="590" y="178" width="320" height="60">
      <p xmlns="http://www.w3.org/1999/xhtml" style="font: 10.5px -apple-system, sans-serif; margin: 0; color: #2d3a48; line-height: 1.45;">
        资产**在** L1 上;托管必须在资产所在处。ChainRegistry
        必须在 L1 —— 所有 L2 + 桥都读它。
      </p>
    </foreignObject>
  </g>

  <g filter="url(#card)">
    <rect x="40" y="244" width="440" height="146" rx="10" ry="10" fill="#eff3ff" stroke="#7587c1" stroke-width="1.5"/>
    <text x="60" y="268" class="grp-t" fill="#1e2a55">Messaging</text>
    <text x="170" y="268" class="grp-s">—— 跨 L2 路由</text>
    <line x1="56" y1="278" x2="464" y2="278" stroke="#7587c1" stroke-dasharray="3 2"/>
    <text x="60" y="302" class="ctr-name">MessageRouter</text>
    <text x="220" y="302" class="ctr-desc">→ 在 L2 间路由消息;规范哈希</text>
    <text x="60" y="324" class="ctr-name">DARegistry</text>
    <text x="220" y="324" class="ctr-desc">→ 记录已发布 daCommitment 哈希</text>
    <line x1="56" y1="338" x2="464" y2="338" stroke="#cfd5dd"/>
    <text x="60" y="360" class="why-t">为什么 L1:</text>
    <foreignObject x="140" y="346" width="330" height="40">
      <p xmlns="http://www.w3.org/1999/xhtml" style="font: 10.5px -apple-system, sans-serif; margin: 0; color: #2d3a48; line-height: 1.45;">
        L2-A → L2-B 没别的信任锚。两端都共享 L1 作为路由
        仲裁。
      </p>
    </foreignObject>
  </g>

  <g filter="url(#card)">
    <rect x="490" y="244" width="430" height="146" rx="10" ry="10" fill="#fde8e8" stroke="#c4413e" stroke-width="1.5"/>
    <text x="510" y="268" class="grp-t" fill="#88312e">Security</text>
    <text x="592" y="268" class="grp-s">—— 可罚没保证金 + 抗审查</text>
    <line x1="506" y1="278" x2="904" y2="278" stroke="#c4413e" stroke-dasharray="3 2"/>
    <text x="510" y="298" class="ctr-name">SequencerRegistry</text>
    <text x="640" y="298" class="ctr-desc">+ SequencerBond(可罚没)</text>
    <text x="510" y="318" class="ctr-name">ForcedInclusion</text>
    <text x="640" y="318" class="ctr-desc">+ OptimisticChallenge(二分博弈)</text>
    <line x1="506" y1="332" x2="904" y2="332" stroke="#cfd5dd"/>
    <text x="510" y="354" class="why-t">为什么 L1:</text>
    <foreignObject x="590" y="340" width="320" height="50">
      <p xmlns="http://www.w3.org/1999/xhtml" style="font: 10.5px -apple-system, sans-serif; margin: 0; color: #2d3a48; line-height: 1.45;">
        保证金需要 L1 的经济安全才能被有意义地罚没。强制纳入
        必须在 L1 —— 否则审查排序器会同时控制抗审查机制。
      </p>
    </foreignObject>
  </g>

  <g filter="url(#card)">
    <rect x="40" y="406" width="440" height="146" rx="10" ry="10" fill="#eff3ff" stroke="#7587c1" stroke-width="1.5"/>
    <text x="60" y="430" class="grp-t" fill="#1e2a55">Governance + Emergency</text>
    <line x1="56" y1="440" x2="464" y2="440" stroke="#7587c1" stroke-dasharray="3 2"/>
    <text x="60" y="464" class="ctr-name">GovernanceController</text>
    <text x="240" y="464" class="ctr-desc">→ 升级的多签 + timelock</text>
    <text x="60" y="486" class="ctr-name">EmergencyManager</text>
    <text x="240" y="486" class="ctr-desc">→ 运维多签暂停</text>
    <line x1="56" y1="500" x2="464" y2="500" stroke="#cfd5dd"/>
    <text x="60" y="522" class="why-t">为什么 L1:</text>
    <foreignObject x="140" y="508" width="330" height="40">
      <p xmlns="http://www.w3.org/1999/xhtml" style="font: 10.5px -apple-system, sans-serif; margin: 0; color: #2d3a48; line-height: 1.45;">
        升级需要慢 + 多签 —— L1 终结性 + 可见性。紧急暂停必
        须比单条 L2 的故障期更长。
      </p>
    </foreignObject>
  </g>

  <g filter="url(#card)">
    <rect x="490" y="406" width="430" height="146" rx="10" ry="10" fill="#fff2e3" stroke="#cd7c2e" stroke-width="1.5"/>
    <text x="510" y="430" class="grp-t" fill="#7a4a14">外链桥</text>
    <text x="585" y="430" class="grp-s">—— Phase B/C</text>
    <line x1="506" y1="440" x2="904" y2="440" stroke="#cd7c2e" stroke-dasharray="3 2"/>
    <text x="510" y="460" class="ctr-name">MpcCommitteeVerifier</text>
    <text x="690" y="460" class="ctr-desc">+ ExternalBridgeRegistry</text>
    <text x="510" y="480" class="ctr-name">ExternalBridgeEscrow</text>
    <text x="690" y="480" class="ctr-desc">+ ExternalBridgeBond(可罚没)</text>
    <text x="510" y="500" class="ctr-name">MpcCommitteeFraudVerifier</text>
    <text x="690" y="500" class="ctr-desc">+ ExternalBridgeStubVerifier(测试)</text>
    <line x1="506" y1="514" x2="904" y2="514" stroke="#cfd5dd"/>
    <text x="510" y="536" class="why-t">为什么 L1:</text>
    <foreignObject x="590" y="522" width="320" height="30">
      <p xmlns="http://www.w3.org/1999/xhtml" style="font: 10.5px -apple-system, sans-serif; margin: 0; color: #2d3a48; line-height: 1.45;">
        同 L1↔L2 桥的信任 + 经济安全论据;委员会保证金需要
        L1 罚没。
      </p>
    </foreignObject>
  </g>

  <g filter="url(#card)">
    <rect x="40" y="572" width="880" height="100" rx="10" ry="10" fill="#f4ece1" stroke="#cd9c5e" stroke-width="1.3"/>
    <text x="60" y="596" class="grp-t" fill="#7a5a14">外加 1 个专用 verifier 槽位</text>
    <line x1="56" y1="606" x2="904" y2="606" stroke="#cd9c5e" stroke-dasharray="3 2"/>
    <text x="60" y="630" class="ctr-name">RestrictedExecutionFraudVerifier</text>
    <text x="320" y="630" class="ctr-desc">→ 无信任 v3:从 storage 证明重新派生 pre/post 状态根</text>
    <text x="60" y="650" class="grp-s">按 (chainId, proofType=v3) 注册到 VerifierRegistry;接受 well-formed 声明而无需治理仲裁。</text>
  </g>

  <text x="480" y="708" text-anchor="middle" class="grp-s" fill="#525a64" font-style="normal" font-weight="600">关键观察:</text>
  <foreignObject x="120" y="716" width="720" height="180">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font: 11.5px -apple-system, sans-serif; margin: 0; color: #2d3a48; line-height: 1.55; text-align: center;">
      L1 合约持有的是<em>承诺与权限</em>,而非批量状态。NeoHub 的存储刻意稀疏 —— 注册表条目、余额、可
      罚没保证金账本、证明接受记录。
    </p>
    <p xmlns="http://www.w3.org/1999/xhtml" style="font: 11px -apple-system, sans-serif; margin: 14px 0 0 0; color: #525a64; line-height: 1.55; text-align: center; font-style: italic;">
      L1 存储的代价强制如此;信任模型要求如此。
    </p>
  </foreignObject>
</svg>
