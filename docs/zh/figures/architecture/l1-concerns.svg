<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1180" viewBox="0 0 1920 1180" role="img" aria-label="NeoHub L1 关注点">
<defs>
<marker id="arrowAccent" viewBox="0 0 10 10" refX="9.2" refY="5" markerWidth="10" markerHeight="10" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#0369a1"/></marker>
<marker id="arrowGray" viewBox="0 0 10 10" refX="9.2" refY="5" markerWidth="10" markerHeight="10" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#475569"/></marker>
<marker id="arrowFault" viewBox="0 0 10 10" refX="9.2" refY="5" markerWidth="10" markerHeight="10" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#dc2626"/></marker>
<filter id="shadow" x="-3%" y="-4%" width="106%" height="108%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.10"/></filter>
<style>
.bg{fill:#f8fafc}.panel{fill:#ffffff;stroke:#cbd5e1;stroke-width:1.5;filter:url(#shadow)}
.title{font:800 36px 'Inter','Segoe UI',Arial,sans-serif;fill:#0f172a}.subtitle{font:500 17px 'Inter','Segoe UI',Arial,sans-serif;fill:#475569}
.panelTitle{font:750 22px 'Inter','Segoe UI',Arial,sans-serif;fill:#0f172a}.panelSub{font:500 15px 'Inter','Segoe UI',Arial,sans-serif;fill:#475569}
.strong{font:760 15px 'Inter','Segoe UI',Arial,sans-serif;fill:#0f172a}.body{font:500 14px 'Inter','Segoe UI',Arial,sans-serif;fill:#334155}.small{font:500 13px 'Inter','Segoe UI',Arial,sans-serif;fill:#475569}
.mono{font:650 14px 'Cascadia Mono','SFMono-Regular',Consolas,monospace;fill:#0f172a}.label{font:800 14px 'Inter','Segoe UI',Arial,sans-serif;fill:#ffffff}.caption{font:500 13px 'Inter','Segoe UI',Arial,sans-serif;fill:#64748b}
.accentArrow{stroke:#0369a1;stroke-width:2.6;fill:none;marker-end:url(#arrowAccent)}.dashArrow{stroke:#64748b;stroke-width:2.0;fill:none;stroke-dasharray:7 6;marker-end:url(#arrowGray)}.faultArrow{stroke:#dc2626;stroke-width:2.2;fill:none;stroke-dasharray:5 5;marker-end:url(#arrowFault)}
</style>
</defs>
<rect class="bg" width="1920" height="1180"/>
<text x="56" y="66" class="title">NeoHub L1 关注点</text>
<text x="56" y="98" class="subtitle">结算、桥、消息、安全、治理和外链桥职责。</text>
<rect x="56" y="118" width="1808" height="38" rx="6" fill="#eef7ff" stroke="#0369a1" stroke-width="1.2"/>
<text x="76" y="143" class="small">读图方式： <tspan class="strong">论文式技术图；强调架构、原理、数据流、工作流和审计条件。</tspan></text>
<rect x="56" y="178" width="870" height="392" rx="10" class="panel"/>
<rect x="56" y="178" width="870" height="54" rx="10" fill="#eef7ff"/>
<circle cx="86" cy="206" r="16" fill="#0369a1"/>
<text x="86" y="211" text-anchor="middle" class="label">a</text>
<text x="114" y="210" class="panelTitle">技术拓扑</text>
<text x="114" y="230" class="panelSub">参与平面、边界和职责</text>
<rect x="966" y="178" width="898" height="392" rx="10" class="panel"/>
<rect x="966" y="178" width="898" height="54" rx="10" fill="#eef7ff"/>
<circle cx="996" cy="206" r="16" fill="#0369a1"/>
<text x="996" y="211" text-anchor="middle" class="label">b</text>
<text x="1024" y="210" class="panelTitle">技术模型</text>
<text x="1024" y="230" class="panelSub">形式化规则和接受条件</text>
<rect x="56" y="606" width="1240" height="494" rx="10" class="panel"/>
<rect x="56" y="606" width="1240" height="54" rx="10" fill="#eef7ff"/>
<circle cx="86" cy="634" r="16" fill="#0369a1"/>
<text x="86" y="639" text-anchor="middle" class="label">c</text>
<text x="114" y="638" class="panelTitle">编号协议路径</text>
<text x="114" y="658" class="panelSub">关键对象如何推进</text>
<rect x="1334" y="606" width="530" height="494" rx="10" class="panel"/>
<rect x="1334" y="606" width="530" height="54" rx="10" fill="#eef7ff"/>
<circle cx="1364" cy="634" r="16" fill="#0369a1"/>
<text x="1364" y="639" text-anchor="middle" class="label">d</text>
<text x="1392" y="638" class="panelTitle">审计检查点</text>
<text x="1392" y="658" class="panelSub">读者应验证的条件</text>
<rect x="92" y="270" width="180" height="208" rx="8" fill="#eef7ff" stroke="#0369a1" stroke-width="1.4"/>
<text x="106" y="298" class="strong">规范层</text>
<text x="106" y="328" class="body">NeoHub</text>
<text x="106" y="346" class="body">负责共享事实、注册表、托管、验证策略和治理。</text>
<path class="accentArrow" d="M272 374 C284 374 282 428 300 428"/>
<rect x="300" y="324" width="180" height="208" rx="8" fill="#eef7ff" stroke="#0369a1" stroke-width="1.4"/>
<text x="314" y="352" class="strong">执行层</text>
<text x="314" y="382" class="body">N4 L2</text>
<text x="314" y="400" class="body">链执行交易，NeoVM2/RISC-V</text>
<text x="314" y="418" class="body">是默认 canonical profile。</text>
<path class="accentArrow" d="M480 428 C492 428 490 374 508 374"/>
<rect x="508" y="270" width="180" height="208" rx="8" fill="#eef7ff" stroke="#0369a1" stroke-width="1.4"/>
<text x="522" y="298" class="strong">证据层</text>
<text x="522" y="328" class="body">Gateway、prover 和 NeoFS</text>
<text x="522" y="346" class="body">把执行结果绑定到紧凑且可取回的证据。</text>
<path class="accentArrow" d="M688 374 C700 374 698 428 716 428"/>
<rect x="716" y="324" width="180" height="208" rx="8" fill="#eef7ff" stroke="#0369a1" stroke-width="1.4"/>
<text x="730" y="352" class="strong">消费层</text>
<text x="730" y="382" class="body">钱包、SDK、relayer、审计者和运维者消费已接受根和事件。</text>
<line x1="296" y1="528" x2="752" y2="528" stroke="#0369a1" stroke-width="1.4" stroke-dasharray="6 6"/>
<text x="522" y="552" class="caption" text-anchor="middle">canonical boundary: hashes, roots, events, proofs, DA references</text>
<rect x="1000" y="252" width="828" height="62" rx="8" fill="#eef7ff" stroke="#0369a1" stroke-width="1.5"/>
<text x="1020" y="290" class="mono">accepted_fact = registered &amp;&amp; executed &amp;&amp; DA_bound &amp;&amp; verified</text>
<rect x="1012" y="342" width="630" height="54" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2"/>
<circle cx="1038" cy="369" r="15" fill="#0369a1"/>
<text x="1038" y="374" text-anchor="middle" class="label">1</text>
<text x="1066" y="365" class="strong">分离</text>
<text x="1066" y="385" class="small">权限、执行、证据和数据可用性保持独立平面</text>
<path class="accentArrow" d="M1328 396 L1328 414"/>
<rect x="1012" y="414" width="630" height="54" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2"/>
<circle cx="1038" cy="441" r="15" fill="#0369a1"/>
<text x="1038" y="446" text-anchor="middle" class="label">2</text>
<text x="1066" y="437" class="strong">承诺</text>
<text x="1066" y="457" class="small">跨平面通信使用根、哈希、回执、报告和注册表条目</text>
<path class="accentArrow" d="M1328 468 L1328 486"/>
<rect x="1012" y="486" width="630" height="54" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2"/>
<circle cx="1038" cy="513" r="15" fill="#0369a1"/>
<text x="1038" y="518" text-anchor="middle" class="label">3</text>
<text x="1066" y="509" class="strong">可扩展</text>
<text x="1066" y="529" class="small">额外 VM 是 N4 execution profile，不是 NeoX 或另一条产品线</text>
<rect x="1672" y="358" width="146" height="174" rx="8" fill="#ffffff" stroke="#0369a1" stroke-width="1.4"/>
<text x="1686" y="386" class="strong">接受</text>
<text x="1686" y="416" class="body">只有注册、DA、证明和根匹配时成为共享事实</text>
<path class="dashArrow" d="M1642 460 L1672 460"/>
<text x="1014" y="562" class="mono">只有注册、DA、证明和根匹配时成为共享事实</text>
<rect x="92" y="730" width="150" height="120" rx="8" fill="#eef7ff" stroke="#0369a1" stroke-width="1.5"/>
<rect x="102" y="740" width="30" height="24" rx="5" fill="#0369a1"/>
<text x="117" y="757" text-anchor="middle" class="label">1</text>
<text x="140" y="758" class="strong">注册</text>
<text x="104" y="788" class="small">链配置和策略进入 NeoHub</text>
<path class="accentArrow" d="M242 790 L290 790"/>
<rect x="290" y="730" width="150" height="120" rx="8" fill="#eef7ff" stroke="#0369a1" stroke-width="1.5"/>
<rect x="300" y="740" width="30" height="24" rx="5" fill="#0369a1"/>
<text x="315" y="757" text-anchor="middle" class="label">2</text>
<text x="338" y="758" class="strong">执行</text>
<text x="302" y="788" class="small">L2 产生有序状态转换</text>
<path class="accentArrow" d="M440 790 L488 790"/>
<rect x="488" y="730" width="150" height="120" rx="8" fill="#eef7ff" stroke="#0369a1" stroke-width="1.5"/>
<rect x="498" y="740" width="30" height="24" rx="5" fill="#0369a1"/>
<text x="513" y="757" text-anchor="middle" class="label">3</text>
<text x="536" y="758" class="strong">发布</text>
<text x="500" y="788" class="small">NeoFS 存储数据和见证</text>
<path class="accentArrow" d="M638 790 L686 790"/>
<rect x="686" y="730" width="150" height="120" rx="8" fill="#eef7ff" stroke="#0369a1" stroke-width="1.5"/>
<rect x="696" y="740" width="30" height="24" rx="5" fill="#0369a1"/>
<text x="711" y="757" text-anchor="middle" class="label">4</text>
<text x="734" y="758" class="strong">证明</text>
<text x="698" y="788" class="small">配置的证明路径生成证据</text>
<path class="accentArrow" d="M836 790 L884 790"/>
<rect x="884" y="730" width="150" height="120" rx="8" fill="#eef7ff" stroke="#0369a1" stroke-width="1.5"/>
<rect x="894" y="740" width="30" height="24" rx="5" fill="#0369a1"/>
<text x="909" y="757" text-anchor="middle" class="label">5</text>
<text x="932" y="758" class="strong">结算</text>
<text x="896" y="788" class="small">NeoHub 接受已验证根</text>
<path class="accentArrow" d="M1034 790 L1082 790"/>
<rect x="1082" y="730" width="150" height="120" rx="8" fill="#eef7ff" stroke="#0369a1" stroke-width="1.5"/>
<rect x="1092" y="740" width="30" height="24" rx="5" fill="#0369a1"/>
<text x="1107" y="757" text-anchor="middle" class="label">6</text>
<text x="1130" y="758" class="strong">消费</text>
<text x="1094" y="788" class="small">用户、relayer</text>
<text x="1094" y="805" class="small">和应用消费终局事实</text>
<path class="dashArrow" d="M182 900 C412 974 852 974 1132 900"/>
<rect x="482" y="914" width="210" height="120" rx="8" fill="#fff1f2" stroke="#dc2626" stroke-width="1.4"/>
<text x="496" y="942" class="strong">Reject / Recover</text>
<text x="496" y="972" class="body">bad evidence, replay,</text>
<text x="496" y="990" class="body">missing data, timeout,</text>
<text x="496" y="1008" class="body">policy mismatch</text>
<path class="faultArrow" d="M562 850 L562 914"/>
<text x="92" y="1070" class="caption">实线：状态 / 数据 · 虚线：证明 / 观测 · 红线：拒绝 / 恢复</text>
<rect x="1368" y="710" width="462" height="294" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2"/>
<rect x="1378" y="720" width="442" height="58" rx="6" fill="#eef7ff"/>
<text x="1390" y="743" class="strong">边界</text>
<text x="1518" y="740" class="small">每层只负责一个明确职责</text>
<rect x="1378" y="788" width="442" height="58" rx="6" fill="#ffffff"/>
<text x="1390" y="811" class="strong">终局</text>
<text x="1518" y="808" class="small">L1 接受是共享事实源</text>
<rect x="1378" y="856" width="442" height="58" rx="6" fill="#eef7ff"/>
<text x="1390" y="879" class="strong">DA</text>
<text x="1518" y="876" class="small">被接受根引用可取回数据</text>
<rect x="1378" y="924" width="442" height="58" rx="6" fill="#ffffff"/>
<text x="1390" y="947" class="strong">一致性</text>
<text x="1518" y="944" class="small">文档、配置和图描述同一架构</text>
<line x1="1504" y1="724" x2="1504" y2="992" stroke="#0369a1" stroke-width="1.2" stroke-dasharray="4 5"/>
<rect x="1368" y="1026" width="462" height="74" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2"/>
<line x1="1388" y1="1050" x2="1434" y2="1050" stroke="#0369a1" stroke-width="2.6" marker-end="url(#arrowAccent)"/>
<text x="1450" y="1054" class="small">实线：状态 / 数据</text>
<line x1="1388" y1="1074" x2="1434" y2="1074" stroke="#64748b" stroke-width="2.0" stroke-dasharray="7 6" marker-end="url(#arrowGray)"/>
<text x="1450" y="1078" class="small">虚线：证明 / 观测</text>
<line x1="1660" y1="1074" x2="1704" y2="1074" stroke="#dc2626" stroke-width="2.2" stroke-dasharray="5 5" marker-end="url(#arrowFault)"/>
<text x="1718" y="1078" class="small">红线：拒绝 / 恢复</text>
