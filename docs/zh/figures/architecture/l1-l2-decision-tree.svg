<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" font-family="'Noto Sans CJK SC', 'Source Han Sans SC', 'WenQuanYi Zen Hei', 'Microsoft YaHei', sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">L1 vs L2 落点决策树</title>
  <desc id="desc">5 问决策树:Q1 别的 L2 需要读这段状态吗 —— 是则 L1。Q2 这段状态可罚没/承担经济安全吗 —— 是则 L1。Q3 这定义在 L1 上什么合法吗(信任边界)—— 是则 L1。Q4 吞吐量超过 L1 能处理的吗 —— 是则必须 L2。Q5 单条链的应用特定逻辑吗 —— 是则 L2;否则默认 L2 让 L1 苗条。</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#525a64"/>
    </marker>
    <filter id="card" x="-2%" y="-3%" width="104%" height="106%">
      <feDropShadow dx="0" dy="1" stdDeviation="0.9" flood-color="#000000" flood-opacity="0.07"/>
    </filter>
    <style>
      .header     { font-size: 14.5px; font-weight: 700; }
      .qt         { font-size: 12.5px; font-weight: 700; fill: #1e2a55; }
      .qb         { font-size: 11px; fill: #2d3a48; }
      .yes        { font-size: 11.5px; font-weight: 700; fill: #1d4d2c; }
      .no         { font-size: 11.5px; font-weight: 700; fill: #88312e; }
      .out        { font-size: 13px; font-weight: 700; }
      .out-s      { font-size: 11px; fill: #525a64; font-style: italic; }
    </style>
  </defs>

  <rect width="960" height="620" fill="#ffffff"/>

  <text x="480" y="32" text-anchor="middle" class="header" fill="#1e2a55">新组件落到哪一层?—— 5 问决策树</text>

  <g filter="url(#card)">
    <rect x="320" y="60" width="320" height="56" rx="8" ry="8" fill="#fff2e3" stroke="#cd7c2e" stroke-width="1.4"/>
    <text x="480" y="84" text-anchor="middle" class="qt">Q1. 别的 L2 需要读这段状态吗?</text>
    <text x="480" y="102" text-anchor="middle" class="qb">例如 ChainRegistry、TokenRegistry、MessageRouter</text>
  </g>
  <text x="690" y="92" class="yes">是 → L1</text>
  <line x1="640" y1="88" x2="700" y2="88" stroke="#1d4d2c" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="480" y1="116" x2="480" y2="148" stroke="#525a64" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="486" y="138" class="no">否</text>

  <g filter="url(#card)">
    <rect x="320" y="150" width="320" height="56" rx="8" ry="8" fill="#fff2e3" stroke="#cd7c2e" stroke-width="1.4"/>
    <text x="480" y="174" text-anchor="middle" class="qt">Q2. 可罚没 / 承担经济安全吗?</text>
    <text x="480" y="192" text-anchor="middle" class="qb">例如 SequencerBond、ExternalBridgeBond</text>
  </g>
  <text x="690" y="182" class="yes">是 → L1</text>
  <line x1="640" y1="178" x2="700" y2="178" stroke="#1d4d2c" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="480" y1="206" x2="480" y2="238" stroke="#525a64" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="486" y="228" class="no">否</text>

  <g filter="url(#card)">
    <rect x="320" y="240" width="320" height="56" rx="8" ry="8" fill="#fff2e3" stroke="#cd7c2e" stroke-width="1.4"/>
    <text x="480" y="264" text-anchor="middle" class="qt">Q3. 定义在 L1 上什么合法?</text>
    <text x="480" y="282" text-anchor="middle" class="qb">例如 SettlementManager、VerifierRegistry —— 信任边界</text>
  </g>
  <text x="690" y="272" class="yes">是 → L1</text>
  <line x1="640" y1="268" x2="700" y2="268" stroke="#1d4d2c" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="480" y1="296" x2="480" y2="328" stroke="#525a64" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="486" y="318" class="no">否</text>

  <g filter="url(#card)">
    <rect x="320" y="330" width="320" height="56" rx="8" ry="8" fill="#fff2e3" stroke="#cd7c2e" stroke-width="1.4"/>
    <text x="480" y="354" text-anchor="middle" class="qt">Q4. 吞吐量超过 L1 容量?</text>
    <text x="480" y="372" text-anchor="middle" class="qb">例如用户转账、DEX 撮合</text>
  </g>
  <text x="690" y="362" class="yes">是 → 必须 L2</text>
  <line x1="640" y1="358" x2="700" y2="358" stroke="#3a8454" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="480" y1="386" x2="480" y2="418" stroke="#525a64" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="486" y="408" class="no">否</text>

  <g filter="url(#card)">
    <rect x="320" y="420" width="320" height="56" rx="8" ry="8" fill="#fff2e3" stroke="#cd7c2e" stroke-width="1.4"/>
    <text x="480" y="444" text-anchor="middle" class="qt">Q5. 单条链的应用特定逻辑?</text>
    <text x="480" y="462" text-anchor="middle" class="qb">例如 RWA KYC 检查、自定义执行器</text>
  </g>
  <text x="690" y="452" class="yes">是 → L2</text>
  <line x1="640" y1="448" x2="700" y2="448" stroke="#3a8454" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="480" y1="476" x2="480" y2="510" stroke="#525a64" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="486" y="498" class="no">否</text>

  <g filter="url(#card)">
    <rect x="280" y="514" width="400" height="60" rx="10" ry="10" fill="#e7f4eb" stroke="#3a8454" stroke-width="1.4"/>
    <text x="480" y="538" text-anchor="middle" class="out" fill="#1d4d2c">默认 → L2</text>
    <text x="480" y="558" text-anchor="middle" class="out-s">Q1+Q2+Q3 都答否、吞吐量有界 → L1 多半是过早中心化。</text>
  </g>

  <g filter="url(#card)">
    <rect x="760" y="60" width="160" height="246" rx="10" ry="10" fill="#eff3ff" stroke="#7587c1" stroke-width="1.4"/>
    <text x="840" y="84" text-anchor="middle" class="out" fill="#1e2a55">L1</text>
    <text x="840" y="105" text-anchor="middle" class="out-s">规范共识</text>
    <text x="840" y="120" text-anchor="middle" class="out-s">+ 经济安全</text>
    <line x1="780" y1="135" x2="900" y2="135" stroke="#7587c1" stroke-dasharray="3 2"/>
    <text x="840" y="155" text-anchor="middle" class="qb" font-size="10">慢 · 贵 ·</text>
    <text x="840" y="170" text-anchor="middle" class="qb" font-size="10">全局一致</text>
  </g>

  <g filter="url(#card)">
    <rect x="760" y="330" width="160" height="246" rx="10" ry="10" fill="#e7f4eb" stroke="#3a8454" stroke-width="1.4"/>
    <text x="840" y="354" text-anchor="middle" class="out" fill="#1d4d2c">L2</text>
    <text x="840" y="375" text-anchor="middle" class="out-s">执行 + 状态</text>
    <text x="840" y="390" text-anchor="middle" class="out-s">+ 吞吐量</text>
    <line x1="780" y1="405" x2="900" y2="405" stroke="#3a8454" stroke-dasharray="3 2"/>
    <text x="840" y="425" text-anchor="middle" class="qb" font-size="10">快 · 便宜 · 本地</text>
    <text x="840" y="440" text-anchor="middle" class="qb" font-size="10">一致 —— 锚定到</text>
    <text x="840" y="455" text-anchor="middle" class="qb" font-size="10">L1</text>
  </g>
</svg>
