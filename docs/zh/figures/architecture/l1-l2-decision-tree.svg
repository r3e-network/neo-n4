<text x="1518" y="740" class="small">起始状态已定义</text>
<rect x="1378" y="788" width="442" height="58" rx="6" fill="#ffffff"/>
<text x="1390" y="811" class="strong">闸门</text>
<text x="1518" y="808" class="small">每个转换只有一个接受条件</text>
<rect x="1378" y="856" width="442" height="58" rx="6" fill="#eff6ff"/>
<text x="1390" y="879" class="strong">幂等</text>
<text x="1518" y="876" class="small">重试不会重复副作用</text>
<rect x="1378" y="924" width="442" height="58" rx="6" fill="#ffffff"/>
<text x="1390" y="947" class="strong">诊断</text>
<text x="1518" y="944" class="small">拒绝原因已保存</text>
