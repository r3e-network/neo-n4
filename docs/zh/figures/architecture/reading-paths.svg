<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 580" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', Helvetica, Arial, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">按角色阅读路径</title>
  <desc id="desc">按读者角色组织的 5 条架构文档阅读路径:(1)快速了解系统 —— 读 ARCHITECTURE.md 再读本 atlas 页(共 15 分钟)。(2)上线 L2 链的运维 —— 依次读 l2-lifecycle、launching-an-l2、(连接 EVM 链时)external-bridge-evm-chains、security-model。(3)SDK / 索引器 / 钱包开发者 —— 依次读 l2-lifecycle、wire-formats、按语言的 SDK README。(4)审计 / 安全审查者 —— 依次读 trust-boundaries、security-model、wire-formats、external-bridge-roadmap。(5)代码库贡献者 —— 依次读 walkthrough、l2-lifecycle、wire-formats、tech-stack-coverage。</desc>

  <defs>
    <filter id="card" x="-2%" y="-3%" width="104%" height="106%">
      <feDropShadow dx="0" dy="1" stdDeviation="0.9" flood-color="#000000" flood-opacity="0.07"/>
    </filter>
    <style>
      .header     { font-size: 14.5px; font-weight: 700; }
      .role       { font-size: 13px; font-weight: 700; }
      .step       { font-size: 11.5px; fill: #2d3a48; }
      .step-num   { font-size: 11.5px; font-weight: 700; }
      .when       { font-size: 10.5px; fill: #525a64; font-style: italic; }
    </style>
  </defs>

  <rect width="960" height="580" fill="#ffffff"/>

  <text x="480" y="30" text-anchor="middle" class="header" fill="#1e2a55">按角色挑你的阅读路径</text>

  <g filter="url(#card)">
    <rect x="40" y="56" width="880" height="86" rx="10" ry="10" fill="#eff3ff" stroke="#7587c1" stroke-width="1.4"/>
    <text x="60" y="80" class="role" fill="#1e2a55">想快速了解系统?</text>
    <text x="60" y="98" class="when">~15 分钟</text>
    <text x="60" y="124" class="step"><tspan class="step-num" fill="#1e2a55">1.</tspan> ARCHITECTURE.md  <tspan class="when">(英文摘要 —— 10 分钟)</tspan>     <tspan class="step-num" fill="#1e2a55">2.</tspan> architecture-atlas.md  <tspan class="when">(本页 —— 5 分钟)</tspan></text>
  </g>

  <g filter="url(#card)">
    <rect x="40" y="158" width="880" height="86" rx="10" ry="10" fill="#fff2e3" stroke="#cd7c2e" stroke-width="1.4"/>
    <text x="60" y="182" class="role" fill="#7a4a14">运维者上线 L2 链?</text>
    <text x="60" y="200" class="when">~45 分钟</text>
    <text x="60" y="226" class="step"><tspan class="step-num" fill="#7a4a14">1.</tspan> architecture-l2-lifecycle  <tspan class="step-num" fill="#7a4a14">2.</tspan> launching-an-l2  <tspan class="step-num" fill="#7a4a14">3.</tspan> external-bridge-evm-chains  <tspan class="step-num" fill="#7a4a14">4.</tspan> security-model</text>
  </g>

  <g filter="url(#card)">
    <rect x="40" y="260" width="880" height="86" rx="10" ry="10" fill="#e7f4eb" stroke="#3a8454" stroke-width="1.4"/>
    <text x="60" y="284" class="role" fill="#1d4d2c">SDK / 索引器 / 钱包开发者?</text>
    <text x="60" y="302" class="when">~30 分钟</text>
    <text x="60" y="328" class="step"><tspan class="step-num" fill="#1d4d2c">1.</tspan> architecture-l2-lifecycle  <tspan class="when">(尤其 §6 运行时)</tspan>  <tspan class="step-num" fill="#1d4d2c">2.</tspan> architecture-wire-formats  <tspan class="step-num" fill="#1d4d2c">3.</tspan> sdk/typescript/ 或 sdk/rust/</text>
  </g>

  <g filter="url(#card)">
    <rect x="40" y="362" width="880" height="86" rx="10" ry="10" fill="#fde8e8" stroke="#c4413e" stroke-width="1.4"/>
    <text x="60" y="386" class="role" fill="#88312e">审计 / 安全审查者?</text>
    <text x="60" y="404" class="when">~60 分钟</text>
    <text x="60" y="430" class="step"><tspan class="step-num" fill="#88312e">1.</tspan> architecture-trust-boundaries  <tspan class="step-num" fill="#88312e">2.</tspan> security-model  <tspan class="step-num" fill="#88312e">3.</tspan> architecture-wire-formats  <tspan class="step-num" fill="#88312e">4.</tspan> external-bridge-roadmap</text>
  </g>

  <g filter="url(#card)">
    <rect x="40" y="464" width="880" height="86" rx="10" ry="10" fill="#f1ecf8" stroke="#7d59b3" stroke-width="1.4"/>
    <text x="60" y="488" class="role" fill="#3e2865">代码库贡献者?</text>
    <text x="60" y="506" class="when">~50 分钟</text>
    <text x="60" y="532" class="step"><tspan class="step-num" fill="#3e2865">1.</tspan> architecture-walkthrough  <tspan class="when">(按 tx 导览)</tspan>  <tspan class="step-num" fill="#3e2865">2.</tspan> architecture-l2-lifecycle  <tspan class="step-num" fill="#3e2865">3.</tspan> architecture-wire-formats  <tspan class="step-num" fill="#3e2865">4.</tspan> tech-stack-coverage</text>
  </g>
</svg>
