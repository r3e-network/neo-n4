<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 760" font-family="'Noto Sans CJK SC', 'Source Han Sans SC', 'WenQuanYi Zen Hei', 'Microsoft YaHei', sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">Neo Elastic Network — 四层系统拓扑</title>
  <desc id="desc">四层拓扑：第 1 层为 NeoHub L1 锚定层，包含 23 个合约。第 2 层为可选的 Neo Gateway，用于证明聚合。第 3 层为弹性 L2 链，运行 Neo 4 core 加 8 个插件加 10 个原生合约。第 4 层为链下运营者，包括排序器、批处理器、证明守护进程、DA 写入器和外链中继器。</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#525a64"/>
    </marker>
    <filter id="card" x="-2%" y="-3%" width="104%" height="106%">
      <feDropShadow dx="0" dy="1" stdDeviation="0.9" flood-color="#000000" flood-opacity="0.07"/>
    </filter>
    <style>
      .band-title { font-size: 12.5px; font-weight: 700; letter-spacing: 0.6px; }
      .band-sub   { font-size: 11px; }
      .card-title { font-size: 13px; font-weight: 600; }
      .card-sub   { font-size: 10.5px; }
      .edge-lbl   { font-size: 10.5px; font-style: italic; fill: #525a64; }
      .ellipsis   { font-size: 16px; fill: #57606a; }
    </style>
  </defs>

  <rect width="960" height="760" fill="#ffffff"/>

  <!-- TIER 1 · L1 NeoHub -->
  <rect x="40" y="32" width="880" height="120" rx="10" ry="10" fill="#eff3ff" stroke="#7587c1" stroke-width="1.2"/>
  <text x="58" y="56" class="band-title" fill="#1e2a55">第 1 层 · L1 锚定层（NEO N3 / NEO 4）</text>
  <text x="58" y="74" class="band-sub" fill="#3f5193">规范协议 + 经济安全 · 已结算批次 · 资产托管 · 治理</text>

  <g filter="url(#card)">
    <rect x="62" y="92" width="836" height="46" rx="6" ry="6" fill="#ffffff" stroke="#7587c1"/>
    <text x="480" y="113" text-anchor="middle" class="card-title" fill="#1e2a55">NeoHub —— 22 个生产合约（+ 1 个测试桩）</text>
    <text x="480" y="130" text-anchor="middle" class="card-sub" fill="#3a4a82">结算 · 桥 · 消息传递 · 治理 · 安全 · 外链桥</text>
  </g>

  <line x1="480" y1="152" x2="480" y2="184" stroke="#525a64" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="488" y="173" class="edge-lbl">封装批次 · 证明 · 跨 L2 路由 · 外链桥</text>

  <!-- TIER 2 · Neo Gateway -->
  <rect x="40" y="190" width="880" height="106" rx="10" ry="10" fill="#fff2e3" stroke="#cd7c2e" stroke-width="1.2"/>
  <text x="58" y="214" class="band-title" fill="#7a4a14">第 2 层 · NEO GATEWAY（可选 — PHASE 5）</text>
  <text x="58" y="232" class="band-sub" fill="#a96027">跨多个 L2 的证明聚合 · 每轮一次 L1 结算提交</text>

  <g filter="url(#card)">
    <rect x="62" y="248" width="836" height="38" rx="6" ry="6" fill="#ffffff" stroke="#cd7c2e"/>
    <text x="480" y="265" text-anchor="middle" class="card-title" fill="#7a4a14">BinaryTreeAggregator + 3 种生产级 IRoundProver 实现</text>
    <text x="480" y="280" text-anchor="middle" class="card-sub" fill="#a05a1a">log-N 轮数 · 多签 · Merkle 路径 · 直通（递归 ZK 可插入）</text>
  </g>

  <line x1="480" y1="296" x2="480" y2="332" stroke="#525a64" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="488" y="319" class="edge-lbl">运行 L2 插件；产出批次</text>

  <!-- TIER 3 · L2 chains -->
  <rect x="40" y="338" width="880" height="208" rx="10" ry="10" fill="#e7f4eb" stroke="#3a8454" stroke-width="1.2"/>
  <text x="58" y="362" class="band-title" fill="#1d4d2c">第 3 层 · 弹性 L2 链（N 条）</text>
  <text x="58" y="380" class="band-sub" fill="#2f5e3c">Neo 4 core（引入）· 8 个插件 · 10 个原生合约 —— 各自独立状态，共享 L1 锚定</text>

  <g filter="url(#card)">
    <rect x="62" y="396" width="248" height="138" rx="6" ry="6" fill="#ffffff" stroke="#3a8454"/>
    <text x="186" y="418" text-anchor="middle" class="card-title" fill="#1d4d2c">L2 链 A</text>
    <line x1="86" y1="430" x2="286" y2="430" stroke="#9ec3ab" stroke-width="0.7"/>
    <text x="186" y="450" text-anchor="middle" class="card-sub" fill="#2f5e3c">Neo 4 core（引入）</text>
    <text x="186" y="468" text-anchor="middle" class="card-sub" fill="#2f5e3c">+ 8 个插件（Batch · Settlement ·</text>
    <text x="186" y="484" text-anchor="middle" class="card-sub" fill="#2f5e3c">Bridge · DA · Prover · Rpc ·</text>
    <text x="186" y="500" text-anchor="middle" class="card-sub" fill="#2f5e3c">Gateway · Metrics）</text>
    <text x="186" y="520" text-anchor="middle" class="card-sub" fill="#2f5e3c">+ 10 个原生合约</text>
  </g>

  <g filter="url(#card)">
    <rect x="335" y="396" width="248" height="138" rx="6" ry="6" fill="#ffffff" stroke="#3a8454"/>
    <text x="459" y="418" text-anchor="middle" class="card-title" fill="#1d4d2c">L2 链 B</text>
    <line x1="359" y1="430" x2="559" y2="430" stroke="#9ec3ab" stroke-width="0.7"/>
    <text x="459" y="468" text-anchor="middle" class="card-sub" fill="#2f5e3c" font-style="italic">（结构相同；不同的</text>
    <text x="459" y="484" text-anchor="middle" class="card-sub" fill="#2f5e3c" font-style="italic">链配置 + 执行器）</text>
  </g>

  <g filter="url(#card)">
    <rect x="608" y="396" width="248" height="138" rx="6" ry="6" fill="#ffffff" stroke="#3a8454"/>
    <text x="732" y="418" text-anchor="middle" class="card-title" fill="#1d4d2c">L2 链 C</text>
    <line x1="632" y1="430" x2="832" y2="430" stroke="#9ec3ab" stroke-width="0.7"/>
    <text x="732" y="468" text-anchor="middle" class="card-sub" fill="#2f5e3c" font-style="italic">（结构相同；不同的</text>
    <text x="732" y="484" text-anchor="middle" class="card-sub" fill="#2f5e3c" font-style="italic">链配置 + 执行器）</text>
  </g>

  <text x="884" y="468" text-anchor="middle" class="ellipsis" fill="#57606a">...</text>

  <line x1="480" y1="546" x2="480" y2="580" stroke="#525a64" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="488" y="566" class="edge-lbl">订阅 Block.Committed · 封装批次 · 驱动证明守护进程</text>

  <!-- TIER 4 · Off-chain operators -->
  <rect x="40" y="586" width="880" height="148" rx="10" ry="10" fill="#f1ecf8" stroke="#7d59b3" stroke-width="1.2"/>
  <text x="58" y="610" class="band-title" fill="#3e2865">第 4 层 · 链下运营者（每条 L2 + 桥守护进程）</text>
  <text x="58" y="628" class="band-sub" fill="#5d4084">网络的运行实体 · 仅有日志状态 · 可插拔的 trait 接口（ITransactionExecutor / IDAWriter / IL2Prover / Signer）</text>

  <g filter="url(#card)">
    <rect x="62" y="644" width="158" height="74" rx="6" ry="6" fill="#ffffff" stroke="#7d59b3"/>
    <text x="141" y="664" text-anchor="middle" class="card-title" fill="#3e2865">排序器</text>
    <text x="141" y="684" text-anchor="middle" class="card-sub" fill="#5d4084">dBFT 2.0</text>
    <text x="141" y="700" text-anchor="middle" class="card-sub" fill="#5d4084">共识成员</text>
  </g>
  <g filter="url(#card)">
    <rect x="232" y="644" width="158" height="74" rx="6" ry="6" fill="#ffffff" stroke="#7d59b3"/>
    <text x="311" y="664" text-anchor="middle" class="card-title" fill="#3e2865">批处理器</text>
    <text x="311" y="684" text-anchor="middle" class="card-sub" fill="#5d4084">封装批次</text>
    <text x="311" y="700" text-anchor="middle" class="card-sub" fill="#5d4084">+ 提交至 L1</text>
  </g>
  <g filter="url(#card)">
    <rect x="402" y="644" width="158" height="74" rx="6" ry="6" fill="#ffffff" stroke="#7d59b3"/>
    <text x="481" y="664" text-anchor="middle" class="card-title" fill="#3e2865">证明守护进程</text>
    <text x="481" y="684" text-anchor="middle" class="card-sub" fill="#5d4084">SP1 zkVM</text>
    <text x="481" y="700" text-anchor="middle" class="card-sub" fill="#5d4084">prove-batch</text>
  </g>
  <g filter="url(#card)">
    <rect x="572" y="644" width="158" height="74" rx="6" ry="6" fill="#ffffff" stroke="#7d59b3"/>
    <text x="651" y="664" text-anchor="middle" class="card-title" fill="#3e2865">DA 写入器</text>
    <text x="651" y="684" text-anchor="middle" class="card-sub" fill="#5d4084">NeoFS · L1 · DAC</text>
    <text x="651" y="700" text-anchor="middle" class="card-sub" fill="#5d4084">负载发布</text>
  </g>
  <g filter="url(#card)">
    <rect x="742" y="644" width="158" height="74" rx="6" ry="6" fill="#ffffff" stroke="#7d59b3"/>
    <text x="821" y="664" text-anchor="middle" class="card-title" fill="#3e2865">外链中继器</text>
    <text x="821" y="684" text-anchor="middle" class="card-sub" fill="#5d4084">Eth/EVM/Solana</text>
    <text x="821" y="700" text-anchor="middle" class="card-sub" fill="#5d4084">→ Neo 桥</text>
  </g>

</svg>
