<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1180" viewBox="0 0 1920 1180" role="img">
<defs>
<marker id="arrowAccent" viewBox="0 0 10 10" refX="9.2" refY="5" markerWidth="10" markerHeight="10" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#0f766e"/></marker>
<marker id="arrowGray" viewBox="0 0 10 10" refX="9.2" refY="5" markerWidth="10" markerHeight="10" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#475569"/></marker>
<marker id="arrowFault" viewBox="0 0 10 10" refX="9.2" refY="5" markerWidth="10" markerHeight="10" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#dc2626"/></marker>
<filter id="shadow" x="-3%" y="-4%" width="106%" height="108%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.10"/></filter>
<style>
.bg{fill:#f8fafc}.panel{fill:#ffffff;stroke:#cbd5e1;stroke-width:1.5;filter:url(#shadow)}
.title{font:800 36px 'Inter','Segoe UI',Arial,sans-serif;fill:#0f172a}.subtitle{font:500 17px 'Inter','Segoe UI',Arial,sans-serif;fill:#475569}
.panelTitle{font:750 22px 'Inter','Segoe UI',Arial,sans-serif;fill:#0f172a}.panelSub{font:500 15px 'Inter','Segoe UI',Arial,sans-serif;fill:#475569}
.strong{font:760 15px 'Inter','Segoe UI',Arial,sans-serif;fill:#0f172a}.body{font:500 14px 'Inter','Segoe UI',Arial,sans-serif;fill:#334155}.small{font:500 13px 'Inter','Segoe UI',Arial,sans-serif;fill:#475569}
.mono{font:650 14px 'Cascadia Mono','SFMono-Regular',Consolas,monospace;fill:#0f172a}.label{font:800 14px 'Inter','Segoe UI',Arial,sans-serif;fill:#ffffff}.caption{font:500 13px 'Inter','Segoe UI',Arial,sans-serif;fill:#64748b}
.accentArrow{stroke:#0f766e;stroke-width:2.6;fill:none;marker-end:url(#arrowAccent)}.dashArrow{stroke:#64748b;stroke-width:2.0;fill:none;stroke-dasharray:7 6;marker-end:url(#arrowGray)}.faultArrow{stroke:#dc2626;stroke-width:2.2;fill:none;stroke-dasharray:5 5;marker-end:url(#arrowFault)}
</style>
</defs>
<rect class="bg" width="1920" height="1180"/>
<text x="56" y="66" class="title">Neo N4 端到端数据流</text>
<text x="56" y="98" class="subtitle">交易、根、见证、证明和消息如何从 L2 执行移动到 L1 终局。</text>
<rect x="56" y="118" width="1808" height="38" rx="6" fill="#ecfdf5" stroke="#0f766e" stroke-width="1.2"/>
<text x="76" y="143" class="small">读图方式： <tspan class="strong">把 Neo N4 当作协议系统学习，而不是当作代码目录学习。</tspan></text>
<rect x="56" y="178" width="870" height="392" rx="10" class="panel"/>
<rect x="56" y="178" width="870" height="54" rx="10" fill="#ecfdf5"/>
<circle cx="86" cy="206" r="16" fill="#0f766e"/>
<text x="86" y="211" text-anchor="middle" class="label">a</text>
<text x="114" y="210" class="panelTitle">系统拓扑</text>
<text x="114" y="230" class="panelSub">主要平面、边界和职责</text>
<rect x="966" y="178" width="898" height="392" rx="10" class="panel"/>
<rect x="966" y="178" width="898" height="54" rx="10" fill="#ecfdf5"/>
<circle cx="996" cy="206" r="16" fill="#0f766e"/>
<text x="996" y="211" text-anchor="middle" class="label">b</text>
<text x="1024" y="210" class="panelTitle">技术模型</text>
<text x="1024" y="230" class="panelSub">正确性规则和接受条件</text>
<rect x="56" y="606" width="1240" height="494" rx="10" class="panel"/>
<rect x="56" y="606" width="1240" height="54" rx="10" fill="#ecfdf5"/>
<circle cx="86" cy="634" r="16" fill="#0f766e"/>
<text x="86" y="639" text-anchor="middle" class="label">c</text>
<text x="114" y="638" class="panelTitle">编号路径</text>
<text x="114" y="658" class="panelSub">对象如何沿协议推进</text>
<rect x="1334" y="606" width="530" height="494" rx="10" class="panel"/>
<rect x="1334" y="606" width="530" height="54" rx="10" fill="#ecfdf5"/>
<circle cx="1364" cy="634" r="16" fill="#0f766e"/>
<text x="1364" y="639" text-anchor="middle" class="label">d</text>
<text x="1392" y="638" class="panelTitle">审计检查点</text>
<text x="1392" y="658" class="panelSub">读者应重点验证的条件</text>
<rect x="92" y="270" width="180" height="208" rx="8" fill="#ecfdf5" stroke="#0f766e" stroke-width="1.4"/>
<text x="106" y="298" class="strong">用户/API 输入</text>
<text x="106" y="328" class="body">钱包、SDK、RPC、桥 UI 和外链</text>
<text x="106" y="346" class="body">watcher 产生强类型意图</text>
<path class="accentArrow" d="M272 374 C284 374 290 374 300 428"/>
<rect x="300" y="324" width="180" height="208" rx="8" fill="#ecfdf5" stroke="#0f766e" stroke-width="1.4"/>
<text x="314" y="352" class="strong">L2 有序数据</text>
<text x="314" y="382" class="body">排序器把意图变成有序区块和候选批次</text>
<path class="accentArrow" d="M480 428 C492 374 498 374 508 374"/>
<rect x="508" y="270" width="180" height="208" rx="8" fill="#ecfdf5" stroke="#0f766e" stroke-width="1.4"/>
<text x="522" y="298" class="strong">证据数据</text>
<text x="522" y="328" class="body">执行轨迹、回执、根和见证材料进入证明生成</text>
<path class="accentArrow" d="M688 374 C700 374 706 374 716 428"/>
<rect x="716" y="324" width="180" height="208" rx="8" fill="#ecfdf5" stroke="#0f766e" stroke-width="1.4"/>
<text x="730" y="352" class="strong">L1 可消费数据</text>
<text x="730" y="382" class="body">状态根、提款根、消息根、证明字节和 DA</text>
<text x="730" y="400" class="body">CID</text>
<line x1="296" y1="528" x2="752" y2="528" stroke="#0f766e" stroke-width="1.4" stroke-dasharray="6 6"/>
<text x="522" y="552" class="caption" text-anchor="middle">registry + commitments + proofs + DA references</text>
<rect x="1000" y="252" width="828" height="62" rx="8" fill="#ecfdf5" stroke="#0f766e" stroke-width="1.5"/>
<text x="1020" y="290" class="mono">delta(状态, 输入, 见证) -&gt; 新状态 + 证据</text>
<rect x="1012" y="342" width="630" height="54" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2"/>
<circle cx="1038" cy="369" r="15" fill="#0f766e"/>
<text x="1038" y="374" text-anchor="middle" class="label">1</text>
<text x="1066" y="365" class="strong">数据规则</text>
<text x="1066" y="385" class="small">跨信任边界传递哈希；完整 payload 通过 NeoFS 保持可取回。</text>
<path class="accentArrow" d="M1328 396 L1328 414"/>
<rect x="1012" y="414" width="630" height="54" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2"/>
<circle cx="1038" cy="441" r="15" fill="#0f766e"/>
<text x="1038" y="446" text-anchor="middle" class="label">2</text>
<text x="1066" y="437" class="strong">证明规则</text>
<text x="1066" y="457" class="small">证明语句绑定批次范围、前状态根、后状态根、DA 根和验证密钥。</text>
<path class="accentArrow" d="M1328 468 L1328 486"/>
<rect x="1012" y="486" width="630" height="54" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2"/>
<circle cx="1038" cy="513" r="15" fill="#0f766e"/>
<text x="1038" y="518" text-anchor="middle" class="label">3</text>
<text x="1066" y="509" class="strong">消息规则</text>
<text x="1066" y="529" class="small">L1/L2 与 L2/L2 消息只凭 inclusion 证据和 nonce 状态消费一次。</text>
<rect x="1672" y="358" width="146" height="174" rx="8" fill="#ffffff" stroke="#0f766e" stroke-width="1.4"/>
<text x="1686" y="386" class="strong">Acceptance</text>
<text x="1686" y="416" class="body">接受条件 = 已注册 &amp;&amp; DA</text>
<text x="1686" y="434" class="body">已绑定 &amp;&amp; 验证器接受 &amp;&amp;</text>
<text x="1686" y="452" class="body">根匹配</text>
<path class="dashArrow" d="M1642 460 L1672 460"/>
<text x="1014" y="562" class="mono">接受条件 = 已注册 &amp;&amp; DA 已绑定 &amp;&amp; 验证器接受 &amp;&amp; 根匹配</text>
<rect x="92" y="730" width="150" height="120" rx="8" fill="#ecfdf5" stroke="#0f766e" stroke-width="1.5"/>
<rect x="102" y="740" width="30" height="24" rx="5" fill="#0f766e"/>
<text x="117" y="757" text-anchor="middle" class="label">1</text>
<text x="140" y="758" class="strong">意图</text>
<text x="104" y="788" class="small">已签名交易或桥事件</text>
<path class="accentArrow" d="M242 790 L290 790"/>
<rect x="290" y="730" width="150" height="120" rx="8" fill="#ecfdf5" stroke="#0f766e" stroke-width="1.5"/>
<rect x="300" y="740" width="30" height="24" rx="5" fill="#0f766e"/>
<text x="315" y="757" text-anchor="middle" class="label">2</text>
<text x="338" y="758" class="strong">区块</text>
<text x="302" y="788" class="small">有序 L2 执行输出</text>
<path class="accentArrow" d="M440 790 L488 790"/>
<rect x="488" y="730" width="150" height="120" rx="8" fill="#ecfdf5" stroke="#0f766e" stroke-width="1.5"/>
<rect x="498" y="740" width="30" height="24" rx="5" fill="#0f766e"/>
<text x="513" y="757" text-anchor="middle" class="label">3</text>
<text x="536" y="758" class="strong">批次</text>
<text x="500" y="788" class="small">覆盖区块、回执和根的承诺</text>
<path class="accentArrow" d="M638 790 L686 790"/>
<rect x="686" y="730" width="150" height="120" rx="8" fill="#ecfdf5" stroke="#0f766e" stroke-width="1.5"/>
<rect x="696" y="740" width="30" height="24" rx="5" fill="#0f766e"/>
<text x="711" y="757" text-anchor="middle" class="label">4</text>
<text x="734" y="758" class="strong">NeoFS</text>
<text x="698" y="788" class="small">内容寻址的 payload</text>
<text x="698" y="805" class="small">和见证存储</text>
<path class="accentArrow" d="M836 790 L884 790"/>
<rect x="884" y="730" width="150" height="120" rx="8" fill="#ecfdf5" stroke="#0f766e" stroke-width="1.5"/>
<rect x="894" y="740" width="30" height="24" rx="5" fill="#0f766e"/>
<text x="909" y="757" text-anchor="middle" class="label">5</text>
<text x="932" y="758" class="strong">证明</text>
<text x="896" y="788" class="small">有效性证明或配置的证据封装</text>
<path class="accentArrow" d="M1034 790 L1082 790"/>
<rect x="1082" y="730" width="150" height="120" rx="8" fill="#ecfdf5" stroke="#0f766e" stroke-width="1.5"/>
<rect x="1092" y="740" width="30" height="24" rx="5" fill="#0f766e"/>
<text x="1107" y="757" text-anchor="middle" class="label">6</text>
<text x="1130" y="758" class="strong">结算</text>
<text x="1094" y="788" class="small">NeoHub 接受根并释放依赖流程</text>
<path class="dashArrow" d="M182 900 C412 974 852 974 1132 900"/>
<rect x="482" y="914" width="210" height="120" rx="8" fill="#fff1f2" stroke="#dc2626" stroke-width="1.4"/>
<text x="496" y="942" class="strong">Reject / Recover</text>
<text x="496" y="972" class="body">missing data, bad proof,</text>
<text x="496" y="990" class="body">replay, timeout, governance</text>
<text x="496" y="1008" class="body">pause</text>
<path class="faultArrow" d="M562 850 L562 914"/>
<text x="92" y="1070" class="caption">实线：状态 / 数据 · 虚线：证明 / 观测 · 红线：拒绝 / 恢复</text>
<rect x="1368" y="710" width="462" height="294" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2"/>
<rect x="1378" y="720" width="442" height="58" rx="6" fill="#ecfdf5"/>
<text x="1390" y="743" class="strong">可追踪性</text>
<text x="1518" y="740" class="small">每份报告都应关联意图、区块、批次、DA CID、证明和结算交易。</text>
<rect x="1378" y="788" width="442" height="58" rx="6" fill="#ffffff"/>
<text x="1390" y="811" class="strong">防重放</text>
<text x="1518" y="808" class="small">消息哈希 + nonce + 源链防止重复消费。</text>
<rect x="1378" y="856" width="442" height="58" rx="6" fill="#ecfdf5"/>
<text x="1390" y="879" class="strong">DA 健康</text>
<text x="1518" y="876" class="small">NeoFS payload 不可用是结算阻断项，不是普通告警。</text>
<rect x="1378" y="924" width="442" height="58" rx="6" fill="#ffffff"/>
<text x="1390" y="947" class="strong">背压</text>
<text x="1518" y="944" class="small">batch/prover/DA 队列需要明确指标和重试状态。</text>
<line x1="1504" y1="724" x2="1504" y2="992" stroke="#0f766e" stroke-width="1.2" stroke-dasharray="4 5"/>
<rect x="1368" y="1026" width="462" height="74" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2"/>
<line x1="1388" y1="1050" x2="1434" y2="1050" stroke="#0f766e" stroke-width="2.6" marker-end="url(#arrowAccent)"/>
<text x="1450" y="1054" class="small">实线：状态 / 数据</text>
<line x1="1388" y1="1074" x2="1434" y2="1074" stroke="#64748b" stroke-width="2.0" stroke-dasharray="7 6" marker-end="url(#arrowGray)"/>
<text x="1450" y="1078" class="small">虚线：证明 / 观测</text>
<line x1="1660" y1="1074" x2="1704" y2="1074" stroke="#dc2626" stroke-width="2.2" stroke-dasharray="5 5" marker-end="url(#arrowFault)"/>
<text x="1718" y="1078" class="small">红线：拒绝 / 恢复</text>
<text x="56" y="1146" class="caption">论文式图表根据协议概念生成；刻意不展示源码文件清单。</text>
</svg>
