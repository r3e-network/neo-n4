<rect class="bg" width="1920" height="1180"/>
<text x="56" y="66" class="title">核心数据结构</text>
<text x="56" y="98" class="subtitle">哈希会跨越 N4 信任边界的规范对象。</text>
<rect x="56" y="118" width="1808" height="38" rx="6" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.2"/>
<text x="76" y="143" class="small">读图方式： <tspan class="strong">论文式技术图；强调架构、原理、数据流、工作流和审计条件。</tspan></text>
<rect x="56" y="178" width="870" height="392" rx="10" class="panel"/>
<rect x="56" y="178" width="870" height="54" rx="10" fill="#eef2ff"/>
<circle cx="86" cy="206" r="16" fill="#4f46e5"/>
<text x="86" y="211" text-anchor="middle" class="label">a</text>
<text x="114" y="210" class="panelTitle">技术拓扑</text>
<text x="114" y="230" class="panelSub">参与平面、边界和职责</text>
<rect x="966" y="178" width="898" height="392" rx="10" class="panel"/>
<rect x="966" y="178" width="898" height="54" rx="10" fill="#eef2ff"/>
<circle cx="996" cy="206" r="16" fill="#4f46e5"/>
<text x="996" y="211" text-anchor="middle" class="label">b</text>
<text x="1024" y="210" class="panelTitle">技术模型</text>
<text x="1024" y="230" class="panelSub">形式化规则和接受条件</text>
<rect x="56" y="606" width="1240" height="494" rx="10" class="panel"/>
<rect x="56" y="606" width="1240" height="54" rx="10" fill="#eef2ff"/>
<circle cx="86" cy="634" r="16" fill="#4f46e5"/>
<text x="86" y="639" text-anchor="middle" class="label">c</text>
<text x="114" y="638" class="panelTitle">编号协议路径</text>
<text x="114" y="658" class="panelSub">关键对象如何推进</text>
<rect x="1334" y="606" width="530" height="494" rx="10" class="panel"/>
<rect x="1334" y="606" width="530" height="54" rx="10" fill="#eef2ff"/>
<circle cx="1364" cy="634" r="16" fill="#4f46e5"/>
<text x="1364" y="639" text-anchor="middle" class="label">d</text>
<text x="1392" y="638" class="panelTitle">审计检查点</text>
<text x="1392" y="658" class="panelSub">读者应验证的条件</text>
<rect x="92" y="270" width="180" height="208" rx="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.4"/>
<text x="106" y="298" class="strong">领域对象</text>
<text x="106" y="328" class="body">带强类型字段和显式版本的逻辑值。</text>
<path class="accentArrow" d="M272 374 C284 374 282 428 300 428"/>
<rect x="300" y="324" width="180" height="208" rx="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.4"/>
<text x="314" y="352" class="strong">规范字节</text>
<text x="314" y="382" class="body">稳定排序、固定宽度数值编码和域分隔前缀。</text>
<path class="accentArrow" d="M480 428 C492 428 490 374 508 374"/>
<rect x="508" y="270" width="180" height="208" rx="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.4"/>
<text x="522" y="298" class="strong">哈希边界</text>
<text x="522" y="328" class="body">哈希跨越合约、DA、证明、relayer</text>
<text x="522" y="346" class="body">和报告。</text>
<path class="accentArrow" d="M688 374 C700 374 698 428 716 428"/>
<rect x="716" y="324" width="180" height="208" rx="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.4"/>
<text x="730" y="352" class="strong">验证器</text>
<text x="730" y="382" class="body">每个消费者在信任对象前重新计算字节。</text>
<line x1="296" y1="528" x2="752" y2="528" stroke="#4f46e5" stroke-width="1.4" stroke-dasharray="6 6"/>
<text x="522" y="552" class="caption" text-anchor="middle">canonical boundary: hashes, roots, events, proofs, DA references</text>
<rect x="1000" y="252" width="828" height="62" rx="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.5"/>
<text x="1020" y="290" class="mono">digest = H(type_tag || version || canonical_fields)</text>
<rect x="1012" y="342" width="630" height="54" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2"/>
<circle cx="1038" cy="369" r="15" fill="#4f46e5"/>
<text x="1038" y="374" text-anchor="middle" class="label">1</text>
<text x="1066" y="365" class="strong">编码</text>
<text x="1066" y="385" class="small">type tag || version || chain ids || fields || nonce || payload</text>
<path class="accentArrow" d="M1328 396 L1328 414"/>
<rect x="1012" y="414" width="630" height="54" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2"/>
<circle cx="1038" cy="441" r="15" fill="#4f46e5"/>
<text x="1038" y="446" text-anchor="middle" class="label">2</text>
<text x="1066" y="437" class="strong">承诺</text>
<text x="1066" y="457" class="small">hash(规范字节) 是唯一跨边界标识</text>
<path class="accentArrow" d="M1328 468 L1328 486"/>
<rect x="1012" y="486" width="630" height="54" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2"/>
<circle cx="1038" cy="513" r="15" fill="#4f46e5"/>
<text x="1038" y="518" text-anchor="middle" class="label">3</text>
<text x="1066" y="509" class="strong">拒绝</text>
<text x="1066" y="529" class="small">长度歧义、版本错误或哈希不匹配会被拒绝</text>
<rect x="1672" y="358" width="146" height="174" rx="8" fill="#ffffff" stroke="#4f46e5" stroke-width="1.4"/>
<text x="1686" y="386" class="strong">接受</text>
<text x="1686" y="416" class="body">消费者重算相同规范字节和哈希</text>
<path class="dashArrow" d="M1642 460 L1672 460"/>
<text x="1014" y="562" class="mono">消费者重算相同规范字节和哈希</text>
<rect x="92" y="730" width="150" height="120" rx="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.5"/>
<rect x="102" y="740" width="30" height="24" rx="5" fill="#4f46e5"/>
<text x="117" y="757" text-anchor="middle" class="label">1</text>
<text x="140" y="758" class="strong">定义</text>
<text x="104" y="788" class="small">字段、版本和域标签固定</text>
<path class="accentArrow" d="M242 790 L290 790"/>
<rect x="290" y="730" width="150" height="120" rx="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.5"/>
<rect x="300" y="740" width="30" height="24" rx="5" fill="#4f46e5"/>
<text x="315" y="757" text-anchor="middle" class="label">2</text>
<text x="338" y="758" class="strong">编码</text>
<text x="302" y="788" class="small">序列化规范字节</text>
<path class="accentArrow" d="M440 790 L488 790"/>
<rect x="488" y="730" width="150" height="120" rx="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.5"/>
<rect x="498" y="740" width="30" height="24" rx="5" fill="#4f46e5"/>
<text x="513" y="757" text-anchor="middle" class="label">3</text>
<text x="536" y="758" class="strong">哈希</text>
<text x="500" y="788" class="small">摘要跨越信任边界</text>
<path class="accentArrow" d="M638 790 L686 790"/>
<rect x="686" y="730" width="150" height="120" rx="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.5"/>
<rect x="696" y="740" width="30" height="24" rx="5" fill="#4f46e5"/>
<text x="711" y="757" text-anchor="middle" class="label">4</text>
<text x="734" y="758" class="strong">存储</text>
<text x="698" y="788" class="small">payload 或见证可取回</text>
<path class="accentArrow" d="M836 790 L884 790"/>
<rect x="884" y="730" width="150" height="120" rx="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.5"/>
<rect x="894" y="740" width="30" height="24" rx="5" fill="#4f46e5"/>
<text x="909" y="757" text-anchor="middle" class="label">5</text>
<text x="932" y="758" class="strong">验证</text>
<text x="896" y="788" class="small">消费者重算字节和摘要</text>
<path class="accentArrow" d="M1034 790 L1082 790"/>
<rect x="1082" y="730" width="150" height="120" rx="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.5"/>
<rect x="1092" y="740" width="30" height="24" rx="5" fill="#4f46e5"/>
<text x="1107" y="757" text-anchor="middle" class="label">6</text>
<text x="1130" y="758" class="strong">拒绝</text>
<text x="1094" y="788" class="small">不匹配或歧义默认失败</text>
<path class="dashArrow" d="M182 900 C412 974 852 974 1132 900"/>
<rect x="482" y="914" width="210" height="120" rx="8" fill="#fff1f2" stroke="#dc2626" stroke-width="1.4"/>
