<text x="1518" y="876" class="small">可变字段带长度分隔</text>
<rect x="1378" y="924" width="442" height="58" rx="6" fill="#ffffff"/>
<text x="1390" y="947" class="strong">哈希</text>
<text x="1518" y="944" class="small">所有消费者重算同一摘要</text>
<line x1="1504" y1="724" x2="1504" y2="992" stroke="#4f46e5" stroke-width="1.2" stroke-dasharray="4 5"/>
<rect x="1368" y="1026" width="462" height="74" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2"/>
