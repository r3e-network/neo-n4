<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" width="1200" height="650" font-family="'Noto Sans CJK SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">L1 到 L2 存款流程</title>
  <desc id="desc">用户锁定 L1 资产；L2 桥根据事件载荷铸造对应封装资产。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#526173"/>
    </marker>
    <filter id="card" x="-2%" y="-3%" width="104%" height="106%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.0" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <style>
      .bg { fill: #fbfcfe; }
      .page-title { font-size: 22px; font-weight: 750; fill: #1e2a55; }
      .page-subtitle { font-size: 12.5px; fill: #526173; }
      .box-title { font-size: 14px; font-weight: 750; fill: #1e2a55; }
      .small-title { font-size: 12px; font-weight: 700; fill: #1e2a55; }
      .lane-title { font-size: 13px; font-weight: 750; fill: #1e2a55; }
      .body { font-size: 11.5px; fill: #2d3a48; }
      .body-strong { font-size: 11.5px; font-weight: 700; fill: #1e2a55; }
      .caption { font-size: 11px; fill: #526173; font-style: italic; }
      .arrow { stroke: #526173; stroke-width: 1.7; }
      .dashed { stroke-dasharray: 6 5; }
      .arrow-label { font-size: 10.5px; fill: #526173; font-weight: 650; }
      .lifeline { stroke: #c7d0dc; stroke-width: 1.1; stroke-dasharray: 4 4; }
      .zone-title { font-size: 13px; font-weight: 750; fill: #526173; letter-spacing: .2px; }
      .mono { font-family: 'Noto Sans Mono CJK SC', ui-monospace, SFMono-Regular, Consolas, monospace; font-size: 10.5px; fill: #1e2a55; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="650"/>
  <text x="36" y="40" class="page-title">L1 到 L2 存款流程</text>
  <text x="36" y="63" class="page-subtitle">用户锁定 L1 资产；L2 桥根据事件载荷铸造对应封装资产。</text>
<g>
  <rect x="55" y="110" width="170" height="470" rx="8" fill="#eaf2ff" stroke="#d8dee8"/>
  <text x="140" y="140" text-anchor="middle" class="lane-title">L1 钱包</text>
  <line x1="140" y1="158" x2="140" y2="562" class="lifeline"/>
</g>
<g>
  <rect x="270" y="110" width="190" height="470" rx="8" fill="#eaf7f0" stroke="#d8dee8"/>
  <text x="365" y="140" text-anchor="middle" class="lane-title">SharedBridge</text>
  <line x1="365" y1="158" x2="365" y2="562" class="lifeline"/>
</g>
<g>
  <rect x="505" y="110" width="190" height="470" rx="8" fill="#fff5e6" stroke="#d8dee8"/>
  <text x="600" y="140" text-anchor="middle" class="lane-title">事件 监听er / 批处理器</text>
  <line x1="600" y1="158" x2="600" y2="562" class="lifeline"/>
</g>
<g>
  <rect x="740" y="110" width="190" height="470" rx="8" fill="#e7f8fb" stroke="#d8dee8"/>
  <text x="835" y="140" text-anchor="middle" class="lane-title">L2BridgeContract</text>
  <line x1="835" y1="158" x2="835" y2="562" class="lifeline"/>
</g>
<g>
  <rect x="975" y="110" width="170" height="470" rx="8" fill="#eaf2ff" stroke="#d8dee8"/>
  <text x="1060" y="140" text-anchor="middle" class="lane-title">L2 余额</text>
  <line x1="1060" y1="158" x2="1060" y2="562" class="lifeline"/>
</g>
<line x1="140" y1="170" x2="365" y2="170" class="arrow" marker-end="url(#arrow)"/><text x="252" y="162" text-anchor="middle" class="arrow-label">1. Deposit(chainId, asset, amount, recipient)</text>
<rect x="285" y="205" width="160" height="42" rx="7" fill="#eaf7f0" stroke="#d8dee8"/><text x="365" y="231" text-anchor="middle" class="small-title">锁定 L1 资产</text>
<line x1="365" y1="252" x2="600" y2="252" class="arrow" marker-end="url(#arrow)"/><text x="482" y="244" text-anchor="middle" class="arrow-label">2. DepositEnqueued 事件</text>
<rect x="520" y="288" width="160" height="42" rx="7" fill="#fff5e6" stroke="#d8dee8"/><text x="600" y="314" text-anchor="middle" class="small-title">生成 L2 消息</text>
<line x1="600" y1="335" x2="835" y2="335" class="arrow" marker-end="url(#arrow)"/><text x="718" y="327" text-anchor="middle" class="arrow-label">3. 中继存款载荷</text>
<rect x="755" y="372" width="160" height="42" rx="7" fill="#e7f8fb" stroke="#d8dee8"/><text x="835" y="398" text-anchor="middle" class="small-title">铸造封装资产</text>
<line x1="835" y1="420" x2="1060" y2="420" class="arrow" marker-end="url(#arrow)"/><text x="948" y="412" text-anchor="middle" class="arrow-label">4. 记入接收方</text>
<rect x="250" y="500" width="705" height="60" rx="8" fill="#fff9d9" stroke="#ebd37b"/>
<text x="270" y="525" class="body-strong">不变量</text>
<text x="350" y="525" class="body">L1 锁定金额等于 L2 封装供应量；载荷携带 chainId、资产、接收方和金额。</text>
</svg>
