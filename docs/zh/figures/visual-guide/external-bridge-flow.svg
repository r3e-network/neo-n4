<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" font-family="'Noto Sans CJK SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">外链桥数据流</title>
  <desc id="desc">外链锁定事件经 监听er、委员会签名和验证器合约转换为 NeoHub 入站消息。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#526173"/>
    </marker>
    <filter id="card" x="-2%" y="-3%" width="104%" height="106%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.0" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <style>
      .bg { fill: #fbfcfe; }
      .page-title { font-size: 22px; font-weight: 750; fill: #1e2a55; }
      .page-subtitle { font-size: 12.5px; fill: #526173; }
      .box-title { font-size: 14px; font-weight: 750; fill: #1e2a55; }
      .small-title { font-size: 12px; font-weight: 700; fill: #1e2a55; }
      .lane-title { font-size: 13px; font-weight: 750; fill: #1e2a55; }
      .body { font-size: 11.5px; fill: #2d3a48; }
      .body-strong { font-size: 11.5px; font-weight: 700; fill: #1e2a55; }
      .caption { font-size: 11px; fill: #526173; font-style: italic; }
      .arrow { stroke: #526173; stroke-width: 1.7; }
      .dashed { stroke-dasharray: 6 5; }
      .arrow-label { font-size: 10.5px; fill: #526173; font-weight: 650; }
      .lifeline { stroke: #c7d0dc; stroke-width: 1.1; stroke-dasharray: 4 4; }
      .zone-title { font-size: 13px; font-weight: 750; fill: #526173; letter-spacing: .2px; }
      .mono { font-family: 'Noto Sans Mono CJK SC', ui-monospace, SFMono-Regular, Consolas, monospace; font-size: 10.5px; fill: #1e2a55; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="720"/>
  <text x="36" y="40" class="page-title">外链桥数据流</text>
  <text x="36" y="63" class="page-subtitle">外链锁定事件经 监听er、委员会签名和验证器合约转换为 NeoHub 入站消息。</text>
<g>
  <rect x="55" y="120" width="225" height="135" rx="8" fill="#f7ecff" stroke="#d8dee8" filter="url(#card)"/>
  <text x="71" y="147" class="box-title">外链路由器</text>
  <text x="71" y="172" class="body" text-anchor="start"><tspan x="71" dy="0">EVM / Tron / Solana</tspan><tspan x="71" dy="18">锁定 / 终结</tspan><tspan x="71" dy="18">发出规范事件</tspan></text>
</g>
<g>
  <rect x="355" y="120" width="225" height="135" rx="8" fill="#fff5e6" stroke="#d8dee8" filter="url(#card)"/>
  <text x="371" y="147" class="box-title">Watcher 守护进程</text>
  <text x="371" y="172" class="body" text-anchor="start"><tspan x="371" dy="0">轮询 RPC</tspan><tspan x="371" dy="18">解码消息</tspan><tspan x="371" dy="18">记录 nonce</tspan></text>
</g>
<g>
  <rect x="660" y="120" width="215" height="135" rx="8" fill="#fff9d9" stroke="#d8dee8" filter="url(#card)"/>
  <text x="676" y="147" class="box-title">MPC 委员会</text>
  <text x="676" y="172" class="body" text-anchor="start"><tspan x="676" dy="0">签署消息哈希</tspan><tspan x="676" dy="18">阈值证明</tspan><tspan x="676" dy="18">曲线特定公钥</tspan></text>
</g>
<g>
  <rect x="945" y="120" width="205" height="135" rx="8" fill="#eaf7f0" stroke="#d8dee8" filter="url(#card)"/>
  <text x="961" y="147" class="box-title">NeoHub 验证器</text>
  <text x="961" y="172" class="body" text-anchor="start"><tspan x="961" dy="0">MpcCommitteeVerifier</tspan><tspan x="961" dy="18">验证入站证明</tspan><tspan x="961" dy="18">绑定 externalChainId</tspan></text>
</g>
<g>
  <rect x="230" y="415" width="240" height="135" rx="8" fill="#eaf7f0" stroke="#d8dee8" filter="url(#card)"/>
  <text x="246" y="442" class="box-title">ExternalBridgeEscrow</text>
  <text x="246" y="467" class="body" text-anchor="start"><tspan x="246" dy="0">锁定 / 释放 NEP-17</tspan><tspan x="246" dy="18">检查注册表路由</tspan><tspan x="246" dy="18">记录重放保护</tspan></text>
</g>
<g>
  <rect x="560" y="415" width="230" height="135" rx="8" fill="#eaf7f0" stroke="#d8dee8" filter="url(#card)"/>
  <text x="576" y="442" class="box-title">ExternalBridgeRegistry</text>
  <text x="576" y="467" class="body" text-anchor="start"><tspan x="576" dy="0">externalChainId -&gt; verifier</tspan><tspan x="576" dy="18">治理升级</tspan><tspan x="576" dy="18">桥类型</tspan></text>
</g>
<g>
  <rect x="875" y="415" width="230" height="135" rx="8" fill="#ffecec" stroke="#d8dee8" filter="url(#card)"/>
  <text x="891" y="442" class="box-title">ExternalBridgeBond</text>
  <text x="891" y="467" class="body" text-anchor="start"><tspan x="891" dy="0">委员会保证金</tspan><tspan x="891" dy="18">欺诈验证罚没</tspan><tspan x="891" dy="18">治理控制</tspan></text>
</g>
<line x1="280" y1="188" x2="355" y2="188" class="arrow" marker-end="url(#arrow)"/><text x="318" y="180" text-anchor="middle" class="arrow-label">事件</text>
<line x1="580" y1="188" x2="660" y2="188" class="arrow" marker-end="url(#arrow)"/><text x="620" y="180" text-anchor="middle" class="arrow-label">消息哈希</text>
<line x1="875" y1="188" x2="945" y2="188" class="arrow" marker-end="url(#arrow)"/><text x="910" y="180" text-anchor="middle" class="arrow-label">proofBytes</text>
<line x1="1048" y1="255" x2="350" y2="415" class="arrow dashed" marker-end="url(#arrow)"/><text x="699" y="327" text-anchor="middle" class="arrow-label">Receive(...)</text>
<line x1="470" y1="482" x2="560" y2="482" class="arrow" marker-end="url(#arrow)"/><text x="515" y="474" text-anchor="middle" class="arrow-label">查找路由</text>
<line x1="790" y1="482" x2="875" y2="482" class="arrow" marker-end="url(#arrow)"/><text x="832" y="474" text-anchor="middle" class="arrow-label">双签时罚没</text>
<line x1="350" y1="550" x2="170" y2="255" class="arrow dashed" marker-end="url(#arrow)"/><text x="260" y="394" text-anchor="middle" class="arrow-label">outbound: lock on Neo -&gt; release foreign</text>
</svg>
