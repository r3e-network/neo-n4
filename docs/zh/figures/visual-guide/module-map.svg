<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="1200" height="760" font-family="'Noto Sans CJK SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">代码模块地图</title>
  <desc id="desc">仓库目录与运行时职责、可部署产物之间的映射。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#526173"/>
    </marker>
    <filter id="card" x="-2%" y="-3%" width="104%" height="106%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.0" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <style>
      .bg { fill: #fbfcfe; }
      .page-title { font-size: 22px; font-weight: 750; fill: #1e2a55; }
      .page-subtitle { font-size: 12.5px; fill: #526173; }
      .box-title { font-size: 14px; font-weight: 750; fill: #1e2a55; }
      .small-title { font-size: 12px; font-weight: 700; fill: #1e2a55; }
      .lane-title { font-size: 13px; font-weight: 750; fill: #1e2a55; }
      .body { font-size: 11.5px; fill: #2d3a48; }
      .body-strong { font-size: 11.5px; font-weight: 700; fill: #1e2a55; }
      .caption { font-size: 11px; fill: #526173; font-style: italic; }
      .arrow { stroke: #526173; stroke-width: 1.7; }
      .dashed { stroke-dasharray: 6 5; }
      .arrow-label { font-size: 10.5px; fill: #526173; font-weight: 650; }
      .lifeline { stroke: #c7d0dc; stroke-width: 1.1; stroke-dasharray: 4 4; }
      .zone-title { font-size: 13px; font-weight: 750; fill: #526173; letter-spacing: .2px; }
      .mono { font-family: 'Noto Sans Mono CJK SC', ui-monospace, SFMono-Regular, Consolas, monospace; font-size: 10.5px; fill: #1e2a55; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="760"/>
  <text x="36" y="40" class="page-title">代码模块地图</text>
  <text x="36" y="63" class="page-subtitle">仓库目录与运行时职责、可部署产物之间的映射。</text>
<g>
  <rect x="45" y="105" width="230" height="140" rx="8" fill="#eaf7f0" stroke="#d8dee8" filter="url(#card)"/>
  <text x="61" y="132" class="box-title">contracts/</text>
  <text x="61" y="157" class="body" text-anchor="start"><tspan x="61" dy="0">23 个可部署 L1 合约</tspan><tspan x="61" dy="18">NeoHub 套件</tspan><tspan x="61" dy="18">nccs -&gt; bin/sc artifacts</tspan></text>
</g>
<g>
  <rect x="330" y="105" width="235" height="140" rx="8" fill="#eaf2ff" stroke="#d8dee8" filter="url(#card)"/>
  <text x="346" y="132" class="box-title">src/</text>
  <text x="346" y="157" class="body" text-anchor="start"><tspan x="346" dy="0">L2 库和插件</tspan><tspan x="346" dy="18">Batch / State / Bridge / DA</tspan><tspan x="346" dy="18">RPC、证明、遥测</tspan></text>
</g>
<g>
  <rect x="620" y="105" width="230" height="140" rx="8" fill="#fff5e6" stroke="#d8dee8" filter="url(#card)"/>
  <text x="636" y="132" class="box-title">tools/</text>
  <text x="636" y="157" class="body" text-anchor="start"><tspan x="636" dy="0">neo-hub-deploy</tspan><tspan x="636" dy="18">neo-stack / neo-bridge</tspan><tspan x="636" dy="18">faucet / explorer / devnet</tspan></text>
</g>
<g>
  <rect x="905" y="105" width="225" height="140" rx="8" fill="#f4f6f8" stroke="#d8dee8" filter="url(#card)"/>
  <text x="921" y="132" class="box-title">测试/</text>
  <text x="921" y="157" class="body" text-anchor="start"><tspan x="921" dy="0">单元 + 集成覆盖</tspan><tspan x="921" dy="18">CLI 和插件断言</tspan><tspan x="921" dy="18">Windows 运行时检查</tspan></text>
</g>
<g>
  <rect x="45" y="335" width="230" height="140" rx="8" fill="#f7ecff" stroke="#d8dee8" filter="url(#card)"/>
  <text x="61" y="362" class="box-title">监听ers/</text>
  <text x="61" y="387" class="body" text-anchor="start"><tspan x="61" dy="0">ETH 实时守护进程</tspan><tspan x="61" dy="18">Solana + Tron 包装层</tspan><tspan x="61" dy="18">日志 / 健康 / 指标</tspan></text>
</g>
<g>
  <rect x="330" y="335" width="235" height="140" rx="8" fill="#ffecec" stroke="#d8dee8" filter="url(#card)"/>
  <text x="346" y="362" class="box-title">external/</text>
  <text x="346" y="387" class="body" text-anchor="start"><tspan x="346" dy="0">Neo 子模块</tspan><tspan x="346" dy="18">EVM Foundry 路由器</tspan><tspan x="346" dy="18">Solana Anchor 路由器</tspan></text>
</g>
<g>
  <rect x="620" y="335" width="230" height="140" rx="8" fill="#e7f8fb" stroke="#d8dee8" filter="url(#card)"/>
  <text x="636" y="362" class="box-title">sdk/</text>
  <text x="636" y="387" class="body" text-anchor="start"><tspan x="636" dy="0">TypeScript 客户端</tspan><tspan x="636" dy="18">Rust 客户端</tspan><tspan x="636" dy="18">证明和 RPC 辅助</tspan></text>
</g>
<g>
  <rect x="905" y="335" width="225" height="140" rx="8" fill="#fff9d9" stroke="#d8dee8" filter="url(#card)"/>
  <text x="921" y="362" class="box-title">docs/</text>
  <text x="921" y="387" class="body" text-anchor="start"><tspan x="921" dy="0">mdBook</tspan><tspan x="921" dy="18">架构地图</tspan><tspan x="921" dy="18">可视化导览 SVG</tspan></text>
</g>
<line x1="275" y1="175" x2="330" y2="175" class="arrow" marker-end="url(#arrow)"/><text x="302" y="167" text-anchor="middle" class="arrow-label">引用</text>
<line x1="565" y1="175" x2="620" y2="175" class="arrow" marker-end="url(#arrow)"/><text x="592" y="167" text-anchor="middle" class="arrow-label">使用</text>
<line x1="850" y1="175" x2="905" y2="175" class="arrow" marker-end="url(#arrow)"/><text x="878" y="167" text-anchor="middle" class="arrow-label">测试</text>
<line x1="160" y1="245" x2="160" y2="335" class="arrow" marker-end="url(#arrow)"/><text x="160" y="282" text-anchor="middle" class="arrow-label">监听</text>
<line x1="445" y1="245" x2="445" y2="335" class="arrow" marker-end="url(#arrow)"/><text x="445" y="282" text-anchor="middle" class="arrow-label">子模块</text>
<line x1="735" y1="245" x2="735" y2="335" class="arrow" marker-end="url(#arrow)"/><text x="735" y="282" text-anchor="middle" class="arrow-label">客户端 API</text>
<line x1="1018" y1="245" x2="1018" y2="335" class="arrow" marker-end="url(#arrow)"/><text x="1018" y="282" text-anchor="middle" class="arrow-label">docs</text>
<rect x="45" y="545" width="1085" height="120" rx="8" fill="#ffffff" stroke="#d8dee8" filter="url(#card)"/>
<text x="65" y="580" class="box-title">生产产物路径</text>
<text x="65" y="610" class="mono">contracts/**/bin/sc/*.nef</text>
<text x="355" y="610" class="mono">contracts/**/bin/sc/*.manifest.json</text>
<text x="720" y="610" class="mono">tools/Neo.Hub.Deploy -> deploy-部署包.json</text>
</svg>
