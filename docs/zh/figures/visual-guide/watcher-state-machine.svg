<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" font-family="'Noto Sans CJK SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">Watcher 守护进程状态机</title>
  <desc id="desc">实时 RPC ETH 监听er 路径：启动、预检、轮询、构造证明、提交、日志和恢复。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#526173"/>
    </marker>
    <filter id="card" x="-2%" y="-3%" width="104%" height="106%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.0" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <style>
      .bg { fill: #fbfcfe; }
      .page-title { font-size: 22px; font-weight: 750; fill: #1e2a55; }
      .page-subtitle { font-size: 12.5px; fill: #526173; }
      .box-title { font-size: 14px; font-weight: 750; fill: #1e2a55; }
      .small-title { font-size: 12px; font-weight: 700; fill: #1e2a55; }
      .lane-title { font-size: 13px; font-weight: 750; fill: #1e2a55; }
      .body { font-size: 11.5px; fill: #2d3a48; }
      .body-strong { font-size: 11.5px; font-weight: 700; fill: #1e2a55; }
      .caption { font-size: 11px; fill: #526173; font-style: italic; }
      .arrow { stroke: #526173; stroke-width: 1.7; }
      .dashed { stroke-dasharray: 6 5; }
      .arrow-label { font-size: 10.5px; fill: #526173; font-weight: 650; }
      .lifeline { stroke: #c7d0dc; stroke-width: 1.1; stroke-dasharray: 4 4; }
      .zone-title { font-size: 13px; font-weight: 750; fill: #526173; letter-spacing: .2px; }
      .mono { font-family: 'Noto Sans Mono CJK SC', ui-monospace, SFMono-Regular, Consolas, monospace; font-size: 10.5px; fill: #1e2a55; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="720"/>
  <text x="36" y="40" class="page-title">Watcher 守护进程状态机</text>
  <text x="36" y="63" class="page-subtitle">实时 RPC ETH 监听er 路径：启动、预检、轮询、构造证明、提交、日志和恢复。</text>
<rect x="70" y="140" width="160" height="52" rx="7" fill="#eaf2ff" stroke="#d8dee8"/><text x="150" y="171" text-anchor="middle" class="small-title">加载配置</text>
<rect x="290" y="140" width="160" height="52" rx="7" fill="#eaf7f0" stroke="#d8dee8"/><text x="370" y="171" text-anchor="middle" class="small-title">预检</text>
<rect x="510" y="140" width="160" height="52" rx="7" fill="#fff5e6" stroke="#d8dee8"/><text x="590" y="171" text-anchor="middle" class="small-title">轮询 RPC</text>
<rect x="730" y="140" width="160" height="52" rx="7" fill="#f7ecff" stroke="#d8dee8"/><text x="810" y="171" text-anchor="middle" class="small-title">decode 事件</text>
<rect x="950" y="140" width="160" height="52" rx="7" fill="#fff9d9" stroke="#d8dee8"/><text x="1030" y="171" text-anchor="middle" class="small-title">构造消息</text>
<rect x="185" y="360" width="170" height="52" rx="7" fill="#fff9d9" stroke="#d8dee8"/><text x="270" y="391" text-anchor="middle" class="small-title">签署证明</text>
<rect x="430" y="360" width="170" height="52" rx="7" fill="#eaf7f0" stroke="#d8dee8"/><text x="515" y="391" text-anchor="middle" class="small-title">Neo 预检查</text>
<rect x="675" y="360" width="170" height="52" rx="7" fill="#e7f8fb" stroke="#d8dee8"/><text x="760" y="391" text-anchor="middle" class="small-title">签名 + 提交</text>
<rect x="920" y="360" width="170" height="52" rx="7" fill="#fff5e6" stroke="#d8dee8"/><text x="1005" y="391" text-anchor="middle" class="small-title">记录游标</text>
<line x1="230" y1="166" x2="290" y2="166" class="arrow" marker-end="url(#arrow)"/>
<line x1="450" y1="166" x2="510" y2="166" class="arrow" marker-end="url(#arrow)"/>
<line x1="670" y1="166" x2="730" y2="166" class="arrow" marker-end="url(#arrow)"/>
<line x1="890" y1="166" x2="950" y2="166" class="arrow" marker-end="url(#arrow)"/>
<line x1="1030" y1="192" x2="270" y2="360" class="arrow" marker-end="url(#arrow)"/>
<line x1="355" y1="386" x2="430" y2="386" class="arrow" marker-end="url(#arrow)"/>
<line x1="600" y1="386" x2="675" y2="386" class="arrow" marker-end="url(#arrow)"/>
<line x1="845" y1="386" x2="920" y2="386" class="arrow" marker-end="url(#arrow)"/>
<line x1="1005" y1="360" x2="590" y2="192" class="arrow dashed" marker-end="url(#arrow)"/><text x="798" y="268" text-anchor="middle" class="arrow-label">下一轮</text>
<rect x="430" y="545" width="350" height="68" rx="8" fill="#ffecec" stroke="#e8a6a6"/>
<text x="455" y="573" class="body-strong">错误路径</text>
<text x="545" y="573" class="body">传输 / RPC / 提交失败会记录健康错误、退避后重试。</text>
<line x1="600" y1="545" x2="600" y2="412" class="arrow dashed" marker-end="url(#arrow)"/><text x="600" y="470" text-anchor="middle" class="arrow-label">退避</text>
<text x="70" y="655" class="caption">Windows 测试覆盖预检；Unix 测试还覆盖 SIGTERM 优雅关闭。</text>
</svg>
