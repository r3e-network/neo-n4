[profile.default]
src = "src"
test = "test"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
verbosity = 2

# Reproducible builds — pin compiler + EVM target.
evm_version = "shanghai"

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false
int_types = "long"
