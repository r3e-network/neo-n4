<rect x="110" y="196" width="42" height="32" rx="6" fill="#020617" stroke="#38bdf8" stroke-width="1"/>
<text x="131" y="219" text-anchor="middle" fill="#38bdf8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">1</text>
<text x="168" y="212" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">Entry domain</text>
<text x="118" y="254" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">Solana instruction</text>
<text x="118" y="276" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">token account state</text>
<text x="118" y="298" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">bridge authority</text>
<rect x="630" y="178" width="500" height="168" rx="8" fill="#082f49" stroke="#38bdf8" stroke-width="2" filter="url(#shadow)"/>
<rect x="648" y="196" width="42" height="32" rx="6" fill="#020617" stroke="#38bdf8" stroke-width="1"/>
<text x="669" y="219" text-anchor="middle" fill="#38bdf8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">2</text>
<text x="706" y="212" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">Normalization</text>
<text x="656" y="254" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">shape heterogeneous events into chain-neutral, hashable,</text>
<text x="656" y="276" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">replay-protected messages</text>
<rect x="1168" y="178" width="500" height="168" rx="8" fill="#082f49" stroke="#38bdf8" stroke-width="2" filter="url(#shadow)"/>
<rect x="1186" y="196" width="42" height="32" rx="6" fill="#020617" stroke="#38bdf8" stroke-width="1"/>
<text x="1207" y="219" text-anchor="middle" fill="#38bdf8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">3</text>
<text x="1244" y="212" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">Core mechanism</text>
<text x="1194" y="254" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">Validate route</text>
<text x="1194" y="276" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">Move escrowed assets</text>
<text x="1194" y="298" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">Emit bridge event</text>
<rect x="92" y="376" width="500" height="168" rx="8" fill="#082f49" stroke="#38bdf8" stroke-width="2" filter="url(#shadow)"/>
<rect x="110" y="394" width="42" height="32" rx="6" fill="#020617" stroke="#38bdf8" stroke-width="1"/>
<text x="131" y="417" text-anchor="middle" fill="#38bdf8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">4</text>
<text x="168" y="410" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">State and commitment</text>
<text x="118" y="452" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">message hash, nonce, source height, and asset action</text>
<rect x="630" y="376" width="500" height="168" rx="8" fill="#082f49" stroke="#38bdf8" stroke-width="2" filter="url(#shadow)"/>
<rect x="648" y="394" width="42" height="32" rx="6" fill="#020617" stroke="#38bdf8" stroke-width="1"/>
<text x="669" y="417" text-anchor="middle" fill="#38bdf8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">5</text>
<text x="706" y="410" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">Evidence or result</text>
<text x="656" y="452" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">bridge event</text>
<text x="656" y="474" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">escrow mutation</text>
<text x="656" y="496" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">relay evidence</text>
<rect x="1168" y="376" width="500" height="168" rx="8" fill="#082f49" stroke="#38bdf8" stroke-width="2" filter="url(#shadow)"/>
<rect x="1186" y="394" width="42" height="32" rx="6" fill="#020617" stroke="#38bdf8" stroke-width="1"/>
<text x="1207" y="417" text-anchor="middle" fill="#38bdf8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">6</text>
<text x="1244" y="410" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">Consumer boundary</text>
<text x="1194" y="452" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">watcher-sol</text>
<text x="1194" y="474" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">gateway</text>
<text x="1194" y="496" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">shared bridge</text>
<rect x="92" y="574" width="500" height="168" rx="8" fill="#082f49" stroke="#38bdf8" stroke-width="2" filter="url(#shadow)"/>
<rect x="110" y="592" width="42" height="32" rx="6" fill="#020617" stroke="#38bdf8" stroke-width="1"/>
<text x="131" y="615" text-anchor="middle" fill="#38bdf8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">7</text>
<text x="168" y="608" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">Failure path</text>
<text x="118" y="650" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">insufficient confirmations, nonce replay, message</text>
<text x="118" y="672" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">mismatch, or invalid asset state</text>
<rect x="630" y="574" width="500" height="168" rx="8" fill="#082f49" stroke="#38bdf8" stroke-width="2" filter="url(#shadow)"/>
<rect x="648" y="592" width="42" height="32" rx="6" fill="#020617" stroke="#38bdf8" stroke-width="1"/>
<text x="669" y="615" text-anchor="middle" fill="#38bdf8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">8</text>
<text x="706" y="608" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">Extension point</text>
<text x="656" y="650" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">source-chain watchers, message routes, asset mapping, and</text>
<text x="656" y="672" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">confirmation policy</text>
<text x="72" y="826" fill="#94a3b8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">Conceptual diagram generated from crate role metadata; not a source-code reading map.</text>
