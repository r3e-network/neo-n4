<text x="76" y="143" class="small">Read as: <tspan class="bodyStrong">technical-principle figure, not implementation inventory</tspan> · Boundary: asset actions require bridge rules, message evidence, and governance policy · Out of scope: does not own target-chain consensus; owns normalized relay semantics</text>
