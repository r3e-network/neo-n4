<rect x="648" y="196" width="42" height="32" rx="6" fill="#020617" stroke="#38bdf8" stroke-width="1"/>
<text x="669" y="219" text-anchor="middle" fill="#38bdf8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">2</text>
<text x="706" y="212" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">规范化层</text>
<text x="656" y="254" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">把命令、配置和文件整理成强类型操作</text>
