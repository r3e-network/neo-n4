<rect x="1186" y="196" width="42" height="32" rx="6" fill="#020617" stroke="#38bdf8" stroke-width="1"/>
<text x="1207" y="219" text-anchor="middle" fill="#38bdf8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">3</text>
<text x="1244" y="212" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">核心技术机制</text>
<text x="1194" y="254" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">编码 API 请求 | 处理桥/证明模型 | 返回强类型结果</text>
