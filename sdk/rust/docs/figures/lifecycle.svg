<text x="168" y="410" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">Normalization</text>
<text x="118" y="452" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">shape commands, config, and files into typed operations</text>
<rect x="630" y="376" width="500" height="168" rx="8" fill="#341455" stroke="#c084fc" stroke-width="2" filter="url(#shadow)"/>
<rect x="648" y="394" width="42" height="32" rx="6" fill="#020617" stroke="#c084fc" stroke-width="1"/>
<text x="669" y="417" text-anchor="middle" fill="#c084fc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">5</text>
<text x="706" y="410" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">Execution or verification</text>
<text x="656" y="452" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">Encode API requests</text>
<text x="656" y="474" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">Handle bridge/proof models</text>
<text x="656" y="496" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">Return typed results</text>
<rect x="1168" y="376" width="500" height="168" rx="8" fill="#341455" stroke="#c084fc" stroke-width="2" filter="url(#shadow)"/>
<rect x="1186" y="394" width="42" height="32" rx="6" fill="#020617" stroke="#c084fc" stroke-width="1"/>
<text x="1207" y="417" text-anchor="middle" fill="#c084fc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">6</text>
<text x="1244" y="410" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">Commit or output</text>
<text x="1194" y="452" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">typed client result</text>
<text x="1194" y="474" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">transaction request</text>
<text x="1194" y="496" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">query response</text>
<rect x="92" y="574" width="500" height="168" rx="8" fill="#341455" stroke="#c084fc" stroke-width="2" filter="url(#shadow)"/>
<rect x="110" y="592" width="42" height="32" rx="6" fill="#020617" stroke="#c084fc" stroke-width="1"/>
<text x="131" y="615" text-anchor="middle" fill="#c084fc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">7</text>
<text x="168" y="608" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">Consumption</text>
<text x="118" y="650" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">apps</text>
<text x="118" y="672" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">operators</text>
<text x="118" y="694" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">integration tests</text>
<rect x="630" y="574" width="500" height="168" rx="8" fill="#341455" stroke="#c084fc" stroke-width="2" filter="url(#shadow)"/>
<rect x="648" y="592" width="42" height="32" rx="6" fill="#020617" stroke="#c084fc" stroke-width="1"/>
<text x="669" y="615" text-anchor="middle" fill="#c084fc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">8</text>
<text x="706" y="608" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">Operation</text>
<text x="656" y="650" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">command, config digest, network, output artifacts, and</text>
<text x="656" y="672" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">diagnostics</text>
<text x="72" y="826" fill="#94a3b8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">Conceptual diagram generated from crate role metadata; not a source-code reading map.</text>
