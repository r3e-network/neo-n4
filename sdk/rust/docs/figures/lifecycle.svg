<text x="1244" y="212" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">Input intake</text>
<text x="1194" y="254" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">developer app</text>
<text x="1194" y="276" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">gateway endpoint</text>
<text x="1194" y="298" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">wallet/config</text>
