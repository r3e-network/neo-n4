<rect x="110" y="196" width="42" height="32" rx="6" fill="#020617" stroke="#c084fc" stroke-width="1"/>
<text x="131" y="219" text-anchor="middle" fill="#c084fc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">1</text>
<text x="168" y="212" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">neo-n4-sdk</text>
<text x="118" y="254" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">Lifecycle shows how the unit reaches observable runtime</text>
<text x="118" y="276" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">operation.</text>
