<svg xmlns="http://www.w3.org/2000/svg" width="1760" height="870" viewBox="0 0 1760 870" role="img" aria-label="neo-n4-sdk 运行生命周期图">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#08111f"/><stop offset="100%" stop-color="#111827"/></linearGradient>
<filter id="shadow" x="-15%" y="-15%" width="130%" height="130%"><feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#020617" flood-opacity="0.42"/></filter>
</defs>
<rect width="1760" height="100%" fill="url(#bg)"/>
<rect x="34" y="34" width="1692" height="802" rx="10" fill="#0f172a" stroke="#334155" stroke-width="2"/>
<text x="72" y="92" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="34" font-weight="700">neo-n4-sdk: 运行生命周期图</text>
<text x="72" y="132" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="19">Neo N4 技术原理学习图 - 从配置到执行、证据和运维的生命周期</text>
<rect x="92" y="178" width="500" height="168" rx="8" fill="#341455" stroke="#c084fc" stroke-width="2" filter="url(#shadow)"/>
<rect x="110" y="196" width="42" height="32" rx="6" fill="#020617" stroke="#c084fc" stroke-width="1"/>
<text x="131" y="219" text-anchor="middle" fill="#c084fc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">1</text>
<text x="168" y="212" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">neo-n4-sdk</text>
<text x="118" y="254" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">生命周期图说明技术单元如何进入可观测运行。</text>
<rect x="630" y="178" width="500" height="168" rx="8" fill="#341455" stroke="#c084fc" stroke-width="2" filter="url(#shadow)"/>
<rect x="648" y="196" width="42" height="32" rx="6" fill="#020617" stroke="#c084fc" stroke-width="1"/>
<text x="669" y="219" text-anchor="middle" fill="#c084fc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">2</text>
<text x="706" y="212" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">配置</text>
<text x="656" y="254" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">网络、账户、端点、输出格式、安全策略</text>
<rect x="1168" y="178" width="500" height="168" rx="8" fill="#341455" stroke="#c084fc" stroke-width="2" filter="url(#shadow)"/>
<rect x="1186" y="196" width="42" height="32" rx="6" fill="#020617" stroke="#c084fc" stroke-width="1"/>
<text x="1207" y="219" text-anchor="middle" fill="#c084fc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">3</text>
<text x="1244" y="212" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">输入接收</text>
<text x="1194" y="254" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">开发者应用 | 网关端点 | 钱包/配置</text>
<rect x="92" y="376" width="500" height="168" rx="8" fill="#341455" stroke="#c084fc" stroke-width="2" filter="url(#shadow)"/>
<rect x="110" y="394" width="42" height="32" rx="6" fill="#020617" stroke="#c084fc" stroke-width="1"/>
<text x="131" y="417" text-anchor="middle" fill="#c084fc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">4</text>
<text x="168" y="410" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">规范化</text>
<text x="118" y="452" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">把命令、配置和文件整理成强类型操作</text>
<rect x="630" y="376" width="500" height="168" rx="8" fill="#341455" stroke="#c084fc" stroke-width="2" filter="url(#shadow)"/>
<rect x="648" y="394" width="42" height="32" rx="6" fill="#020617" stroke="#c084fc" stroke-width="1"/>
<text x="669" y="417" text-anchor="middle" fill="#c084fc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">5</text>
<text x="706" y="410" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">执行或验证</text>
<text x="656" y="452" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">编码 API 请求 | 处理桥/证明模型 | 返回强类型结果</text>
<rect x="1168" y="376" width="500" height="168" rx="8" fill="#341455" stroke="#c084fc" stroke-width="2" filter="url(#shadow)"/>
<rect x="1186" y="394" width="42" height="32" rx="6" fill="#020617" stroke="#c084fc" stroke-width="1"/>
<text x="1207" y="417" text-anchor="middle" fill="#c084fc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">6</text>
<text x="1244" y="410" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">提交或输出</text>
<text x="1194" y="452" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">强类型客户端结果 | 交易请求 | 查询响应</text>
<rect x="92" y="574" width="500" height="168" rx="8" fill="#341455" stroke="#c084fc" stroke-width="2" filter="url(#shadow)"/>
<rect x="110" y="592" width="42" height="32" rx="6" fill="#020617" stroke="#c084fc" stroke-width="1"/>
<text x="131" y="615" text-anchor="middle" fill="#c084fc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">7</text>
<text x="168" y="608" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">消费联动</text>
<text x="118" y="650" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">应用 | 运维工具 | 集成测试</text>
<rect x="630" y="574" width="500" height="168" rx="8" fill="#341455" stroke="#c084fc" stroke-width="2" filter="url(#shadow)"/>
<rect x="648" y="592" width="42" height="32" rx="6" fill="#020617" stroke="#c084fc" stroke-width="1"/>
<text x="669" y="615" text-anchor="middle" fill="#c084fc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">8</text>
<text x="706" y="608" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">运维观测</text>
<text x="656" y="650" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">命令、配置摘要、网络、输出产物和诊断</text>
<text x="72" y="826" fill="#94a3b8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">本图根据 crate 技术角色元数据生成；不是源码阅读图，也不是实现全景图。</text>
</svg>
