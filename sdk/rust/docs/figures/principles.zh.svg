<svg xmlns="http://www.w3.org/2000/svg" width="1760" height="870" viewBox="0 0 1760 870" role="img" aria-label="neo-n4-sdk 技术原理图">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#08111f"/><stop offset="100%" stop-color="#111827"/></linearGradient>
<filter id="shadow" x="-15%" y="-15%" width="130%" height="130%"><feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#020617" flood-opacity="0.42"/></filter>
</defs>
<rect width="1760" height="100%" fill="url(#bg)"/>
<rect x="34" y="34" width="1692" height="802" rx="10" fill="#0f172a" stroke="#334155" stroke-width="2"/>
<text x="72" y="92" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="34" font-weight="700">neo-n4-sdk: 技术原理图</text>
<text x="72" y="132" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="19">Neo N4 技术原理学习图 - 保证设计正确的技术规则</text>
<rect x="92" y="178" width="500" height="168" rx="8" fill="#3a2500" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
<rect x="110" y="196" width="42" height="32" rx="6" fill="#020617" stroke="#f59e0b" stroke-width="1"/>
<text x="131" y="219" text-anchor="middle" fill="#f59e0b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">1</text>
<text x="168" y="212" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">技术目标</text>
<text x="118" y="254" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">用于构建访问 Neo N4 API 的工具和服务的 Rust SDK。</text>
<rect x="630" y="178" width="500" height="168" rx="8" fill="#3a2500" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
<rect x="648" y="196" width="42" height="32" rx="6" fill="#020617" stroke="#f59e0b" stroke-width="1"/>
<text x="669" y="219" text-anchor="middle" fill="#f59e0b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">2</text>
<text x="706" y="212" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">确定性</text>
<text x="656" y="254" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">同一配置和用户意图产生同一请求或包</text>
<rect x="1168" y="178" width="500" height="168" rx="8" fill="#3a2500" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
<rect x="1186" y="196" width="42" height="32" rx="6" fill="#020617" stroke="#f59e0b" stroke-width="1"/>
<text x="1207" y="219" text-anchor="middle" fill="#f59e0b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">3</text>
<text x="1244" y="212" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">输入约束</text>
<text x="1194" y="254" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">开发者应用 | 网关端点 | 钱包/配置</text>
<rect x="92" y="376" width="500" height="168" rx="8" fill="#3a2500" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
<rect x="110" y="394" width="42" height="32" rx="6" fill="#020617" stroke="#f59e0b" stroke-width="1"/>
<text x="131" y="417" text-anchor="middle" fill="#f59e0b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">4</text>
<text x="168" y="410" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">状态转换规则</text>
<text x="118" y="452" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">请求、配置、包或报告通过校验阶段推进</text>
<rect x="630" y="376" width="500" height="168" rx="8" fill="#3a2500" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
<rect x="648" y="394" width="42" height="32" rx="6" fill="#020617" stroke="#f59e0b" stroke-width="1"/>
<text x="669" y="417" text-anchor="middle" fill="#f59e0b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">5</text>
<text x="706" y="410" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">可验证输出</text>
<text x="656" y="452" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">强类型客户端结果 | 交易请求 | 查询响应</text>
<rect x="1168" y="376" width="500" height="168" rx="8" fill="#3a2500" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
<rect x="1186" y="394" width="42" height="32" rx="6" fill="#020617" stroke="#f59e0b" stroke-width="1"/>
<text x="1207" y="417" text-anchor="middle" fill="#f59e0b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">6</text>
<text x="1244" y="410" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">最小信任</text>
<text x="1194" y="452" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">信任校验和签名策略，不信任未校验用户输入</text>
<rect x="92" y="574" width="500" height="168" rx="8" fill="#3a2500" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
<rect x="110" y="592" width="42" height="32" rx="6" fill="#020617" stroke="#f59e0b" stroke-width="1"/>
<text x="131" y="615" text-anchor="middle" fill="#f59e0b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">7</text>
<text x="168" y="608" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">分层边界</text>
<text x="118" y="650" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">界面、编码、网络提交和诊断分层</text>
<rect x="630" y="574" width="500" height="168" rx="8" fill="#3a2500" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
<rect x="648" y="592" width="42" height="32" rx="6" fill="#020617" stroke="#f59e0b" stroke-width="1"/>
<text x="669" y="615" text-anchor="middle" fill="#f59e0b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">8</text>
<text x="706" y="608" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">可观测证据</text>
<text x="656" y="650" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">命令、配置摘要、网络、输出产物和诊断</text>
<text x="72" y="826" fill="#94a3b8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">本图根据 crate 技术角色元数据生成；不是源码阅读图，也不是实现全景图。</text>
</svg>
