<rect x="648" y="394" width="42" height="32" rx="6" fill="#020617" stroke="#a78bfa" stroke-width="1"/>
<text x="669" y="417" text-anchor="middle" fill="#a78bfa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">5</text>
<text x="706" y="410" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">阶段 3</text>
<text x="656" y="452" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">签名或查询</text>
<rect x="1168" y="376" width="500" height="168" rx="8" fill="#2e1065" stroke="#a78bfa" stroke-width="2" filter="url(#shadow)"/>
<rect x="1186" y="394" width="42" height="32" rx="6" fill="#020617" stroke="#a78bfa" stroke-width="1"/>
<text x="1207" y="417" text-anchor="middle" fill="#a78bfa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">6</text>
<text x="1244" y="410" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">阶段 4</text>
<text x="1194" y="452" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">提交网关</text>
<rect x="92" y="574" width="500" height="168" rx="8" fill="#2e1065" stroke="#a78bfa" stroke-width="2" filter="url(#shadow)"/>
<rect x="110" y="592" width="42" height="32" rx="6" fill="#020617" stroke="#a78bfa" stroke-width="1"/>
<text x="131" y="615" text-anchor="middle" fill="#a78bfa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">7</text>
<text x="168" y="608" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">阶段 5</text>
<text x="118" y="650" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">解码响应</text>
<rect x="630" y="574" width="500" height="168" rx="8" fill="#2e1065" stroke="#a78bfa" stroke-width="2" filter="url(#shadow)"/>
<rect x="648" y="592" width="42" height="32" rx="6" fill="#020617" stroke="#a78bfa" stroke-width="1"/>
<text x="669" y="615" text-anchor="middle" fill="#a78bfa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">8</text>
<text x="706" y="608" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">成功条件</text>
<text x="656" y="650" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">强类型客户端结果 | 交易请求 | 查询响应</text>
<rect x="1168" y="574" width="500" height="168" rx="8" fill="#2e1065" stroke="#a78bfa" stroke-width="2" filter="url(#shadow)"/>
<rect x="1186" y="592" width="42" height="32" rx="6" fill="#020617" stroke="#a78bfa" stroke-width="1"/>
<text x="1207" y="615" text-anchor="middle" fill="#a78bfa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">9</text>
<text x="1244" y="608" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">拒绝条件</text>
<text x="1194" y="650" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">配置无效、签名策略失败、网络拒绝或输出校验失败</text>
<text x="72" y="826" fill="#94a3b8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">本图根据 crate 技术角色元数据生成；不是源码阅读图，也不是实现全景图。</text>
