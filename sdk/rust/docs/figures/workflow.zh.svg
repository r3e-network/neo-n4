<rect x="110" y="394" width="42" height="32" rx="6" fill="#020617" stroke="#a78bfa" stroke-width="1"/>
<text x="131" y="417" text-anchor="middle" fill="#a78bfa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">4</text>
<text x="168" y="410" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">阶段 2</text>
<text x="118" y="452" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">构造请求</text>
