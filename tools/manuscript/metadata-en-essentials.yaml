abstract: |
  A focused, shorter companion to the full Neo Elastic Network
  manuscript. This Essentials edition answers four questions for
  newcomers:

  1. **What is `neo4`?** A multi-L2 network on Neo 4 core that anchors
     every L2 chain to a unified L1 contract suite (NeoHub) on Neo N3
     / Neo 4 L1 and aggregates proofs and inter-L2 messages through
     an optional Neo Gateway layer.
  2. **What does it look like running?** A short Quick Start chapter
     spins up a devnet so you can see the lifecycle end-to-end.
  3. **What modules does it have, and how do they fit together?** Five
     architecture chapters walk the system top-down: the L1 / L2
     dividing principle, an L2 chain's lifecycle, and the trust
     boundaries between modules.
  4. **How does data flow between those modules?** A wire-formats
     chapter pins the canonical byte layouts for every cross-module
     payload.

  Operator how-tos (persistence, telemetry, wallet integration,
  launching a chain), external-bridge specialization, and
  implementation tracking are deferred to the full manuscript.

  Independent community exploration; not endorsed by Neo Global
  Development, the Neo Foundation, or the neo-project organization.
