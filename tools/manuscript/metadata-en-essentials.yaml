abstract: |
  A focused, design-only companion to the full Neo Elastic Network
  manuscript. **No implementation tutorials, no byte-layout detail** ---
  just architecture and how the pieces fit together. Five chapters
  answer three questions for newcomers:

  1. **What is `neo4` and why does it exist?** Layered architecture,
     the modules at each layer, key design tradeoffs, threat model,
     and the phased rollout. (Chapter 1.)
  2. **How do the modules work as a whole?** Narrative tours through
     a transaction's life on an L2 chain, anti-censorship via forced
     inclusion, multi-L2 proof aggregation, and the telemetry
     pipeline. (Chapter 2.)
  3. **What are the architectural principles tying it together?**
     The L1-vs-L2 dividing principle, the lifecycle and anatomy of
     an L2 chain, and the trust boundaries between modules.
     (Chapters 3--5.)

  Operator how-tos (persistence, telemetry, wallet integration,
  launching a chain), byte-level wire formats, the component catalog
  / glossary, external-bridge specialization, and implementation
  tracking are all deferred to the full manuscript.

  Independent community exploration; not endorsed by Neo Global
  Development, the Neo Foundation, or the neo-project organization.
