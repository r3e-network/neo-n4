abstract: |
  Neo Elastic Network is a multi-L2 stack that uses Neo 4 core as the
  L2 execution kernel, unifies L2 chains under a shared L1 contract
  suite (NeoHub), and supports optional proof aggregation and
  inter-L2 messaging through Neo Gateway. The design borrows ZKsync
  Elastic Chain's *shared bridge / chain registry / proof aggregation*
  pattern and rebuilds it on Neo's primitives --- dBFT 2.0 finality,
  NEP-17 assets, NeoVM 2 / RISC-V execution, and NeoFS data
  availability. Settlement progresses through three pluggable proof
  regimes --- multisig attestation, optimistic challenge, ZK validity
  --- so chains can launch on the weakest acceptable bar and tighten
  to ZK without changing the L2 stack or the L1 contracts.

  This whitepaper is the formal technical write-up: motivation,
  system overview, the L1 contract suite, L2 chain internals, the
  proof system, asset model, cross-chain messaging, data availability,
  Neo Gateway aggregation, censorship resistance, governance, threat
  model, phased rollout, and a comparison to other rollup stacks.

  Operator how-tos, byte-layout detail, external-bridge specialization,
  and implementation tracking remain in the full manuscript.

  Independent community exploration; not endorsed by Neo Global
  Development, the Neo Foundation, or the neo-project organization.
