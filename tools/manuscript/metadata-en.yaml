abstract: |
  This manuscript collects the complete architecture, operator guide,
  external-bridge protocol, and implementation plans for `neo4` ---
  a multi-L2 network on Neo 4 core that anchors every L2 chain to a
  unified L1 contract suite (NeoHub) on Neo N3 / Neo 4 L1 and aggregates
  proofs and inter-L2 messages through an optional Neo Gateway layer.

  The architecture borrows the shared-bridge / chain-registry / proof-
  aggregation pattern from ZKsync Elastic Chain, rebuilt on Neo's stack:
  dBFT 2.0 finality, NEP-17 assets, NeoVM, NeoFS data availability.
  This document is an independent community exploration; it is not
  endorsed by Neo Global Development, the Neo Foundation, or the
  neo-project organization.
