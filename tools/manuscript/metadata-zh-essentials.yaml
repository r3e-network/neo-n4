abstract: |
  完整 Neo Elastic Network 手稿的"纯设计"伴读本。**不含实现教程,
  也不含字节布局细节** —— 只讲架构,以及各部分如何拼到一起。5 章
  为新读者回答 3 个问题:

  1. **\texttt{neo4} 是什么?为什么存在?**分层架构、每层的模块、
     关键的设计权衡、威胁模型、分阶段路线图。(第 1 章。)
  2. **模块作为整体如何运作?**叙事式导览:一笔 tx 在 L2 链上的
     一生、经强制纳入抗审查、多 L2 证明聚合、遥测流水线。
     (第 2 章。)
  3. **把这一切串起来的架构原则是什么?**L1 / L2 划分原则、一条 L2
     链的生命周期与解剖、模块之间的信任边界。(第 3--5 章。)

  运维 how-to(持久化、遥测、钱包集成、上链)、字节级线协议格式、
  组件目录 / 词汇表、外链桥专题、实现跟踪 —— 这些都在完整版。

  独立社区探索;**未受** Neo Global Development、Neo 基金会或
  neo-project 组织背书。
