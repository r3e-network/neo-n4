abstract: |
  Neo Elastic Network 是一个多 L2 栈,以 Neo 4 core 作为 L2 执行内核,
  把多条 L2 链统一在共享的 L1 合约套件(NeoHub)之下,并支持经 Neo
  Gateway 的可选证明聚合与 L2 间消息。设计借鉴 ZKsync Elastic Chain
  的*共享桥 / 链注册表 / 证明聚合*模式,在 Neo 的原语之上重建 ——
  dBFT 2.0 终结性、NEP-17 资产、NeoVM 2 / RISC-V 执行、NeoFS 数据
  可用性。结算经三档可插拔证明体系演进 —— 多签 attestation、乐观
  挑战、ZK 有效性 —— 因此每条链可以从最弱可接受门槛上线,并在不改
  L2 栈或 L1 合约的前提下收紧到 ZK。

  本白皮书是正式技术书写:立项动机、系统概览、L1 合约套件、L2 链
  内部、证明系统、资产模型、跨链消息、数据可用性、Neo Gateway 聚合、
  抗审查、治理、威胁模型、分阶段上线,以及与其他 rollup 栈的对比。

  运维 how-to、字节布局细节、外链桥专题、实现跟踪 —— 这些留在完整版。

  独立社区探索;**未受** Neo Global Development、Neo 基金会或
  neo-project 组织背书。
