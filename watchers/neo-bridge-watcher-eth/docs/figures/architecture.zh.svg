<text x="131" y="417" text-anchor="middle" fill="#38bdf8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">4</text>
<text x="168" y="410" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">状态与承诺层</text>
<text x="118" y="452" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">消息哈希、nonce、源链高度和资产动作</text>
