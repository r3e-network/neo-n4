<text x="168" y="212" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">入口域</text>
<text x="118" y="254" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">ETH RPC/log 流 | 桥合约事件 | 检查点游标</text>
<rect x="630" y="178" width="500" height="168" rx="8" fill="#082f49" stroke="#38bdf8" stroke-width="2" filter="url(#shadow)"/>
<rect x="648" y="196" width="42" height="32" rx="6" fill="#020617" stroke="#38bdf8" stroke-width="1"/>
<text x="669" y="219" text-anchor="middle" fill="#38bdf8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">2</text>
<text x="706" y="212" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">规范化层</text>
<text x="656" y="254" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">把异构事件整理成链无关、可哈希、可防重放消息</text>
<rect x="1168" y="178" width="500" height="168" rx="8" fill="#082f49" stroke="#38bdf8" stroke-width="2" filter="url(#shadow)"/>
<rect x="1186" y="196" width="42" height="32" rx="6" fill="#020617" stroke="#38bdf8" stroke-width="1"/>
<text x="1207" y="219" text-anchor="middle" fill="#38bdf8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">3</text>
<text x="1244" y="212" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">核心技术机制</text>
<text x="1194" y="254" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">过滤桥事件 | 规范化 payload | 保护重放与游标状态</text>
