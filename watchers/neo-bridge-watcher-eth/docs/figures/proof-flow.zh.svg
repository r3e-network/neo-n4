<rect x="1186" y="394" width="42" height="32" rx="6" fill="#020617" stroke="#f97316" stroke-width="1"/>
<text x="1207" y="417" text-anchor="middle" fill="#f97316" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">6</text>
<text x="1244" y="410" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">验证者</text>
<text x="1194" y="452" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">网关 | 共享桥 | 运维面板</text>
<rect x="92" y="574" width="500" height="168" rx="8" fill="#3b1700" stroke="#f97316" stroke-width="2" filter="url(#shadow)"/>
<rect x="110" y="592" width="42" height="32" rx="6" fill="#020617" stroke="#f97316" stroke-width="1"/>
<text x="131" y="615" text-anchor="middle" fill="#f97316" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">7</text>
<text x="168" y="608" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">接受结果</text>
<text x="118" y="650" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">relay 任务 | 审计日志 | 健康指标</text>
<rect x="630" y="574" width="500" height="168" rx="8" fill="#3b1700" stroke="#f97316" stroke-width="2" filter="url(#shadow)"/>
<rect x="648" y="592" width="42" height="32" rx="6" fill="#020617" stroke="#f97316" stroke-width="1"/>
<text x="669" y="615" text-anchor="middle" fill="#f97316" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">8</text>
<text x="706" y="608" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">拒绝结果</text>
<text x="656" y="650" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">丢弃或隔离消息；nonce 和资产状态不推进</text>
<text x="72" y="826" fill="#94a3b8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">本图根据 crate 技术角色元数据生成；不是源码阅读图，也不是实现全景图。</text>
