<text x="1062" y="502" class="bodyStrong">持久状态</text>
<text x="1062" y="522" class="small">游标、已消费 nonce、托管或铸造状态</text>
<rect x="1660" y="340" width="150" height="190" rx="8" fill="#ffffff" stroke="#1d4ed8" stroke-width="1.5"/>
<text x="1674" y="366" class="bodyStrong">证据</text>
<text x="1674" y="388" class="small">状态转换</text>
<text x="1674" y="416" class="body">H(批次) || 新状</text>
<text x="1674" y="435" class="body">态根 || 证明(证</text>
<text x="1674" y="454" class="body">据)</text>
<path class="arrowDash" d="M1622 436 C1642 436 1648 436 1660 436"/>
<text x="1012" y="555" class="mono">接受 ⇔ 确定性 ∧ 已授权 ∧ 可验证</text>
