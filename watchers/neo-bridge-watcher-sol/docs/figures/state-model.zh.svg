<rect x="102" y="740" width="30" height="24" rx="5" fill="#1d4ed8"/>
<text x="117" y="757" text-anchor="middle" class="label">1</text>
<text x="140" y="758" class="bodyStrong">neo-bridge-watcher-sol</text>
<text x="104" y="788" class="small">状态模型说明什么</text>
<text x="104" y="805" class="small">会被记住、提交、验</text>
<text x="104" y="822" class="small">证或丢弃。</text>
<path class="arrowAccent" d="M242 790 L290 790"/>
<text x="266" y="778" class="small">步骤 1</text>
<rect x="290" y="730" width="150" height="120" rx="8" fill="#eff6ff" stroke="#1d4ed8" stroke-width="1.5"/>
