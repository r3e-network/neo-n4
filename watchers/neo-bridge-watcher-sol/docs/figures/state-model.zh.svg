<text x="315" y="757" text-anchor="middle" class="label">2</text>
<text x="338" y="758" class="bodyStrong">输入状态</text>
<text x="302" y="788" class="small">SOL RPC/log 流 | </text>
<text x="302" y="805" class="small">桥合约事件 | 检查</text>
<text x="302" y="822" class="small">点游标</text>
<path class="arrowAccent" d="M440 790 L488 790"/>
