<circle cx="1037" cy="366" r="15" fill="#1d4ed8"/>
<text x="1037" y="371" text-anchor="middle" class="label">1</text>
<text x="1062" y="362" class="bodyStrong">输入状态</text>
<text x="1062" y="382" class="small">SOL RPC/log 流 | 桥合约事件 | 检查点游标</text>
<path class="arrowAccent" d="M1318 392 L1318 410"/>
<rect x="1012" y="410" width="610" height="52" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2"/>
