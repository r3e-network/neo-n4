<text x="513" y="757" text-anchor="middle" class="label">3</text>
<text x="536" y="758" class="bodyStrong">工作状态</text>
<text x="500" y="788" class="small">待处理日志、确认窗</text>
<text x="500" y="805" class="small">口、relay 任务</text>
<path class="arrowAccent" d="M638 790 L686 790"/>
<text x="662" y="778" class="small">步骤 3</text>
<rect x="686" y="730" width="150" height="120" rx="8" fill="#eff6ff" stroke="#1d4ed8" stroke-width="1.5"/>
<rect x="696" y="740" width="30" height="24" rx="5" fill="#1d4ed8"/>
<text x="711" y="757" text-anchor="middle" class="label">4</text>
<text x="734" y="758" class="bodyStrong">持久状态</text>
<text x="698" y="788" class="small">游标、已消费 nonce</text>
<text x="698" y="805" class="small">、托管或铸造状态</text>
<path class="arrowAccent" d="M836 790 L884 790"/>
<text x="860" y="778" class="small">步骤 4</text>
<rect x="884" y="730" width="150" height="120" rx="8" fill="#eff6ff" stroke="#1d4ed8" stroke-width="1.5"/>
<rect x="894" y="740" width="30" height="24" rx="5" fill="#1d4ed8"/>
<text x="909" y="757" text-anchor="middle" class="label">5</text>
<text x="932" y="758" class="bodyStrong">状态转换</text>
<text x="896" y="788" class="small">事件变成标准消息，</text>
<text x="896" y="805" class="small">再变成资产或状态</text>
<text x="896" y="822" class="small">动作</text>
<path class="arrowAccent" d="M1034 790 L1082 790"/>
<text x="1058" y="778" class="small">步骤 5</text>
<rect x="1082" y="730" width="150" height="120" rx="8" fill="#eff6ff" stroke="#1d4ed8" stroke-width="1.5"/>
