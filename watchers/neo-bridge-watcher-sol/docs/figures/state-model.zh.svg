<text x="1094" y="788" class="small">消息哈希、nonce、源</text>
<text x="1094" y="805" class="small">链高度和资产动作</text>
<path class="arrowDash" d="M182 896 C372 964 832 964 1116 896"/>
<rect x="488" y="904" width="190" height="128" rx="8" fill="#fff1f2" stroke="#dc2626" stroke-width="1.5"/>
<rect x="498" y="914" width="30" height="24" rx="5" fill="#dc2626"/>
<text x="513" y="931" text-anchor="middle" class="label">R</text>
<text x="536" y="932" class="bodyStrong">终局条件</text>
<text x="500" y="962" class="small">消息被消费且 nonc</text>
<text x="500" y="979" class="small">e 标记为已使用</text>
<path class="arrowFault" d="M560 850 L560 908"/>
<rect x="880" y="904" width="300" height="128" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
<text x="894" y="930" class="bodyStrong">扩展点</text>
<text x="894" y="952" class="small">回滚或拒绝</text>
<text x="894" y="980" class="body">丢弃或隔离消息；nonce 和资产状态不</text>
<text x="894" y="999" class="body">推进</text>
<text x="92" y="1060" class="caption">虚线路径表示证明、见证、审计或可观测证据: 消息哈希、nonce、源链高度和资产动作</text>
<rect x="1368" y="708" width="462" height="310" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2"/>
<rect x="1378" y="718" width="442" height="48" rx="6" fill="#eff6ff"/>
<text x="1390" y="738" class="bodyStrong">确定性</text>
<text x="1518" y="736" class="small">同一源链事件映射到唯一、可重放保护的桥消息</text>
<rect x="1378" y="776" width="442" height="48" rx="6" fill="#ffffff"/>
<text x="1390" y="796" class="bodyStrong">授权</text>
<text x="1518" y="794" class="small">资产动作需要桥规则、消息证据和治理策略</text>
<rect x="1378" y="834" width="442" height="48" rx="6" fill="#eff6ff"/>
<text x="1390" y="854" class="bodyStrong">证据</text>
<text x="1518" y="852" class="small">消息哈希、nonce、源链高度和资产动作</text>
<rect x="1378" y="892" width="442" height="48" rx="6" fill="#ffffff"/>
<text x="1390" y="912" class="bodyStrong">拒绝路径</text>
<text x="1518" y="910" class="small">消息被消费且 nonce 标记为已使用</text>
<rect x="1378" y="950" width="442" height="48" rx="6" fill="#eff6ff"/>
<text x="1390" y="970" class="bodyStrong">可观测性</text>
<text x="1518" y="968" class="small">源事件、确认数、消息哈希、游标、提交哈希和最终</text>
<text x="1518" y="985" class="small">状态</text>
<line x1="1504" y1="722" x2="1504" y2="998" stroke="#1d4ed8" stroke-width="1.2" stroke-dasharray="4 5"/>
<rect x="1368" y="1012" width="462" height="58" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2"/>
<line x1="1386" y1="1030" x2="1432" y2="1030" stroke="#1d4ed8" stroke-width="2.6" marker-end="url(#arrowAccent)"/>
