<svg xmlns="http://www.w3.org/2000/svg" width="1760" height="870" viewBox="0 0 1760 870" role="img" aria-label="neo-bridge-watcher-tron 系统位置图">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#08111f"/><stop offset="100%" stop-color="#111827"/></linearGradient>
<filter id="shadow" x="-15%" y="-15%" width="130%" height="130%"><feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#020617" flood-opacity="0.42"/></filter>
</defs>
<rect width="1760" height="100%" fill="url(#bg)"/>
<rect x="34" y="34" width="1692" height="802" rx="10" fill="#0f172a" stroke="#334155" stroke-width="2"/>
<text x="72" y="92" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="34" font-weight="700">neo-bridge-watcher-tron: 系统位置图</text>
<text x="72" y="132" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="19">Neo N4 技术原理学习图 - 它在 Neo N4 中的位置</text>
<rect x="92" y="178" width="500" height="168" rx="8" fill="#052e1a" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
<rect x="110" y="196" width="42" height="32" rx="6" fill="#020617" stroke="#22c55e" stroke-width="1"/>
<text x="131" y="219" text-anchor="middle" fill="#22c55e" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">1</text>
<text x="168" y="212" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">Neo N4 层级</text>
<text x="118" y="254" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">跨链监听器</text>
<rect x="630" y="178" width="500" height="168" rx="8" fill="#052e1a" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
<rect x="648" y="196" width="42" height="32" rx="6" fill="#020617" stroke="#22c55e" stroke-width="1"/>
<text x="669" y="219" text-anchor="middle" fill="#22c55e" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">2</text>
<text x="706" y="212" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">上游技术域</text>
<text x="656" y="254" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">TRON RPC/log 流 | 桥合约事件 | 检查点游标</text>
<rect x="1168" y="178" width="500" height="168" rx="8" fill="#052e1a" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
<rect x="1186" y="196" width="42" height="32" rx="6" fill="#020617" stroke="#22c55e" stroke-width="1"/>
<text x="1207" y="219" text-anchor="middle" fill="#22c55e" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">3</text>
<text x="1244" y="212" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">neo-bridge-watcher-tron</text>
<text x="1194" y="254" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">监听 TRON 桥事件，并转换为标准化 Neo N4 relay 消息。</text>
<rect x="92" y="376" width="500" height="168" rx="8" fill="#052e1a" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
<rect x="110" y="394" width="42" height="32" rx="6" fill="#020617" stroke="#22c55e" stroke-width="1"/>
<text x="131" y="417" text-anchor="middle" fill="#22c55e" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">4</text>
<text x="168" y="410" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">下游技术域</text>
<text x="118" y="452" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">网关 | 共享桥 | 运维面板</text>
<rect x="630" y="376" width="500" height="168" rx="8" fill="#052e1a" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
<rect x="648" y="394" width="42" height="32" rx="6" fill="#020617" stroke="#22c55e" stroke-width="1"/>
<text x="669" y="417" text-anchor="middle" fill="#22c55e" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">5</text>
<text x="706" y="410" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">拥有的边界</text>
<text x="656" y="452" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">过滤桥事件 | 规范化 payload | 保护重放与游标状态</text>
<rect x="1168" y="376" width="500" height="168" rx="8" fill="#052e1a" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
<rect x="1186" y="394" width="42" height="32" rx="6" fill="#020617" stroke="#22c55e" stroke-width="1"/>
<text x="1207" y="417" text-anchor="middle" fill="#22c55e" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">6</text>
<text x="1244" y="410" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">不拥有的边界</text>
<text x="1194" y="452" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">不负责目标链共识；负责标准化中继语义</text>
<rect x="92" y="574" width="500" height="168" rx="8" fill="#052e1a" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
<rect x="110" y="592" width="42" height="32" rx="6" fill="#020617" stroke="#22c55e" stroke-width="1"/>
<text x="131" y="615" text-anchor="middle" fill="#22c55e" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">7</text>
<text x="168" y="608" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="700">学习重点</text>
<text x="118" y="650" fill="#dbeafe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">理解它接受的技术事实、产生的证据、以及下游如何消费。</text>
<text x="72" y="826" fill="#94a3b8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">本图根据 crate 技术角色元数据生成；不是源码阅读图，也不是实现全景图。</text>
</svg>
